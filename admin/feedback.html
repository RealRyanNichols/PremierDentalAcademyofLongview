<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student Feedback — PDA Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/speed-insights.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; color: #0f172a; }
    .display { font-family: 'Fraunces', serif; }
  </style>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

<nav class="bg-white border-b border-slate-200">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
    <a href="/admin" class="flex items-center gap-2 font-bold">
      <img src="/assets/logo-mark.png" alt="PDA" width="28" height="28" class="w-7 h-7 rounded" />
      <span>PDA Admin</span>
    </a>
    <div class="flex items-center gap-4 text-sm">
      <a href="/admin/students" class="text-slate-600 hover:text-teal-700">Students</a>
      <a href="/admin/leads" class="text-slate-600 hover:text-teal-700">Leads</a>
      <button id="signout" class="text-rose-600 hover:underline">Sign out</button>
    </div>
  </div>
</nav>

<div id="auth-wall" class="hidden max-w-md mx-auto mt-20 bg-white rounded-2xl border border-slate-200 shadow-sm p-8 text-center">
  <div class="text-4xl mb-2">🔒</div>
  <h1 class="display text-2xl font-bold">Admin access only</h1>
  <p class="text-slate-600 mt-2 text-sm">Sign in with an admin account to view student feedback.</p>
  <a href="/login" class="inline-block mt-5 bg-teal-700 hover:bg-teal-800 text-white font-semibold px-5 py-2.5 rounded-lg">Sign in →</a>
</div>

<main id="view" class="hidden max-w-6xl mx-auto px-4 sm:px-6 py-8">
  <div class="flex items-end justify-between flex-wrap gap-3 mb-6">
    <div>
      <p class="text-xs uppercase tracking-widest text-teal-700 font-bold">Real-time</p>
      <h1 class="display text-3xl font-bold">Student feedback</h1>
      <p class="text-slate-600 text-sm mt-1">Live pulse ratings and suggestions from students — use them to build the school.</p>
    </div>
    <button id="refresh" class="bg-white border border-slate-300 hover:border-teal-600 text-slate-700 font-semibold text-sm px-4 py-2 rounded-lg">↻ Refresh</button>
  </div>

  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
    <div class="bg-white rounded-xl border border-slate-200 p-4"><div class="text-[11px] uppercase tracking-widest text-slate-500 font-semibold">Avg pulse</div><div id="s-avg" class="text-2xl font-bold text-teal-700 mt-1">—</div></div>
    <div class="bg-white rounded-xl border border-slate-200 p-4"><div class="text-[11px] uppercase tracking-widest text-slate-500 font-semibold">Pulse responses</div><div id="s-pulses" class="text-2xl font-bold text-slate-900 mt-1">0</div></div>
    <div class="bg-white rounded-xl border border-slate-200 p-4"><div class="text-[11px] uppercase tracking-widest text-slate-500 font-semibold">Suggestions</div><div id="s-sugg" class="text-2xl font-bold text-amber-600 mt-1">0</div></div>
    <div class="bg-white rounded-xl border border-slate-200 p-4"><div class="text-[11px] uppercase tracking-widest text-slate-500 font-semibold">This week</div><div id="s-week" class="text-2xl font-bold text-cyan-700 mt-1">0</div></div>
  </div>

  <div class="flex gap-2 mb-4 text-sm">
    <button data-f="all" class="fb-filter bg-slate-900 text-white px-3 py-1.5 rounded-lg">All</button>
    <button data-f="pulse" class="fb-filter bg-white border border-slate-300 px-3 py-1.5 rounded-lg">Pulse</button>
    <button data-f="suggestion" class="fb-filter bg-white border border-slate-300 px-3 py-1.5 rounded-lg">Suggestions</button>
  </div>

  <div id="list" class="space-y-3"></div>
  <div id="empty" class="hidden text-center text-slate-500 py-12">No feedback yet.</div>
</main>

<script>
(async () => {
  const sb = window.supabase.createClient('https://lmbsuwslsycukynzpzik.supabase.co', 'sb_publishable_vzuQZbkmj-UsYZVs5Zqw9w_c8PiOfbh');
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { document.getElementById('auth-wall').classList.remove('hidden'); return; }
  let profile = (await sb.from('profiles').select('is_admin').eq('id', session.user.id).maybeSingle()).data;
  if (!profile) { try { await sb.auth.refreshSession(); } catch (e) {} profile = (await sb.from('profiles').select('is_admin').eq('id', session.user.id).maybeSingle()).data; }
  if (!(profile?.is_admin === true || session?.user?.app_metadata?.is_admin === true)) { document.getElementById('auth-wall').classList.remove('hidden'); return; }
  document.getElementById('view').classList.remove('hidden');
  document.getElementById('signout').onclick = () => { location.href = '/logout?then=home'; };

  const EMOJI = { 1: '😣', 2: '😕', 3: '😐', 4: '🙂', 5: '😍' };
  let rows = [], filter = 'all';
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  async function loadData() {
    const { data } = await sb.from('student_feedback').select('id, kind, prompt, rating, comment, page, created_at').order('created_at', { ascending: false }).limit(300);
    rows = data || [];
    const pulses = rows.filter(r => r.kind === 'pulse' && r.rating);
    const avg = pulses.length ? (pulses.reduce((a, r) => a + r.rating, 0) / pulses.length) : 0;
    document.getElementById('s-avg').textContent = avg ? avg.toFixed(1) + ' / 5' : '—';
    document.getElementById('s-pulses').textContent = pulses.length;
    document.getElementById('s-sugg').textContent = rows.filter(r => r.kind === 'suggestion').length;
    const weekAgo = Date.now() - 7 * 864e5;
    document.getElementById('s-week').textContent = rows.filter(r => new Date(r.created_at).getTime() > weekAgo).length;
    render();
  }
  function render() {
    const list = document.getElementById('list');
    const shown = rows.filter(r => filter === 'all' || r.kind === filter);
    document.getElementById('empty').classList.toggle('hidden', shown.length > 0);
    list.innerHTML = shown.map(r => {
      const when = new Date(r.created_at).toLocaleString();
      const badge = r.kind === 'suggestion'
        ? '<span class="text-[10px] uppercase tracking-wider font-bold bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">Suggestion</span>'
        : '<span class="text-[10px] uppercase tracking-wider font-bold bg-teal-100 text-teal-700 px-2 py-0.5 rounded-full">Pulse</span>';
      return '<div class="bg-white rounded-xl border border-slate-200 p-4">'
        + '<div class="flex items-center gap-2 mb-1">' + badge
        + (r.rating ? '<span class="text-xl" title="' + r.rating + '/5">' + (EMOJI[r.rating] || '') + '</span>' : '')
        + '<span class="ml-auto text-xs text-slate-400">' + esc(when) + '</span></div>'
        + (r.prompt ? '<div class="text-xs text-slate-500">' + esc(r.prompt) + '</div>' : '')
        + (r.comment ? '<div class="text-sm text-slate-800 mt-1">' + esc(r.comment) + '</div>' : '<div class="text-sm text-slate-400 mt-1 italic">No comment</div>')
        + '</div>';
    }).join('');
  }
  document.querySelectorAll('.fb-filter').forEach(b => b.onclick = () => {
    filter = b.getAttribute('data-f');
    document.querySelectorAll('.fb-filter').forEach(x => { x.className = 'fb-filter bg-white border border-slate-300 px-3 py-1.5 rounded-lg'; });
    b.className = 'fb-filter bg-slate-900 text-white px-3 py-1.5 rounded-lg';
    render();
  });
  document.getElementById('refresh').onclick = loadData;
  await loadData();
})();
</script>
</body>
</html>

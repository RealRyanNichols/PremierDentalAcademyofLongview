<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDA Practice Pro — Practice Management Trainer</title>
  <meta name="description" content="Premier Dental Academy of Longview — Practice Pro practice management trainer." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='4' fill='%230f172a'/%3E%3Ctext x='12' y='17' text-anchor='middle' font-family='Inter,sans-serif' font-size='14' font-weight='700' fill='%230d9488'%3EP%3C/text%3E%3C/svg%3E" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
    body { font-size: 13px; color: #0f172a; background: #f1f5f9; }
    .mono { font-family: 'SFMono-Regular', Menlo, Consolas, monospace; }

    /* Dark navy app chrome */
    .pp-chrome { background: #0f172a; color: #e2e8f0; }
    .pp-ribbon { background: #f8fafc; border-bottom: 1px solid #cbd5e1; }
    .pp-sidebar { background: #ffffff; border-right: 1px solid #cbd5e1; }
    .pp-tab-active { background: #ffffff; color: #0f172a; border-bottom-color: #0d9488 !important; }

    /* Subtle fade-in for module switches */
    @keyframes fade { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
    .pp-fade { animation: fade .14s ease-out; }
    @keyframes slidein { from { transform: translateX(8px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* Tooth SVG default + states */
    .tooth { cursor: pointer; }
    .tooth:hover .tooth-shape { stroke: #0d9488; stroke-width: 1.5; }
    .surface { fill: #ffffff; stroke: #94a3b8; }
    .surface.s-amalgam   { fill: #475569; }
    .surface.s-composite { fill: #0d9488; }
    .surface.s-caries    { fill: #ef4444; }
    .surface.s-sealant   { fill: #a3e635; }
    .surface.s-crown     { fill: #fbbf24; }
    .surface.s-rct       { fill: #9333ea; }
    .surface.s-missing   { fill: #1e293b; opacity: .35; }
    .surface.s-implant   { fill: #0ea5e9; }
    .surface.s-watch     { fill: #f97316; }
    .surface.s-fracture  { fill: #be185d; }

    /* Form polish — explicit Tailwind utilities (CDN doesn't support @apply outside special blocks) */
  </style>

  <style type="text/tailwindcss">
    @layer components {
      .input { @apply w-full px-2 py-1.5 bg-white border border-slate-300 rounded text-[13px] focus:outline-none focus:border-teal-600 focus:ring-1 focus:ring-teal-600; }
      .label { @apply block text-[11px] uppercase tracking-wide text-slate-500 font-semibold mb-0.5; }
      .btn { @apply inline-flex items-center gap-1.5 px-3 py-1.5 rounded text-[12px] font-medium transition; }
      .btn-primary { @apply bg-teal-700 text-white hover:bg-teal-800; }
      .btn-ghost { @apply text-slate-700 hover:bg-slate-100; }
      .btn-danger { @apply bg-rose-600 text-white hover:bg-rose-700; }
      .btn-soft { @apply bg-slate-100 text-slate-800 hover:bg-slate-200; }
      .marker-btn { @apply px-2 py-1 rounded text-[11px] font-medium border transition flex items-center gap-1.5; }
    }
  </style>

  <style>

    /* Scrollbar polish */
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* No outline on programmatic focus */
    [data-pf] { outline: none; }

    /* Print styling for walkout statements */
    @media print {
      body * { visibility: hidden; }
      #print-root, #print-root * { visibility: visible; }
      #print-root { position: absolute; left: 0; top: 0; width: 100%; }
    }

    /* Table polish */
    table.pp { width: 100%; border-collapse: collapse; }
    table.pp th { background: #f8fafc; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #64748b; padding: 8px 10px; border-bottom: 1px solid #cbd5e1; }
    table.pp td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    table.pp tr:hover td { background: #f8fafc; }

    /* Alert chip */
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .chip-amber { background: #fef3c7; color: #92400e; }
    .chip-rose  { background: #ffe4e6; color: #9f1239; }
    .chip-sky   { background: #e0f2fe; color: #075985; }
    .chip-emerald { background: #d1fae5; color: #065f46; }
    .chip-slate { background: #e2e8f0; color: #334155; }

    /* Keyboard kbd polish */
    kbd { background: #1e293b; color: #e2e8f0; padding: 1px 6px; border-radius: 3px; font-family: 'SFMono-Regular', monospace; font-size: 10px; border-bottom: 2px solid #0f172a; }

    /* Modal */
    .modal-back { position: fixed; inset: 0; background: rgba(15, 23, 42, .55); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: #fff; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,.25); width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-lg { max-width: 880px; }
    .modal h2 { font-size: 14px; font-weight: 600; }

    /* Mobile */
    @media (max-width: 768px) {
      .pp-sidebar { position: fixed; inset: 0 auto 0 0; z-index: 40; transform: translateX(-100%); transition: transform .2s; width: 86vw; max-width: 320px; box-shadow: 4px 0 18px rgba(0,0,0,.15); }
      .pp-sidebar.open { transform: none; }
      .pp-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 35; }
    }
  </style>
</head>
<body>

<!-- ─────────────────────────── App shell ───────────────────────────── -->
<div id="app" class="h-screen flex flex-col"></div>

<!-- Off-screen print root for walkout statements / treatment plans -->
<div id="print-root" style="display:none;"></div>

<!-- Toast host gets injected at runtime -->

<!-- Shared modules -->
<script src="/auth.js"></script>
<script src="/assets/pda-shared.js"></script>
<script src="/assets/pda-seed-patients.js"></script>

<script>
/* ============================================================
 * PDA Practice Pro v2
 * Single-file vanilla-JS dental practice management trainer.
 * Dark-navy ribbon UI workflow for RDA students.
 * ============================================================ */
(function () {
  'use strict';

  const APP = 'practice_pro';
  const { fmt, uid, debounce, escapeHtml, avatarUrl, toast, exportPDF,
          patientPortion, PERM_TEETH, SURFACES, SURFACE_COLORS, Store } = window.PDA_SHARED;
  const SEED = window.PDA_SEED;

  // ── State ──────────────────────────────────────────────────────
  // Marketing site (sign-up / pricing) — students return here to enroll
  const MARKETING_URL = '/';            // landing page
  const SIGNUP_URL    = '/enroll';      // enrollment / payment page
  const APPLY_URL     = '/apply';       // free application form

  const state = {
    user: null,
    access: 'preview',        // 'preview' | 'student' — set on boot
    patients: [],
    currentPatientId: null,
    module: 'today',        // today | overview | chart | perio | tx | ledger | comms | schedule | recall | docs
    ui: {
      sidebarOpen: window.matchMedia('(min-width: 769px)').matches,
      isMobile: window.matchMedia('(max-width: 768px)').matches,
      chartMarker: 'caries',
      toothContext: null,
      paletteOpen: false,
      modal: null,
      patientFilter: '',
      patientFilterTab: 'all',
      helpMode: !localStorage.getItem('pda.pp.helpModeOff'),    // explanatory banners on by default
      skillLevel: localStorage.getItem('pda.pp.skillLevel') || 'new', // new | standard | all
    },
    audit: [],
  };

  // ── Persistence ────────────────────────────────────────────────
  async function loadState() {
    const saved = await Store.load(APP);
    if (saved && Array.isArray(saved.patients) && saved.patients.length) {
      state.patients = saved.patients;
      // Migrate older saves to add new fields
      state.patients.forEach(p => { p.comms = p.comms || []; });
      state.currentPatientId = saved.currentPatientId || saved.patients[0].id;
    } else {
      // First run: seed
      state.patients = JSON.parse(JSON.stringify(SEED.patients));
      state.patients.forEach(p => { p.comms = p.comms || []; });
      state.currentPatientId = state.patients[0].id;
      await Store.save(APP, { patients: state.patients, currentPatientId: state.currentPatientId });
      Store.log(APP, 'seeded_patients', { count: state.patients.length });
    }
  }
  const saveSoon = debounce(() => {
    // Preview mode: do NOT persist — keep the preview ephemeral so each new visitor starts fresh
    if (state.access !== 'student') return;
    Store.save(APP, { patients: state.patients, currentPatientId: state.currentPatientId });
  }, 350);

  function logAction(action, metadata) {
    state.audit.unshift({ at: new Date().toISOString(), action, metadata });
    if (state.audit.length > 80) state.audit.length = 80;
    Store.log(APP, action, metadata);
  }

  // ── Selectors ──────────────────────────────────────────────────
  function currentPatient() {
    return state.patients.find(p => p.id === state.currentPatientId) || null;
  }

  function balanceFor(p) {
    return (p.ledger || []).reduce((acc, e) => acc + (Number(e.fee) || 0) - (Number(e.payment) || 0), 0);
  }

  function filteredPatients() {
    const q = state.ui.patientFilter.trim().toLowerCase();
    const tab = state.ui.patientFilterTab;
    let list = state.patients.slice();
    if (tab !== 'all') list = list.filter(p => (p.type || '') === tab);
    if (q) list = list.filter(p => {
      return [p.first, p.last, p.preferred, p.id, p.phone, p.dob, p.email]
        .filter(Boolean).some(s => String(s).toLowerCase().includes(q));
    });
    list.sort((a, b) => (a.last + a.first).localeCompare(b.last + b.first));
    return list;
  }

  // ── Render dispatch ────────────────────────────────────────────
  function render() {
    const root = document.getElementById('app');
    root.innerHTML = `
      ${renderTopChrome()}
      ${renderPreviewStrip()}
      ${renderRibbon()}
      <div class="flex-1 flex overflow-hidden">
        ${renderSidebar()}
        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
          ${renderBanner()}
          <div class="flex-1 overflow-auto">
            ${renderModule()}
          </div>
        </main>
      </div>
      ${renderModal()}
      ${renderPalette()}
    `;
    bindEvents();
  }
  const rerender = () => requestAnimationFrame(render);

  // ── Top chrome (dark navy title bar) ───────────────────────────
  function renderTopChrome() {
    const isStudent = state.access === 'student';
    return `
      <header class="pp-chrome flex items-center justify-between px-3 py-1.5 text-[12px]">
        <div class="flex items-center gap-3">
          <button data-action="toggle-sidebar" class="md:hidden text-slate-300 hover:text-white">☰</button>
          <a href="${MARKETING_URL}" class="flex items-center gap-1.5 font-semibold tracking-wide hover:text-teal-300" title="Back to Premier Dental Academy">
            <span class="inline-block w-2.5 h-2.5 bg-teal-500 rounded-sm"></span>
            PDA Practice Pro
            <span class="text-slate-500 font-normal hidden sm:inline">— Practice Management Trainer</span>
          </a>
          ${!isStudent ? `<span class="bg-amber-400 text-slate-900 text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded">PREVIEW</span>` : ''}
        </div>
        <div class="flex items-center gap-3">
          ${isStudent ? `
            ${(() => { const a = activeStaff(); return `
              <select data-action="switch-staff" class="bg-slate-800 hover:bg-slate-700 text-slate-200 text-[11px] px-2 py-1 rounded border-0 focus:outline-none cursor-pointer" title="Switch staff perspective (training mode)">
                ${STAFF.map(s => `<option value="${s.id}" ${s.id === a.id ? 'selected' : ''}>${escapeHtml(s.name)} · ${escapeHtml(s.role)}</option>`).join('')}
              </select>
            `; })()}
            <button data-action="open-palette" class="bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded flex items-center gap-2 text-slate-200">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-4.3-4.3M10.5 18a7.5 7.5 0 110-15 7.5 7.5 0 010 15z"/></svg>
              <span>Search</span>
              <kbd>⌘K</kbd>
            </button>
            <button data-action="audit-toggle" class="text-slate-300 hover:text-white" title="Audit log">⏱</button>
          ` : `
            <a href="${SIGNUP_URL}" class="bg-amber-400 hover:bg-amber-300 text-slate-900 font-semibold px-3 py-1 rounded">Enroll to unlock →</a>
          `}
        </div>
      </header>
    `;
  }

  function renderPreviewStrip() {
    if (state.access === 'student') return '';
    return `
      <div class="bg-amber-50 border-b border-amber-200 px-3 py-2 text-[12px] text-amber-900 flex items-center gap-3 flex-wrap">
        <span class="text-base">🔒</span>
        <strong>Preview mode</strong>
        <span class="flex-1 min-w-[200px]">You're seeing 5 essential tabs. Enroll at Premier Dental Academy to unlock all 16 modules, save your work, print PDFs, and earn your certificate.</span>
        <a href="${SIGNUP_URL}" class="bg-amber-500 hover:bg-amber-600 text-white text-[11px] font-semibold px-2.5 py-1 rounded whitespace-nowrap">Enroll now →</a>
      </div>
    `;
  }

  // ── Module help content + skill levels ─────────────────────────
  // 1 = New hire essentials, 2 = Standard practice, 3 = Advanced / business
  const MODULES = {
    today:    { label: 'Today',    shortcut: 'H', level: 1, what: "Your morning briefing.",
                desc: "See who's coming in today, who's overdue for a cleaning, how much money is outstanding, and what production looks like. Open this tab first thing every morning." },
    overview: { label: 'Patient',  shortcut: '1', level: 1, what: "Everything about this person.",
                desc: "Name, address, phone, insurance, medical history. Click any field to edit; changes save automatically." },
    chart:    { label: 'Chart',    shortcut: 'T', level: 1, what: "The tooth chart.",
                desc: "Pick a marker at the top (caries, composite, crown, etc.) then click any tooth surface to mark it. Right-click a tooth for more options like 'Plan a procedure.'" },
    schedule: { label: 'Schedule', shortcut: 'S', level: 1, what: "Today's appointments by operatory.",
                desc: "Click an empty slot to book. Drag any appointment to a new time. Click an appointment to text-confirm, log a call, or change status (arrived / no-show / cancelled)." },
    ledger:   { label: 'Ledger',   shortcut: 'L', level: 1, what: "Money in, money out.",
                desc: "Every charge, every payment, and the running balance. Use this to post a procedure, take a payment, and print a walkout statement." },
    perio:    { label: 'Perio',    shortcut: '3', level: 2, what: "Periodontal exam.",
                desc: "Six pocket-depth readings per tooth. Click any cell to enter a depth in mm. The app auto-calculates AAP stage and grade and recommends a recall interval." },
    tx:       { label: 'Tx Plan',  shortcut: '4', level: 2, what: "What's planned for this patient.",
                desc: "Phased treatment with per-procedure insurance estimates. Mark a procedure 'Accepted' and 'Sign & accept' the whole plan with patient signature." },
    comms:    { label: 'Comms',    shortcut: 'C', level: 2, what: "All texts, calls, emails, voicemails.",
                desc: "Every touchpoint with this patient in one timeline. 'Send text' has four ready-to-send templates: recall, confirmation, post-op, balance reminder." },
    recall:   { label: 'Recall',   shortcut: '7', level: 2, what: "Who needs a cleaning soon.",
                desc: "Filter to overdue, due-30, due-60. Each row has buttons to text, log a call, or mark contacted. Export the list to CSV for the front desk." },
    vitals:   { label: 'Vitals',   shortcut: 'V', level: 2, what: "Blood pressure, pulse, SpO2.",
                desc: "Take vitals before treatment. The app warns about hypertension, low SpO2, fever, and blood-sugar emergencies." },
    rx:       { label: 'Rx',       shortcut: 'X', level: 2, what: "Write a prescription.",
                desc: "Pick a drug, the strength and sig pre-fill. If the patient has an allergy that conflicts (e.g. penicillin + amoxicillin) a red warning appears before you can sign." },
    imaging:  { label: 'Imaging',  shortcut: 'I', level: 2, what: "X-rays + photos.",
                desc: "Standard FMX layout, bitewings, panorex, intraoral photos, documents. Drag any JPEG onto an empty slot to mount it." },
    forms:    { label: 'Forms',    shortcut: '0', level: 2, what: "Patient paperwork.",
                desc: "HIPAA, medical history, financial agreement, treatment consent, post-op instructions. Sign electronically or text the patient a portal link." },
    claims:   { label: 'Claims',   shortcut: '9', level: 3, what: "Submit insurance claims, post EOBs.",
                desc: "All completed procedures with insurance group up by patient + carrier. One click to generate a claim. When the EOB comes back, post the allowed and paid amounts; the app auto-creates the ledger payment + write-off." },
    lab:      { label: 'Lab',      shortcut: 'B', level: 3, what: "Crowns, dentures, night guards sent to a lab.",
                desc: "New case form picks the procedure (PFM crown, zirconia, e.max, denture, etc.) and auto-sets a due date. Receive a case when the lab delivers; mark Seated after the patient appointment." },
    reports:  { label: 'Reports',  shortcut: 'R', level: 3, what: "Practice performance.",
                desc: "Production by provider, A/R aging, case-acceptance %, no-show rate, recare retention, top procedures. Use this to find what's slowing the practice down." },
  };

  function ribbonTabs() {
    // Preview mode shows only the 5 essentials no matter the skill-level selector
    const previewIds = new Set(['today','overview','chart','schedule','ledger']);
    if (state.access !== 'student') {
      return Object.entries(MODULES).filter(([id]) => previewIds.has(id)).map(([id, m]) => ({ id, ...m }));
    }
    const level = state.ui.skillLevel === 'all' ? 3 : state.ui.skillLevel === 'standard' ? 2 : 1;
    return Object.entries(MODULES).filter(([_, m]) => m.level <= level).map(([id, m]) => ({ id, ...m }));
  }

  function renderRibbon() {
    const tabs = ribbonTabs();
    return `
      <div class="pp-ribbon px-3 flex items-center gap-1 overflow-x-auto">
        ${tabs.map(t => `
          <button data-action="set-module" data-module="${t.id}" title="${escapeHtml(t.what)}"
            class="px-3 py-2.5 text-[12px] font-medium border-b-2 ${state.module === t.id ? 'pp-tab-active' : 'border-transparent text-slate-600 hover:text-slate-900 hover:bg-slate-100'}">
            ${t.label}
            <kbd class="ml-1.5 opacity-60">${t.shortcut}</kbd>
          </button>
        `).join('')}
        <span class="flex-1"></span>
        <div class="flex items-center gap-2 pr-1">
          <span class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold hidden sm:inline">Mode</span>
          <select data-action="skill-level" class="text-[11px] bg-white border border-slate-300 rounded px-1.5 py-1" title="Show fewer or more tabs based on your experience level">
            <option value="new"      ${state.ui.skillLevel === 'new' ? 'selected' : ''}>New hire (essentials)</option>
            <option value="standard" ${state.ui.skillLevel === 'standard' ? 'selected' : ''}>Standard</option>
            <option value="all"      ${state.ui.skillLevel === 'all' ? 'selected' : ''}>Advanced (all tabs)</option>
          </select>
          <button data-action="toggle-help" class="${state.ui.helpMode ? 'bg-teal-600 text-white' : 'bg-slate-100 text-slate-700'} px-2 py-1 rounded text-[11px] font-medium" title="Turn explanatory banners on/off">
            ${state.ui.helpMode ? '✓ Help on' : 'Help'}
          </button>
        </div>
      </div>
    `;
  }

  // ── Module help banner shown above each module's content ───────
  function renderHelpBanner(moduleId) {
    if (!state.ui.helpMode) return '';
    const m = MODULES[moduleId];
    if (!m) return '';
    return `
      <div class="bg-teal-50 border border-teal-200 rounded p-3 mb-3 text-[12px] flex items-start gap-3">
        <div class="text-2xl select-none" aria-hidden="true">💡</div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-teal-900">${escapeHtml(m.what)}</div>
          <div class="text-teal-800 mt-0.5">${escapeHtml(m.desc)}</div>
        </div>
        <button data-action="dismiss-help" class="text-teal-700 hover:bg-teal-100 px-2 py-0.5 rounded text-[10px] font-semibold" title="Hide help banners on every screen">Hide</button>
      </div>
    `;
  }

  // ── Sidebar (patient list with search + tabs) ──────────────────
  function renderSidebar() {
    const list = filteredPatients();
    const tabs = [
      { id: 'all',      label: 'All',      cls: 'chip-slate' },
      { id: 'recall',   label: 'Recall',   cls: 'chip-emerald' },
      { id: 'new',      label: 'New',      cls: 'chip-sky' },
      { id: 'overdue',  label: 'Overdue',  cls: 'chip-rose' },
    ];
    return `
      ${state.ui.sidebarOpen && state.ui.isMobile ? '<div class="pp-backdrop" data-action="close-sidebar"></div>' : ''}
      <aside class="pp-sidebar w-72 flex flex-col ${state.ui.sidebarOpen ? 'open' : ''}">
        <div class="p-2 border-b border-slate-200">
          <div class="flex items-center gap-1 mb-1.5 md:hidden">
            <span class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold flex-1">Patients</span>
            <button data-action="close-sidebar" class="text-slate-500 hover:text-slate-900 px-2 py-1 rounded hover:bg-slate-100" aria-label="Close patient list">✕</button>
          </div>
          <div class="relative">
            <input id="patient-search" data-action="patient-filter"
              value="${escapeHtml(state.ui.patientFilter)}"
              placeholder="Search patients (F)..."
              class="w-full pl-7 pr-2 py-1.5 text-[12px] bg-slate-50 border border-slate-300 rounded focus:outline-none focus:border-teal-600" />
            <svg class="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-4.3-4.3M10.5 18a7.5 7.5 0 110-15 7.5 7.5 0 010 15z"/></svg>
          </div>
          <div class="flex gap-1 mt-2">
            ${tabs.map(t => `
              <button data-action="patient-filter-tab" data-tab="${t.id}"
                class="px-2 py-0.5 text-[11px] rounded ${state.ui.patientFilterTab === t.id ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}">
                ${t.label}
              </button>
            `).join('')}
            <button data-action="open-modal" data-modal="new-patient" class="ml-auto btn btn-primary !py-0.5 !px-2 !text-[11px]" title="New patient (N)">＋ New</button>
          </div>
        </div>
        <div class="flex-1 overflow-auto">
          ${list.length === 0 ? `
            <div class="p-6 text-center text-[12px] text-slate-500">No patients match.</div>
          ` : list.map(p => renderPatientRow(p)).join('')}
        </div>
        <div class="p-2 border-t border-slate-200 text-[11px] text-slate-500 flex justify-between">
          <span>${list.length} of ${state.patients.length} pts</span>
          <button data-action="open-modal" data-modal="audit" class="hover:text-teal-700">Audit log</button>
        </div>
      </aside>
    `;
  }

  function renderPatientRow(p) {
    const sel = p.id === state.currentPatientId;
    const due = p.recall?.due ? new Date(p.recall.due) : null;
    const today = new Date('2026-05-04');
    const dueDays = due ? Math.round((due - today) / 86400000) : null;
    const recallChip = dueDays != null
      ? (dueDays < -30 ? `<span class="chip chip-rose">overdue</span>`
        : dueDays < 0 ? `<span class="chip chip-amber">recall due</span>`
        : dueDays < 30 ? `<span class="chip chip-emerald">due ${dueDays}d</span>`
        : '')
      : '';
    const balance = balanceFor(p);
    const balChip = balance > 0
      ? `<span class="text-rose-600 font-semibold mono">${fmt.money(balance)}</span>`
      : `<span class="text-slate-400 mono">${fmt.money(0)}</span>`;
    return `
      <button data-action="select-patient" data-id="${p.id}"
        class="w-full text-left px-2.5 py-2 border-b border-slate-100 hover:bg-slate-50 ${sel ? 'bg-teal-50 border-l-4 border-l-teal-600' : 'border-l-4 border-l-transparent'}">
        <div class="flex items-center gap-2">
          <img src="${avatarUrl(p.first + ' ' + p.last)}" alt="" class="w-7 h-7 rounded-full bg-slate-200" />
          <div class="flex-1 min-w-0">
            <div class="text-[13px] font-semibold text-slate-900 truncate">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</div>
            <div class="text-[11px] text-slate-500 flex items-center gap-1.5 mono">
              ${p.id} · ${fmt.age(p.dob)}y ${escapeHtml(p.sex || '')}
            </div>
          </div>
          <div class="text-right">
            ${(p.alerts || []).length ? `<span class="chip chip-rose" title="${escapeHtml(p.alerts.join(', '))}">!</span>` : ''}
          </div>
        </div>
        <div class="flex items-center justify-between mt-1">
          ${recallChip || `<span class="text-[10px] text-slate-400">${escapeHtml(p.insurance?.primary?.carrier || 'self-pay')}</span>`}
          ${balChip}
        </div>
      </button>
    `;
  }

  // ── Patient banner (sticky, with name/photo/alerts) ────────────
  function renderBanner() {
    // Hide banner for practice-wide modules
    if (['today','schedule','recall','claims','reports','lab'].includes(state.module)) return '';
    const p = currentPatient();
    if (!p) return `<div class="p-8 text-slate-400">No patient selected.</div>`;
    const ins = p.insurance?.primary;
    const alerts = (p.alerts || []);
    const balance = balanceFor(p);
    const balanceColor = balance > 0 ? 'text-rose-600' : 'text-slate-700';
    return `
      <header class="bg-white border-b border-slate-200 px-4 py-3 flex flex-wrap gap-4 items-center sticky top-0 z-10">
        <img src="${avatarUrl(p.first + ' ' + p.last)}" class="w-14 h-14 rounded-full border-2 border-slate-200" alt="" />
        <div class="flex-1 min-w-[220px]">
          <div class="flex items-center gap-2 flex-wrap">
            <h1 class="text-lg font-semibold text-slate-900">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</h1>
            ${p.preferred && p.preferred !== p.first ? `<span class="text-slate-400 text-[12px]">"${escapeHtml(p.preferred)}"</span>` : ''}
            <span class="chip chip-slate mono">${escapeHtml(p.id)}</span>
            ${p.medical?.premedicate ? '<span class="chip chip-amber">PREMED</span>' : ''}
            ${(p.medical?.allergies || []).filter(a => a !== 'NKDA').length ? '<span class="chip chip-rose">ALLERGY</span>' : ''}
          </div>
          <div class="text-[12px] text-slate-500 flex flex-wrap gap-x-4 gap-y-0.5 mt-0.5">
            <span>DOB <span class="mono text-slate-700">${fmt.dateShort(p.dob)}</span> (${fmt.age(p.dob)} y)</span>
            <span>${escapeHtml(p.sex || '')}${p.pronouns ? ' · ' + escapeHtml(p.pronouns) : ''}</span>
            <span class="mono">${escapeHtml(p.phone || '')}</span>
            ${p.familyId ? `<span class="text-teal-700">Family ${escapeHtml(p.familyId)}</span>` : ''}
          </div>
        </div>
        <div class="text-right">
          <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Insurance</div>
          <div class="text-[12px] text-slate-800">${escapeHtml(ins?.carrier || 'Self-pay')}</div>
          <div class="text-[11px] text-slate-500 mono">Used ${fmt.money(ins?.used || 0)}/${ins?.max ? fmt.money(ins.max) : '—'}</div>

        <div class="text-right border-l border-slate-200 pl-4">
          <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Balance</div>
          <div class="text-lg ${balanceColor} font-semibold mono">${fmt.money(balance)}</div>

        </div>
        ${alerts.length ? `
          <div class="basis-full flex flex-wrap gap-1.5 pt-2 border-t border-slate-100 -mx-4 px-4">
            ${alerts.map(a => `<span class="chip chip-amber">⚠ ${escapeHtml(a)}</span>`).join('')}
          </div>
        ` : ''}
      </header>
    `;
  }

  // ── Module router ──────────────────────────────────────────────
  function renderModule() {
    const helpBanner = renderHelpBanner(state.module);
    const wrap = (inner) => `<div class="pp-fade p-4 max-w-[1400px] mx-auto">${helpBanner}${inner}</div>`;
    // Practice-wide modules don't require a selected patient
    if (state.module === 'today')    return wrap(renderToday());
    if (state.module === 'recall')   return wrap(renderRecall());
    if (state.module === 'schedule') return wrap(renderSchedule());
    if (state.module === 'claims')   return wrap(renderClaims());
    if (state.module === 'lab')      return wrap(renderLab());
    if (state.module === 'reports')  return wrap(renderReports());
    const p = currentPatient();
    if (!p) return `<div class="p-8 text-slate-400">Select a patient.</div>`;
    switch (state.module) {
      case 'overview': return wrap(renderOverview(p));
      case 'chart':    return wrap(renderChart(p));
      case 'ledger':   return wrap(renderLedger(p));
      case 'tx':       return wrap(renderTxPlan(p));
      case 'perio':    return wrap(renderPerio(p));
      case 'vitals':   return wrap(renderVitals(p));
      case 'rx':       return wrap(renderRx(p));
      case 'comms':    return wrap(renderComms(p));
      case 'forms':    return wrap(renderForms(p));
      case 'imaging':  return wrap(renderImaging(p));
      default: return '';
    }
  }

          ${med.notes ? `<div class="mt-3 p-2 bg-amber-50 border border-amber-200 rounded text-[12px]"><span class="font-semibold">Note:</span> ${escapeHtml(med.notes)}</div>` : ''}
          <label class="flex items-center gap-2 mt-3 text-[12px]">

  function field(key, label, value, type = 'text', span = 1) {

      </label>

  // ── Stubs for modules that arrive in subsequent pushes ─────────
  // ── Today dashboard (practice-wide hub) ────────────────────────
  function renderToday() {
    const today = new Date('2026-05-04');
    const todayStr = '2026-05-04';

    // Recall buckets
    const buckets = { overdue: [], dueSoon: [], dueLater: [] };
    state.patients.forEach(p => {
      const due = p.recall?.due ? new Date(p.recall.due) : null;
      if (!due) return;
      const days = Math.round((due - today) / 86400000);
      if (days < -7) buckets.overdue.push({ p, days });
      else if (days <= 14) buckets.dueSoon.push({ p, days });
      else if (days <= 60) buckets.dueLater.push({ p, days });
    });
    buckets.overdue.sort((a, b) => a.days - b.days);
    buckets.dueSoon.sort((a, b) => a.days - b.days);

    // Outstanding A/R
    const arBuckets = { current: 0, d30: 0, d60: 0, d90: 0, total: 0, count: 0 };
    state.patients.forEach(p => {
      const bal = balanceFor(p);
      if (bal <= 0) return;
      arBuckets.count++;
      arBuckets.total += bal;
      // Use most recent ledger entry date as proxy
      const lastDate = (p.ledger || []).map(e => e.date).filter(Boolean).sort().slice(-1)[0];
      const ageDays = lastDate ? Math.round((today - new Date(lastDate)) / 86400000) : 0;
      if (ageDays >= 90)      arBuckets.d90 += bal;
      else if (ageDays >= 60) arBuckets.d60 += bal;
      else if (ageDays >= 30) arBuckets.d30 += bal;
      else                    arBuckets.current += bal;
    });

    // Today's production (from ledger)
    let prodToday = 0, prodMonth = 0;
    const monthPrefix = todayStr.slice(0, 7);
    state.patients.forEach(p => (p.ledger || []).forEach(e => {
      const fee = Number(e.fee) || 0;
      if (e.date === todayStr) prodToday += fee;
      if ((e.date || '').startsWith(monthPrefix)) prodMonth += fee;
    }));
    const prodGoalDay = 2500;
    const prodGoalMonth = 50000;

    // Treatment-plan opportunity
    let unscheduledTx = 0;
    state.patients.forEach(p => (p.treatmentPlan || []).forEach(l => unscheduledTx += (Number(l.fee) || 0)));

    // Today's appointments — derived from patients with a recall due today/this week + their provider
    const todaysAppts = state.patients
      .filter(p => p.recall?.due)
      .map(p => ({ p, when: new Date(p.recall.due), days: Math.round((new Date(p.recall.due) - today) / 86400000) }))
      .filter(x => x.days >= -3 && x.days <= 3)
      .sort((a, b) => a.days - b.days)
      .slice(0, 6);

    // Recent activity feed from session audit
    const feed = state.audit.slice(0, 8);

    return `
      <div class="space-y-4">
        <!-- Header strip -->
        <div class="flex flex-wrap items-end justify-between gap-2">
          <div>
            <h1 class="text-2xl font-semibold text-slate-900 leading-tight">Good ${greeting()}, ${escapeHtml(state.user?.first_name || 'Student')}.</h1>
            <p class="text-[12px] text-slate-500 mt-0.5">${today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })} · Premier Dental Academy of Longview</p>
          </div>
          <div class="flex flex-wrap gap-2">
            <button class="btn btn-soft" data-action="open-modal" data-modal="new-patient">＋ New patient</button>
            <button class="btn btn-soft" data-action="open-palette">⌘K Search</button>
            <button class="btn btn-primary" data-action="set-module" data-module="recall">Recall pipeline →</button>
          </div>
        </div>

        <!-- KPI tiles -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
          ${tile('Today\'s production', fmt.money(prodToday), `Goal ${fmt.money(prodGoalDay)}`, Math.min(100, (prodToday / prodGoalDay) * 100), 'teal')}
          ${tile('This month', fmt.money(prodMonth), `Goal ${fmt.money(prodGoalMonth)}`, Math.min(100, (prodMonth / prodGoalMonth) * 100), 'sky')}
          ${tile('Outstanding A/R', fmt.money(arBuckets.total), `${arBuckets.count} accounts`, null, 'rose')}
          ${tile('Unscheduled tx', fmt.money(unscheduledTx), 'Across treatment plans', null, 'amber')}
        </div>

        <div class="grid lg:grid-cols-3 gap-4">
          <!-- Recall pipeline -->
          <section class="bg-white rounded border border-slate-200 lg:col-span-2 overflow-hidden">
            <header class="px-4 py-3 border-b border-slate-200 flex items-center justify-between">
              <div>
                <h2 class="font-semibold text-[13px]">Recall pipeline</h2>
                <p class="text-[11px] text-slate-500 mt-0.5">Click any patient to follow up. Send a recall text in two taps.</p>
              </div>
              <button class="text-[11px] text-teal-700 hover:underline" data-action="set-module" data-module="recall">Open pipeline →</button>
            </header>
            <div class="grid grid-cols-3 divide-x divide-slate-200 text-center text-[12px]">
              <div class="p-3"><div class="text-2xl font-semibold text-rose-600">${buckets.overdue.length}</div><div class="text-slate-500 text-[11px] uppercase tracking-wide">Overdue</div></div>
              <div class="p-3"><div class="text-2xl font-semibold text-amber-600">${buckets.dueSoon.length}</div><div class="text-slate-500 text-[11px] uppercase tracking-wide">Due ≤ 14 days</div></div>
              <div class="p-3"><div class="text-2xl font-semibold text-slate-600">${buckets.dueLater.length}</div><div class="text-slate-500 text-[11px] uppercase tracking-wide">Due 15–60 days</div></div>
            </div>
            <ul class="divide-y divide-slate-100 max-h-72 overflow-auto">
              ${[...buckets.overdue.slice(0, 4), ...buckets.dueSoon.slice(0, 4)].map(({p, days}) => `
                <li class="px-4 py-2 flex items-center gap-3 hover:bg-slate-50">
                  <img src="${avatarUrl(p.first + ' ' + p.last)}" class="w-8 h-8 rounded-full" alt="">
                  <button class="flex-1 text-left" data-action="select-patient-and-go" data-id="${p.id}" data-module="overview">
                    <div class="text-[13px] font-medium text-slate-900">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</div>
                    <div class="text-[11px] text-slate-500">${escapeHtml(p.provider || '')} · ${escapeHtml(p.phone || '')}</div>
                  </button>
                  <span class="chip ${days < 0 ? 'chip-rose' : days < 7 ? 'chip-amber' : 'chip-slate'} mono">${days < 0 ? `${-days}d late` : `${days}d`}</span>
                  <button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="quick-text-recall" data-id="${p.id}" title="Send a recall text">Text</button>
                </li>
              `).join('') || '<li class="p-6 text-center text-[12px] text-slate-500">All caught up — no patients due.</li>'}
            </ul>
          </section>

          <!-- A/R aging -->
          <section class="bg-white rounded border border-slate-200 overflow-hidden">
            <header class="px-4 py-3 border-b border-slate-200">
              <h2 class="font-semibold text-[13px]">A/R aging</h2>
              <p class="text-[11px] text-slate-500 mt-0.5">Outstanding receivables.</p>
            </header>
            <div class="p-4">
              ${arRow('Current',     arBuckets.current, arBuckets.total, 'bg-emerald-500')}
              ${arRow('30+ days',    arBuckets.d30,     arBuckets.total, 'bg-amber-500')}
              ${arRow('60+ days',    arBuckets.d60,     arBuckets.total, 'bg-orange-500')}
              ${arRow('90+ days',    arBuckets.d90,     arBuckets.total, 'bg-rose-600')}
              <div class="border-t border-slate-200 mt-3 pt-3 flex justify-between text-[13px] font-semibold"><span>Total</span><span class="mono">${fmt.money(arBuckets.total)}</span></div>
            </div>
          </section>
        </div>

        <div class="grid lg:grid-cols-3 gap-4">
          <!-- Today's appointments (derived) -->
          <section class="bg-white rounded border border-slate-200 lg:col-span-2 overflow-hidden">
            <header class="px-4 py-3 border-b border-slate-200 flex items-center justify-between">
              <h2 class="font-semibold text-[13px]">Around today</h2>
              <button class="text-[11px] text-teal-700 hover:underline" data-action="set-module" data-module="schedule">Open schedule →</button>
            </header>
            ${todaysAppts.length === 0
              ? '<div class="p-6 text-[12px] text-slate-500 text-center">Nothing scheduled in the next 3 days.</div>'
              : `<table class="pp"><thead><tr><th>When</th><th>Patient</th><th>Provider</th><th>Reason</th><th></th></tr></thead><tbody>${todaysAppts.map(({p, when, days}) => `
                <tr>
                  <td class="mono">${days === 0 ? 'Today' : days < 0 ? `${-days}d ago` : `${days}d`}</td>
                  <td><button class="text-teal-700 hover:underline" data-action="select-patient-and-go" data-id="${p.id}" data-module="overview">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</button></td>
                  <td>${escapeHtml(p.provider || '')}</td>
                  <td>Recall — ${escapeHtml(p.type || '—')}</td>
                  <td class="text-right"><button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="quick-text-recall" data-id="${p.id}">Confirm</button></td>
                </tr>`).join('')}</tbody></table>`}
          </section>

          <!-- Activity feed -->
          <section class="bg-white rounded border border-slate-200 overflow-hidden">
            <header class="px-4 py-3 border-b border-slate-200">
              <h2 class="font-semibold text-[13px]">Practice activity</h2>
            </header>
            <ul class="p-3 space-y-2 max-h-72 overflow-auto">
              ${feed.length === 0 ? '<li class="text-[12px] text-slate-500">Take an action to see it here.</li>' :
              feed.map(a => `
                <li class="flex items-start gap-2">
                  <span class="mono text-[10px] text-slate-400 mt-0.5 shrink-0 w-12">${a.at.slice(11, 16)}</span>
                  <span class="text-[12px] text-slate-700"><span class="font-medium capitalize">${escapeHtml(a.action.replace(/_/g, ' '))}</span> <span class="text-slate-400">${escapeHtml(JSON.stringify(a.metadata || {}).slice(0, 60))}</span></span>
                </li>
              `).join('')}
            </ul>
          </section>
        </div>
      </div>
    `;
  }

  function greeting() {
    const h = new Date().getHours();
    if (h < 12) return 'morning';
    if (h < 17) return 'afternoon';
    return 'evening';
  }
  function tile(label, value, sub, pct, tone) {
    const toneCls = ({ teal: 'bg-teal-600', sky: 'bg-sky-600', rose: 'bg-rose-600', amber: 'bg-amber-500' })[tone];
    return `
      <div class="bg-white rounded border border-slate-200 p-3">
        <div class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold">${escapeHtml(label)}</div>
        <div class="text-2xl font-semibold mono text-slate-900 mt-1">${escapeHtml(value)}</div>
        <div class="text-[11px] text-slate-500 mt-0.5">${escapeHtml(sub)}</div>
        ${pct != null ? `<div class="h-1.5 bg-slate-100 rounded mt-2"><div class="h-1.5 rounded ${toneCls}" style="width:${pct}%"></div></div>` : ''}
      </div>
    `;
  }
  function arRow(label, amount, total, color) {
    const pct = total > 0 ? Math.round((amount / total) * 100) : 0;
    return `
      <div class="mb-2">
        <div class="flex justify-between text-[12px]"><span>${label}</span><span class="mono">${fmt.money(amount)}</span></div>
        <div class="h-1.5 bg-slate-100 rounded mt-1"><div class="h-1.5 rounded ${color}" style="width:${pct}%"></div></div>
      </div>
    `;
  }

  // ── Communications module ──────────────────────────────────────
  const COMM_KINDS = [
    { id: 'sms',       label: 'Text message', icon: '💬', color: 'sky' },
    { id: 'call',      label: 'Phone call',   icon: '📞', color: 'emerald' },
    { id: 'email',     label: 'Email',        icon: '✉️', color: 'slate' },
    { id: 'voicemail', label: 'Voicemail',    icon: '🎙️', color: 'amber' },
    { id: 'note',      label: 'Note',         icon: '📝', color: 'slate' },
    { id: 'inperson',  label: 'In person',    icon: '👋', color: 'emerald' },
  ];

  function renderComms(p) {
    const comms = (p.comms || []).slice().sort((a, b) => (b.at || '').localeCompare(a.at || ''));
    const filter = state.ui.commsFilter || 'all';
    const filtered = filter === 'all' ? comms : comms.filter(c => c.kind === filter);
    return `
      <div class="space-y-3">
        <div class="bg-white rounded border border-slate-200 p-3 flex flex-wrap gap-2 items-center">
          <span class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold mr-2">Filter</span>
          <button data-action="comms-filter" data-f="all" class="px-2 py-1 text-[11px] rounded ${filter === 'all' ? 'bg-slate-900 text-white' : 'bg-slate-100 hover:bg-slate-200'}">All (${comms.length})</button>
          ${COMM_KINDS.map(k => `<button data-action="comms-filter" data-f="${k.id}" class="px-2 py-1 text-[11px] rounded ${filter === k.id ? 'bg-slate-900 text-white' : 'bg-slate-100 hover:bg-slate-200'}">${k.icon} ${k.label}</button>`).join('')}
          <span class="flex-1"></span>
          <button class="btn btn-soft" data-action="open-modal" data-modal="quick-text" data-id="${p.id}">💬 Send text</button>
          <button class="btn btn-soft" data-action="open-modal" data-modal="log-call" data-id="${p.id}">📞 Log call</button>
          <button class="btn btn-primary" data-action="open-modal" data-modal="log-comm" data-id="${p.id}">＋ Log communication</button>
        </div>

        <div class="bg-white rounded border border-slate-200 overflow-hidden">
          ${filtered.length === 0
            ? '<div class="p-8 text-center text-[12px] text-slate-500">No communications logged${filter !== "all" ? " of this type" : ""}. Use a button above to log one.</div>'
            : `<ul class="divide-y divide-slate-100">${filtered.map(c => commRow(c)).join('')}</ul>`}
        </div>
      </div>
    `;
  }

  function commRow(c) {
    const k = COMM_KINDS.find(k => k.id === c.kind) || { icon: '•', label: c.kind, color: 'slate' };
    const dirChip = c.direction ? `<span class="chip chip-${c.direction === 'in' ? 'sky' : 'emerald'}">${c.direction === 'in' ? '◀ inbound' : '▶ outbound'}</span>` : '';
    return `
      <li class="p-3 hover:bg-slate-50">
        <div class="flex items-start gap-3">
          <div class="text-xl shrink-0 select-none" aria-hidden="true">${k.icon}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-2 flex-wrap">
              <span class="text-[12px] font-semibold capitalize">${escapeHtml(k.label)}</span>
              ${dirChip}
              <span class="text-[11px] text-slate-500 mono">${c.at ? new Date(c.at).toLocaleString() : ''}</span>
              <span class="text-[11px] text-slate-500">by ${escapeHtml(c.by || '—')}</span>
            </div>
            <div class="text-[12px] text-slate-700 mt-1 whitespace-pre-wrap">${escapeHtml(c.text || '')}</div>
            ${c.subject ? `<div class="text-[11px] text-slate-500 mt-1">Subject: ${escapeHtml(c.subject)}</div>` : ''}
          </div>
        </div>
      </li>
    `;
  }

  // ── Insurance claims module ────────────────────────────────────
  function ensureClaims() { state.claims = state.claims || []; return state.claims; }

  function unclaimedProcedures() {
    // Returns ledger entries with code starting with D, status=completed, and not yet claimed,
    // grouped by patient + carrier
    const groups = new Map();
    state.patients.forEach(p => {
      const carrier = p.insurance?.primary?.carrier || 'Self-pay';
      if (/self.?pay|cash/i.test(carrier)) return; // self-pay doesn't generate claims
      (p.ledger || []).forEach((e, idx) => {
        if (!e.code || !/^D\d+/i.test(e.code)) return;
        if (e.claimed) return;
        if (!e.fee || e.fee <= 0) return;
        const k = `${p.id}|${carrier}`;
        if (!groups.has(k)) groups.set(k, { patient: p, carrier, lines: [] });
        groups.get(k).lines.push({ ledgerIdx: idx, ...e });
      });
    });
    return Array.from(groups.values());
  }

  function renderClaims() {
    const tab = state.ui.claimsTab || 'queue';
    const groups = unclaimedProcedures();
    const claims = ensureClaims().slice().sort((a, b) => (b.dateSubmitted || '').localeCompare(a.dateSubmitted || ''));
    const counts = {
      queue: groups.length,
      submitted: claims.filter(c => c.status === 'submitted').length,
      paid: claims.filter(c => c.status === 'paid').length,
      denied: claims.filter(c => c.status === 'denied').length,
      all: claims.length,
    };
    const totalQueueDollars = groups.reduce((a, g) => a + g.lines.reduce((b, l) => b + (Number(l.fee) || 0), 0), 0);
    const totalSubmitted = claims.filter(c => c.status === 'submitted').reduce((a, c) => a + c.totalBilled, 0);
    const totalPaid = claims.reduce((a, c) => a + (c.totalPaid || 0), 0);
    const totalOutstanding = claims.filter(c => ['submitted','partial'].includes(c.status)).reduce((a, c) => a + (c.totalBilled - (c.totalPaid || 0)), 0);

    return `
      <div class="space-y-3">
        <div class="flex flex-wrap items-end justify-between gap-2">
          <div>
            <h1 class="text-xl font-semibold text-slate-900 leading-tight">Insurance claims</h1>
            <p class="text-[12px] text-slate-500 mt-0.5">Generate, submit, and track claims through receipt of payment.</p>
          </div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          ${perioStatTile('Ready to bill',  fmt.money(totalQueueDollars), `${counts.queue} patient/carrier groups`, totalQueueDollars > 0 ? 'amber' : 'emerald')}
          ${perioStatTile('Submitted',      fmt.money(totalSubmitted),    `${counts.submitted} pending`)}
          ${perioStatTile('Outstanding',    fmt.money(totalOutstanding),  'Awaiting payment', totalOutstanding > 0 ? 'amber' : 'emerald')}
          ${perioStatTile('Lifetime paid',  fmt.money(totalPaid),         `${counts.paid} claims`, 'emerald')}
        </div>

        <div class="bg-white rounded border border-slate-200 px-1 flex flex-wrap gap-0.5">
          ${[
            { id: 'queue',     label: `Ready to bill`,    n: counts.queue },
            { id: 'submitted', label: `Submitted`,        n: counts.submitted },
            { id: 'paid',      label: `Paid`,             n: counts.paid },
            { id: 'denied',    label: `Denied`,           n: counts.denied },
            { id: 'all',       label: `All claims`,       n: counts.all },
          ].map(t => `
            <button data-action="claims-tab" data-t="${t.id}"
              class="px-3 py-2 text-[12px] font-medium rounded-t ${tab === t.id ? 'text-teal-700 border-b-2 border-teal-600 -mb-px bg-teal-50/50' : 'text-slate-600 hover:text-slate-900 border-b-2 border-transparent'}">
              ${t.label} ${t.n != null ? `<span class="ml-1 text-[10px] mono px-1.5 py-0.5 rounded ${tab === t.id ? 'bg-teal-100 text-teal-800' : 'bg-slate-100 text-slate-600'}">${t.n}</span>` : ''}
            </button>
          `).join('')}
        </div>

        ${tab === 'queue' ? renderClaimsQueue(groups) : renderClaimsHistory(claims, tab)}
      </div>
    `;
  }

  function renderClaimsQueue(groups) {
    if (groups.length === 0) {
      return `<div class="bg-white rounded border border-slate-200 p-8 text-center"><div class="text-slate-900 font-semibold">No claims waiting</div><div class="text-slate-500 text-[12px] mt-1">All completed insurance procedures have been billed. Post a procedure on a patient with insurance to see it here.</div></div>`;
    }
    return `
      <div class="bg-white rounded border border-slate-200 overflow-hidden">
        <table class="pp">
          <thead><tr><th>Patient</th><th>Carrier</th><th>Procedures</th><th class="text-right">Total billable</th><th class="text-right">Action</th></tr></thead>
          <tbody>
            ${groups.map(g => {
              const total = g.lines.reduce((a, l) => a + (Number(l.fee) || 0), 0);
              return `
                <tr>
                  <td>
                    <button class="text-teal-700 hover:underline font-medium" data-action="select-patient-and-go" data-id="${g.patient.id}" data-module="ledger">${escapeHtml(g.patient.last)}, ${escapeHtml(g.patient.first)}</button>
                    <div class="text-[10px] text-slate-500 mono">${g.patient.id}</div>
                  </td>
                  <td>${escapeHtml(g.carrier)}<div class="text-[10px] text-slate-500 mono">${escapeHtml(g.patient.insurance?.primary?.group || '')}</div></td>
                  <td class="text-[12px]">
                    ${g.lines.slice(0, 3).map(l => `<div class="truncate"><span class="mono font-semibold">${escapeHtml(l.code)}</span> ${escapeHtml(l.desc || '')} ${l.tooth ? '#'+l.tooth : ''} <span class="text-slate-400">${fmt.dateShort(l.date)}</span></div>`).join('')}
                    ${g.lines.length > 3 ? `<div class="text-[11px] text-slate-500">+ ${g.lines.length - 3} more</div>` : ''}
                  </td>
                  <td class="text-right mono font-semibold">${fmt.money(total)}</td>
                  <td class="text-right">
                    <button class="btn btn-primary !py-1 !px-2 !text-[11px]" data-action="claim-generate" data-pid="${g.patient.id}" data-carrier="${escapeHtml(g.carrier)}">Generate claim →</button>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderClaimsHistory(claims, tab) {
    const filtered = claims.filter(c => tab === 'all' ? true : c.status === tab);
    if (filtered.length === 0) {
      return `<div class="bg-white rounded border border-slate-200 p-8 text-center text-[12px] text-slate-500">No ${tab === 'all' ? '' : tab} claims to show.</div>`;
    }
    return `
      <div class="bg-white rounded border border-slate-200 overflow-hidden">
        <table class="pp">
          <thead><tr><th>Submitted</th><th>Patient</th><th>Carrier</th><th>Service date</th><th>Procedures</th><th class="text-right">Billed</th><th class="text-right">Paid</th><th>Status</th><th class="text-right">Actions</th></tr></thead>
          <tbody>
            ${filtered.map(c => {
              const p = state.patients.find(pp => pp.id === c.patientId);
              const statusColor = ({
                'submitted': 'chip-sky',
                'paid':      'chip-emerald',
                'partial':   'chip-amber',
                'denied':    'chip-rose',
              })[c.status] || 'chip-slate';
              return `
                <tr>
                  <td class="mono text-[12px]">${fmt.dateShort(c.dateSubmitted)}</td>
                  <td>${p ? `<button class="text-teal-700 hover:underline" data-action="select-patient-and-go" data-id="${p.id}" data-module="ledger">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</button>` : '—'}</td>
                  <td class="text-[12px]">${escapeHtml(c.carrierName)}</td>
                  <td class="mono text-[12px]">${fmt.dateShort(c.dateOfService)}</td>
                  <td class="text-[12px]">${c.procedures.map(pr => pr.code).join(', ')}</td>
                  <td class="text-right mono">${fmt.money(c.totalBilled)}</td>
                  <td class="text-right mono">${fmt.money(c.totalPaid || 0)}</td>
                  <td><span class="chip ${statusColor}">${c.status}</span></td>
                  <td class="text-right whitespace-nowrap">
                    ${c.status === 'submitted' ? `<button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="claim-post-eob" data-id="${c.id}" title="Post EOB / payment">$</button>` : ''}
                    <button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="claim-pdf" data-id="${c.id}" title="ADA claim form">PDF</button>
                    <button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="open-modal" data-modal="claim-detail" data-id="${c.id}">view</button>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  // ── Reports module ─────────────────────────────────────────────
  function renderReports() {
    const today = new Date('2026-05-04');
    const yyyy = today.getFullYear();
    const monthStart = `${yyyy}-${String(today.getMonth()+1).padStart(2,'0')}-01`;
    const ytdStart = `${yyyy}-01-01`;

    // Production by provider
    const prodBy = {};   // providerId -> { today, week, month, ytd }
    const today7 = (() => { const d = new Date(today); d.setDate(d.getDate() - 6); return d.toISOString().slice(0,10); })();
    state.patients.forEach(p => (p.ledger || []).forEach(e => {
      const fee = Number(e.fee) || 0;
      if (!fee) return;
      const prov = e.provider || p.provider || 'Unassigned';
      const date = e.date || '';
      prodBy[prov] = prodBy[prov] || { today: 0, week: 0, month: 0, ytd: 0 };
      if (date >= ytdStart)    prodBy[prov].ytd += fee;
      if (date >= monthStart)  prodBy[prov].month += fee;
      if (date >= today7)      prodBy[prov].week += fee;
      if (date === '2026-05-04') prodBy[prov].today += fee;
    }));
    const totalToday = Object.values(prodBy).reduce((a, x) => a + x.today, 0);
    const totalMonth = Object.values(prodBy).reduce((a, x) => a + x.month, 0);
    const totalYtd = Object.values(prodBy).reduce((a, x) => a + x.ytd, 0);

    // Hygiene production %
    let hygProd = 0, totalProd = 0;
    state.patients.forEach(p => (p.ledger || []).forEach(e => {
      const fee = Number(e.fee) || 0; if (!fee) return;
      totalProd += fee;
      if (/hyg|prophy|sealant|fluoride|srp|perio main/i.test((e.provider || '') + ' ' + (e.desc || ''))) hygProd += fee;
    }));
    const hygPct = totalProd > 0 ? Math.round(hygProd / totalProd * 100) : 0;

    // Tx acceptance
    let txPresented = 0, txAccepted = 0, txCompleted = 0;
    state.patients.forEach(p => (p.treatmentPlan || []).forEach(l => {
      const fee = Number(l.fee) || 0;
      txPresented += fee;
      if (['accepted','scheduled','inprogress','completed'].includes(l.status)) txAccepted += fee;
      if (l.status === 'completed') txCompleted += fee;
    }));
    const txAcceptPct = txPresented > 0 ? Math.round(txAccepted / txPresented * 100) : 0;
    const txCompletePct = txAccepted > 0 ? Math.round(txCompleted / txAccepted * 100) : 0;

    // No-show + cancellation rate from schedule
    const sched = ensureSchedule();
    let totalAppt = 0, noShows = 0, cancelled = 0, completed = 0;
    Object.values(sched).forEach(day => day.forEach(a => {
      totalAppt++;
      if (a.status === 'no-show') noShows++;
      if (a.status === 'cancelled') cancelled++;
      if (a.status === 'completed' || a.status === 'arrived') completed++;
    }));
    const noShowPct = totalAppt > 0 ? Math.round(noShows / totalAppt * 100) : 0;
    const cancelPct = totalAppt > 0 ? Math.round(cancelled / totalAppt * 100) : 0;

    // Recare retention: % of patients with a recall date that's within their interval
    let onRecare = 0, dueRecare = 0;
    state.patients.forEach(p => {
      const due = p.recall?.due ? new Date(p.recall.due) : null;
      if (!due) return;
      const days = Math.round((due - today) / 86400000);
      if (days >= -7) onRecare++; else dueRecare++;
    });
    const recarePct = (onRecare + dueRecare) > 0 ? Math.round(onRecare / (onRecare + dueRecare) * 100) : 0;

    // New patient counts
    const newPts = state.patients.filter(p => p.type === 'new').length;
    const newPtsThisMonth = state.patients.filter(p => p.type === 'new').length; // approximation

    // A/R aging (reuse Today calc)
    const arBuckets = { current: 0, d30: 0, d60: 0, d90: 0, total: 0, count: 0 };
    state.patients.forEach(p => {
      const bal = balanceFor(p); if (bal <= 0) return;
      arBuckets.count++; arBuckets.total += bal;
      const lastDate = (p.ledger || []).map(e => e.date).filter(Boolean).sort().slice(-1)[0];
      const ageDays = lastDate ? Math.round((today - new Date(lastDate)) / 86400000) : 0;
      if (ageDays >= 90) arBuckets.d90 += bal;
      else if (ageDays >= 60) arBuckets.d60 += bal;
      else if (ageDays >= 30) arBuckets.d30 += bal;
      else arBuckets.current += bal;
    });

    // Top procedures (by frequency)
    const procFreq = {};
    state.patients.forEach(p => (p.ledger || []).forEach(e => {
      if (!e.code) return;
      procFreq[e.code] = procFreq[e.code] || { count: 0, fee: 0, desc: e.desc };
      procFreq[e.code].count++;
      procFreq[e.code].fee += Number(e.fee) || 0;
    }));
    const topProcs = Object.entries(procFreq).map(([code, x]) => ({ code, ...x })).sort((a,b) => b.count - a.count).slice(0, 8);

    return `
      <div class="space-y-4">
        <div class="flex flex-wrap items-end justify-between gap-2">
          <div>
            <h1 class="text-xl font-semibold text-slate-900 leading-tight">Practice reports</h1>
            <p class="text-[12px] text-slate-500 mt-0.5">As of ${today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}</p>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-soft" data-action="reports-print">⎙ Print</button>
            <button class="btn btn-soft" data-action="reports-csv">⬇ CSV</button>
          </div>
        </div>

        <!-- KPI tiles -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
          ${kpiCard('Production today', fmt.money(totalToday), '', 'teal')}
          ${kpiCard('Production MTD', fmt.money(totalMonth), 'Month-to-date', 'sky')}
          ${kpiCard('Production YTD', fmt.money(totalYtd), 'Year-to-date', 'emerald')}
          ${kpiCard('Outstanding A/R', fmt.money(arBuckets.total), `${arBuckets.count} accounts`, 'rose')}
          ${kpiCard('Hygiene production', hygPct + '%', `${fmt.money(hygProd)} of ${fmt.money(totalProd)}`, 'teal')}
          ${kpiCard('Case acceptance', txAcceptPct + '%', `${fmt.money(txAccepted)} / ${fmt.money(txPresented)}`, txAcceptPct >= 70 ? 'emerald' : txAcceptPct >= 40 ? 'amber' : 'rose')}
          ${kpiCard('No-show rate', noShowPct + '%', `${noShows} of ${totalAppt} appts`, noShowPct >= 8 ? 'rose' : noShowPct >= 4 ? 'amber' : 'emerald')}
          ${kpiCard('Recare retention', recarePct + '%', `${onRecare} on schedule`, recarePct >= 80 ? 'emerald' : recarePct >= 60 ? 'amber' : 'rose')}
        </div>

        <!-- Production by provider -->
        <section class="bg-white rounded border border-slate-200 overflow-hidden">
          <header class="px-4 py-3 border-b border-slate-200 flex items-center justify-between">
            <h2 class="font-semibold text-[13px]">Production by provider</h2>
            <span class="text-[11px] text-slate-500">All ledger entries with a fee &gt; 0</span>
          </header>
          <table class="pp">
            <thead><tr><th>Provider</th><th class="text-right">Today</th><th class="text-right">Last 7 days</th><th class="text-right">MTD</th><th class="text-right">YTD</th><th class="text-right">Share of YTD</th></tr></thead>
            <tbody>
              ${Object.entries(prodBy).sort((a,b) => b[1].ytd - a[1].ytd).map(([prov, x]) => `
                <tr>
                  <td>${escapeHtml(prov)}</td>
                  <td class="text-right mono">${fmt.money(x.today)}</td>
                  <td class="text-right mono">${fmt.money(x.week)}</td>
                  <td class="text-right mono">${fmt.money(x.month)}</td>
                  <td class="text-right mono font-semibold">${fmt.money(x.ytd)}</td>
                  <td class="text-right">
                    <div class="flex items-center gap-2 justify-end">

  function kpiCard(label, value, sub, tone) {
    const map = { teal:'text-teal-700', sky:'text-sky-700', emerald:'text-emerald-700', rose:'text-rose-700', amber:'text-amber-700' };
    const cls = map[tone] || 'text-slate-900';
    return `
      <div class="bg-white rounded border border-slate-200 p-3">
        <div class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold">${escapeHtml(label)}</div>
        <div class="text-2xl mono font-semibold ${cls} mt-1">${escapeHtml(value)}</div>
        <div class="text-[11px] text-slate-500 mt-0.5">${sub}</div>
      </div>
    `;
  }

  // ── Lab case tracking module ───────────────────────────────────
  const LAB_VENDORS = ['Glidewell', 'Aurum', 'Heritage Dental Lab', 'NDX Keller', 'Local lab partner'];
  const LAB_PROCEDURES = [
    { id: 'crown-pfm',    name: 'Crown — PFM',           defaultDays: 10 },
    { id: 'crown-zir',    name: 'Crown — Zirconia',      defaultDays: 12 },
    { id: 'crown-emax',   name: 'Crown — e.max',         defaultDays: 14 },
    { id: 'bridge-3unit', name: 'Bridge — 3 unit',       defaultDays: 14 },
    { id: 'denture-c',    name: 'Complete denture',      defaultDays: 21 },
    { id: 'denture-p',    name: 'Partial denture',       defaultDays: 21 },
    { id: 'nightguard',   name: 'Night guard',           defaultDays: 7 },
    { id: 'whitening',    name: 'Whitening trays',       defaultDays: 5 },
    { id: 'implant-cust', name: 'Custom implant abutment', defaultDays: 10 },
    { id: 'inlay-onlay',  name: 'Inlay / onlay',         defaultDays: 10 },
  ];

  function ensureLabCases() { state.labCases = state.labCases || []; return state.labCases; }

  function seedLabCases() {
    const cases = ensureLabCases();
    if (cases.length > 0) return;
    const today = new Date('2026-05-04');
    const offset = (n) => { const d = new Date(today); d.setDate(d.getDate() + n); return d.toISOString().slice(0,10); };
    const samples = [
      { patientIdx: 6,  proc: 'crown-emax',   tooth: '14', shade: 'A2', sent: -8,  status: 'in-lab' },
      { patientIdx: 9,  proc: 'crown-pfm',    tooth: '8',  shade: 'A3', sent: -3,  status: 'in-lab' },
      { patientIdx: 12, proc: 'bridge-3unit', tooth: '13–15', shade: 'B1', sent: -10, status: 'received', received: -2 },
      { patientIdx: 15, proc: 'denture-c',    tooth: 'Upper', shade: 'B2', sent: -18, status: 'in-lab' },
      { patientIdx: 19, proc: 'crown-zir',    tooth: '3',  shade: 'A2', sent: -15, status: 'overdue' },
      { patientIdx: 21, proc: 'crown-zir',    tooth: '5',  shade: 'A3', sent: -1,  status: 'in-lab' },
      { patientIdx: 23, proc: 'denture-c',    tooth: 'Upper + Lower', shade: 'A3.5', sent: -22, status: 'in-lab' },
      { patientIdx: 24, proc: 'implant-cust', tooth: '19', shade: 'A2', sent: -6,  status: 'in-lab' },
    ];
    samples.forEach(s => {
      const proc = LAB_PROCEDURES.find(x => x.id === s.proc);
      const p = state.patients[s.patientIdx]; if (!p) return;
      cases.push({
        id: 'LAB-' + (Math.floor(Math.random() * 90000) + 10000),
        patientId: p.id,
        providerId: 'will',
        labName: LAB_VENDORS[Math.floor(Math.random() * LAB_VENDORS.length)],
        procedureId: s.proc,
        procedureName: proc.name,
        tooth: s.tooth,
        shade: s.shade,
        notes: '',
        sentDate: offset(s.sent),
        dueDate: offset(s.sent + proc.defaultDays),
        receivedDate: s.received != null ? offset(s.received) : null,
        deliveredDate: null,
        status: s.status,
      });
    });
  }

  function renderLab() {
    seedLabCases();
    const cases = ensureLabCases();
    const tab = state.ui.labTab || 'open';
    const today = new Date('2026-05-04');
    const updated = cases.map(c => {
      const due = c.dueDate ? new Date(c.dueDate) : null;
      const days = due ? Math.round((due - today) / 86400000) : null;
      let status = c.status;
      if (status === 'in-lab' && days != null && days < 0) status = 'overdue';
      return { ...c, daysUntilDue: days, computedStatus: status };
    });
    const filters = {
      open:      c => ['in-lab', 'overdue'].includes(c.computedStatus),
      received:  c => c.computedStatus === 'received',
      delivered: c => c.computedStatus === 'delivered',
      remake:    c => c.computedStatus === 'remake',
      all:       () => true,
    };
    const visible = updated.filter(filters[tab] || (() => true));
    const counts = {
      open: updated.filter(filters.open).length,
      received: updated.filter(filters.received).length,
      delivered: updated.filter(filters.delivered).length,
      remake: updated.filter(filters.remake).length,
      overdue: updated.filter(c => c.computedStatus === 'overdue').length,
    };

    return `
      <div class="space-y-3">
        <div class="flex flex-wrap items-end justify-between gap-2">
          <div>
            <h1 class="text-xl font-semibold text-slate-900 leading-tight">Lab cases</h1>
            <p class="text-[12px] text-slate-500 mt-0.5">Track every crown, bridge, denture, and appliance from impression to seat.</p>
          </div>
          <button class="btn btn-primary" data-action="open-modal" data-modal="lab-add">＋ New case</button>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          ${kpiCard('Open at lab', counts.open, `${counts.overdue} overdue`, counts.overdue > 0 ? 'rose' : 'amber')}
          ${kpiCard('Received', counts.received, 'awaiting seat', 'sky')}
          ${kpiCard('Delivered (lifetime)', counts.delivered, 'completed', 'emerald')}
          ${kpiCard('Remakes', counts.remake, 'quality issues', counts.remake > 0 ? 'rose' : 'emerald')}
        </div>

        <div class="bg-white rounded border border-slate-200 px-1 flex flex-wrap gap-0.5">
          ${[
            { id: 'open',      label: `At lab`,    n: counts.open },
            { id: 'received',  label: `Received`,  n: counts.received },
            { id: 'delivered', label: `Delivered`, n: counts.delivered },
            { id: 'remake',    label: `Remakes`,   n: counts.remake },
            { id: 'all',       label: `All` },
          ].map(t => `<button data-action="lab-tab" data-t="${t.id}"
              class="px-3 py-2 text-[12px] font-medium rounded-t ${tab === t.id ? 'text-teal-700 border-b-2 border-teal-600 -mb-px bg-teal-50/50' : 'text-slate-600 hover:text-slate-900 border-b-2 border-transparent'}">
              ${t.label}${t.n != null ? `<span class="ml-1 text-[10px] mono px-1.5 py-0.5 rounded ${tab === t.id ? 'bg-teal-100 text-teal-800' : 'bg-slate-100 text-slate-600'}">${t.n}</span>` : ''}
            </button>`).join('')}
        </div>

        <div class="bg-white rounded border border-slate-200 overflow-hidden">
          ${visible.length === 0 ? `<div class="p-6 text-center text-[12px] text-slate-500">No cases in this bucket.</div>` :
          `<table class="pp">
            <thead><tr><th>Case ID</th><th>Patient</th><th>Procedure</th><th>Tooth</th><th>Shade</th><th>Lab</th><th>Sent</th><th>Due</th><th>Status</th><th class="text-right">Actions</th></tr></thead>
            <tbody>
              ${visible.map(c => {
                const p = state.patients.find(pp => pp.id === c.patientId);
                const sChip = ({
                  'in-lab':    'chip-amber',
                  'overdue':   'chip-rose',
                  'received':  'chip-sky',
                  'delivered': 'chip-emerald',
                  'remake':    'chip-rose',
                })[c.computedStatus] || 'chip-slate';
                return `
                  <tr>
                    <td class="mono text-[11px]">${escapeHtml(c.id)}</td>
                    <td>${p ? `<button class="text-teal-700 hover:underline" data-action="select-patient-and-go" data-id="${p.id}" data-module="overview">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</button>` : '—'}</td>
                    <td class="text-[12px]">${escapeHtml(c.procedureName)}</td>
                    <td class="mono">${escapeHtml(c.tooth || '—')}</td>
                    <td class="mono">${escapeHtml(c.shade || '—')}</td>
                    <td class="text-[11px]">${escapeHtml(c.labName)}</td>
                    <td class="mono text-[12px]">${fmt.dateShort(c.sentDate)}</td>
                    <td class="mono text-[12px] ${c.daysUntilDue != null && c.daysUntilDue < 0 ? 'text-rose-700 font-semibold' : ''}">${fmt.dateShort(c.dueDate)}${c.daysUntilDue != null ? ` <span class="text-[10px] text-slate-500">(${c.daysUntilDue}d)</span>` : ''}</td>
                    <td><span class="chip ${sChip}">${c.computedStatus}</span></td>
                    <td class="text-right whitespace-nowrap">
                      ${c.computedStatus === 'in-lab' || c.computedStatus === 'overdue' ? `<button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="lab-receive" data-id="${c.id}">Receive</button>` : ''}
                      ${c.computedStatus === 'received' ? `<button class="btn btn-primary !py-1 !px-2 !text-[11px]" data-action="lab-deliver" data-id="${c.id}">Mark seated</button>` : ''}
                      ${c.computedStatus !== 'remake' ? `<button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="lab-remake" data-id="${c.id}" title="Quality issue → remake">⚠</button>` : ''}
                      <button class="btn btn-ghost !py-1 !px-2 !text-[11px] text-rose-600" data-action="lab-delete" data-id="${c.id}">✕</button>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>`}
        </div>
      </div>
    `;
  }

  // ── Vitals module: BP / pulse / SpO2 / temp / weight per visit ──
  function ensureVitals(p) { p.vitals = p.vitals || []; return p.vitals; }

  function vitalAlerts(v) {
    const alerts = [];
    if (v.bp_sys >= 180 || v.bp_dia >= 120) alerts.push({ tone: 'rose', text: 'HYPERTENSIVE CRISIS — refer immediately' });
    else if (v.bp_sys >= 140 || v.bp_dia >= 90) alerts.push({ tone: 'amber', text: 'Stage 2 hypertension — consult MD' });
    else if (v.bp_sys >= 130 || v.bp_dia >= 80) alerts.push({ tone: 'amber', text: 'Stage 1 hypertension' });
    if (v.spo2 != null && v.spo2 < 92) alerts.push({ tone: 'rose', text: 'Low SpO2 — assess airway, call MD if persistent' });
    else if (v.spo2 != null && v.spo2 < 95) alerts.push({ tone: 'amber', text: 'Borderline SpO2' });
    if (v.pulse >= 120) alerts.push({ tone: 'rose', text: 'Tachycardia' });
    else if (v.pulse >= 100) alerts.push({ tone: 'amber', text: 'Mild tachycardia' });
    else if (v.pulse > 0 && v.pulse < 50) alerts.push({ tone: 'amber', text: 'Bradycardia' });
    if (v.temp >= 100.4) alerts.push({ tone: 'rose', text: 'Fever — defer elective treatment' });
    if (v.glucose != null && v.glucose < 70) alerts.push({ tone: 'rose', text: 'Hypoglycemia — give 15g glucose, recheck' });
    else if (v.glucose >= 250) alerts.push({ tone: 'rose', text: 'Hyperglycemia — defer elective, contact MD' });
    return alerts;
  }

  function bmi(weight, height) {
    if (!weight || !height) return null;
    const m = height * 0.0254; // inches → meters
    const kg = weight * 0.4536; // lbs → kg
    return +(kg / (m * m)).toFixed(1);
  }

  function renderVitals(p) {
    const vitals = ensureVitals(p).slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  function renderVitalsTrend(series) {
    // Simple SVG line chart of systolic BP, pulse, SpO2 over last visits
    const W = 720, H = 160, PAD = 30;
    const n = series.length;
    if (n < 2) return '';
    const xAt = (i) => PAD + (i / (n - 1)) * (W - PAD * 2);
    const metrics = [
      { key: 'bp_sys', label: 'Systolic BP (mmHg)', color: '#dc2626', min: 80, max: 180 },
      { key: 'pulse',  label: 'Pulse (bpm)',        color: '#0d9488', min: 50, max: 120 },
      { key: 'spo2',   label: 'SpO2 (%)',           color: '#0891b2', min: 88, max: 100 },
    ];
    const lines = metrics.map(m => {
      const vals = series.map(v => v[m.key]);
      const yScale = (val) => {
        if (val == null) return null;
        return H - PAD - ((val - m.min) / (m.max - m.min)) * (H - PAD * 2);
      };
      const points = vals.map((v, i) => v == null ? null : `${xAt(i)},${yScale(v)}`).filter(Boolean);
      const path = points.length > 1 ? `M ${points.join(' L ')}` : '';
      const dots = vals.map((v, i) => v == null ? '' : `<circle cx="${xAt(i)}" cy="${yScale(v)}" r="3" fill="${m.color}"/>`).join('');
      return `<path d="${path}" stroke="${m.color}" stroke-width="2" fill="none"/>${dots}`;
    }).join('');
    const xLabels = series.map((v, i) => `<text x="${xAt(i)}" y="${H - 8}" text-anchor="middle" font-size="9" fill="#64748b">${fmt.dateShort(v.date).slice(0, 5)}</text>`).join('');
    return `
      <div class="bg-white rounded border border-slate-200 p-3">
        <div class="text-[12px] font-semibold mb-2">Trend — last ${n} visits</div>
        <svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px;height:auto">
          <line x1="${PAD}" y1="${PAD}" x2="${PAD}" y2="${H-PAD}" stroke="#e2e8f0"/>
          <line x1="${PAD}" y1="${H-PAD}" x2="${W-PAD}" y2="${H-PAD}" stroke="#e2e8f0"/>
          ${lines}
          ${xLabels}
        </svg>
        <div class="flex flex-wrap gap-4 text-[11px] mt-2">
          ${metrics.map(m => `<span class="flex items-center gap-1"><span class="w-3 h-1 inline-block" style="background:${m.color}"></span>${escapeHtml(m.label)}</span>`).join('')}
        </div>
      </div>
    `;

        <!-- Sub-tabs -->
        <div class="bg-white rounded border border-slate-200 px-1 flex flex-wrap gap-0.5">
          ${tabs.map(t => `
            <button data-action="imaging-tab" data-t="${t.id}"
              class="px-3 py-2 text-[12px] font-medium rounded-t ${tab === t.id ? 'text-teal-700 border-b-2 border-teal-600 -mb-px bg-teal-50/50' : 'text-slate-600 hover:text-slate-900 border-b-2 border-transparent'}">
              ${t.label}
              ${t.count ? `<span class="ml-1 text-[10px] mono px-1.5 py-0.5 rounded ${tab === t.id ? 'bg-teal-100 text-teal-800' : 'bg-slate-100 text-slate-600'}">${t.count}</span>` : ''}

        <!-- Body -->
        ${tab === 'fmx'    ? renderFmx(p)    : ''}
        ${tab === 'bw'     ? renderBwOnly(p) : ''}
        ${tab === 'pano'   ? renderSinglePane(p, 'pano',  'Panoramic radiograph',     'Wide-arch survey, displays both jaws + TMJ.') : ''}
        ${tab === 'ceph'   ? renderSinglePane(p, 'ceph',  'Cephalometric radiograph', 'Lateral skull view for ortho analysis.') : ''}

  function renderFmx(p) {

  function renderCBCT(p) {

  function renderPhotos(p) {

  function renderDocs(p) {

  function imgSlot(type, slot, data, kind, size = 'md') {
    const aspect = kind === 'photo' ? 'aspect-square' : kind === 'bw' ? 'aspect-[4/3]' : 'aspect-[3/4]';
    const sizeCls = size === 'lg' ? 'min-h-[180px]' : 'min-h-[110px]';

            ${data.date ? `<span class="bg-slate-900/70 text-white text-[10px] mono px-1 rounded">${fmt.dateShort(data.date).slice(0,5)}</span>` : ''}
          </div>
        ` : `
          <button class="block w-full h-full border-2 border-dashed border-slate-300 hover:border-teal-500 hover:bg-teal-50/30 rounded transition flex flex-col items-center justify-center text-slate-400" data-action="img-upload" data-type="${type}" data-id="${slot.id}">

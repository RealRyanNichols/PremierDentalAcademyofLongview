<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDA Practice Pro — Practice Management Trainer</title>
  <meta name="description" content="Premier Dental Academy of Longview — Practice Pro practice management trainer." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='4' fill='%230f172a'/%3E%3Ctext x='12' y='17' text-anchor='middle' font-family='Inter,sans-serif' font-size='14' font-weight='700' fill='%230d9488'%3EP%3C/text%3E%3C/svg%3E" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
    body { font-size: 13px; color: #0f172a; background: #f1f5f9; }
    .mono { font-family: 'SFMono-Regular', Menlo, Consolas, monospace; }

    /* Dark navy app chrome */
    .pp-chrome { background: #0f172a; color: #e2e8f0; }
    .pp-ribbon { background: #f8fafc; border-bottom: 1px solid #cbd5e1; }
    .pp-sidebar { background: #ffffff; border-right: 1px solid #cbd5e1; }
    .pp-tab-active { background: #ffffff; color: #0f172a; border-bottom-color: #0d9488 !important; }

    /* Subtle fade-in for module switches */
    @keyframes fade { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
    .pp-fade { animation: fade .14s ease-out; }
    @keyframes slidein { from { transform: translateX(8px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* Tooth SVG default + states */
    .tooth { cursor: pointer; }
    .tooth:hover .tooth-shape { stroke: #0d9488; stroke-width: 1.5; }
    .surface { fill: #ffffff; stroke: #94a3b8; }
    .surface.s-amalgam   { fill: #475569; }
    .surface.s-composite { fill: #0d9488; }
    .surface.s-caries    { fill: #ef4444; }
    .surface.s-sealant   { fill: #a3e635; }
    .surface.s-crown     { fill: #fbbf24; }
    .surface.s-rct       { fill: #9333ea; }
    .surface.s-missing   { fill: #1e293b; opacity: .35; }
    .surface.s-implant   { fill: #0ea5e9; }
    .surface.s-watch     { fill: #f97316; }
    .surface.s-fracture  { fill: #be185d; }

    /* Form polish — explicit Tailwind utilities (CDN doesn't support @apply outside special blocks) */
  </style>

  <style type="text/tailwindcss">
    @layer components {
      .input { @apply w-full px-2 py-1.5 bg-white border border-slate-300 rounded text-[13px] focus:outline-none focus:border-teal-600 focus:ring-1 focus:ring-teal-600; }
      .label { @apply block text-[11px] uppercase tracking-wide text-slate-500 font-semibold mb-0.5; }
      .btn { @apply inline-flex items-center gap-1.5 px-3 py-1.5 rounded text-[12px] font-medium transition; }
      .btn-primary { @apply bg-teal-700 text-white hover:bg-teal-800; }
      .btn-ghost { @apply text-slate-700 hover:bg-slate-100; }
      .btn-danger { @apply bg-rose-600 text-white hover:bg-rose-700; }
      .btn-soft { @apply bg-slate-100 text-slate-800 hover:bg-slate-200; }
      .marker-btn { @apply px-2 py-1 rounded text-[11px] font-medium border transition flex items-center gap-1.5; }
    }
  </style>

  <style>

    /* Scrollbar polish */
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* No outline on programmatic focus */
    [data-pf] { outline: none; }

    /* Print styling for walkout statements */
    @media print {
      body * { visibility: hidden; }
      #print-root, #print-root * { visibility: visible; }
      #print-root { position: absolute; left: 0; top: 0; width: 100%; }
    }

    /* Table polish */
    table.pp { width: 100%; border-collapse: collapse; }
    table.pp th { background: #f8fafc; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #64748b; padding: 8px 10px; border-bottom: 1px solid #cbd5e1; }
    table.pp td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    table.pp tr:hover td { background: #f8fafc; }

    /* Alert chip */
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .chip-amber { background: #fef3c7; color: #92400e; }
    .chip-rose  { background: #ffe4e6; color: #9f1239; }
    .chip-sky   { background: #e0f2fe; color: #075985; }
    .chip-emerald { background: #d1fae5; color: #065f46; }
    .chip-slate { background: #e2e8f0; color: #334155; }

    /* Keyboard kbd polish */
    kbd { background: #1e293b; color: #e2e8f0; padding: 1px 6px; border-radius: 3px; font-family: 'SFMono-Regular', monospace; font-size: 10px; border-bottom: 2px solid #0f172a; }

    /* Modal */
    .modal-back { position: fixed; inset: 0; background: rgba(15, 23, 42, .55); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: #fff; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,.25); width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-lg { max-width: 880px; }
    .modal h2 { font-size: 14px; font-weight: 600; }

    /* Mobile */
    @media (max-width: 768px) {
      .pp-sidebar { position: fixed; inset: 0 auto 0 0; z-index: 40; transform: translateX(-100%); transition: transform .2s; width: 86vw; max-width: 320px; box-shadow: 4px 0 18px rgba(0,0,0,.15); }
      .pp-sidebar.open { transform: none; }
      .pp-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 35; }
    }
  </style>
</head>
<body>

<!-- ─────────────────────────── App shell ───────────────────────────── -->
<div id="app" class="h-screen flex flex-col"></div>

<!-- Off-screen print root for walkout statements / treatment plans -->
<div id="print-root" style="display:none;"></div>

<!-- Toast host gets injected at runtime -->

<!-- Shared modules -->
<script src="/auth.js"></script>
<script src="/assets/pda-shared.js"></script>
<script src="/assets/pda-seed-patients.js"></script>

<script>
/* ============================================================
 * PDA Practice Pro v2
 * Single-file vanilla-JS dental practice management trainer.
 * Dark-navy ribbon UI workflow for RDA students.
 * ============================================================ */
(function () {
  'use strict';

  const APP = 'practice_pro';
  const { fmt, uid, debounce, escapeHtml, avatarUrl, toast, exportPDF,
          patientPortion, PERM_TEETH, SURFACES, SURFACE_COLORS, Store } = window.PDA_SHARED;
  const SEED = window.PDA_SEED;

  // ── State ──────────────────────────────────────────────────────
  const state = {
    user: null,
    patients: [],
    currentPatientId: null,
    module: 'today',        // today | overview | chart | perio | tx | ledger | comms | schedule | recall | docs
    ui: {
      sidebarOpen: window.matchMedia('(min-width: 769px)').matches,
      isMobile: window.matchMedia('(max-width: 768px)').matches,
      chartMarker: 'caries',
      toothContext: null,
      paletteOpen: false,
      modal: null,          // { type, props }
      patientFilter: '',
      patientFilterTab: 'all', // all | recall | new | overdue
    },
    audit: [],
  };

  // ── Persistence ────────────────────────────────────────────────
  async function loadState() {
    const saved = await Store.load(APP);
    if (saved && Array.isArray(saved.patients) && saved.patients.length) {
      state.patients = saved.patients;
      // Migrate older saves to add new fields
      state.patients.forEach(p => { p.comms = p.comms || []; });
      state.currentPatientId = saved.currentPatientId || saved.patients[0].id;
    } else {
      // First run: seed
      state.patients = JSON.parse(JSON.stringify(SEED.patients));
      state.patients.forEach(p => { p.comms = p.comms || []; });
      state.currentPatientId = state.patients[0].id;
      await Store.save(APP, { patients: state.patients, currentPatientId: state.currentPatientId });
      Store.log(APP, 'seeded_patients', { count: state.patients.length });
    }
  }
  const saveSoon = debounce(() => {
    Store.save(APP, { patients: state.patients, currentPatientId: state.currentPatientId });
  }, 350);

  function logAction(action, metadata) {
    state.audit.unshift({ at: new Date().toISOString(), action, metadata });
    if (state.audit.length > 80) state.audit.length = 80;
    Store.log(APP, action, metadata);
  }

  // ── Selectors ──────────────────────────────────────────────────
  function currentPatient() {
    return state.patients.find(p => p.id === state.currentPatientId) || null;
  }

  function balanceFor(p) {
    return (p.ledger || []).reduce((acc, e) => acc + (Number(e.fee) || 0) - (Number(e.payment) || 0), 0);
  }

  function filteredPatients() {
    const q = state.ui.patientFilter.trim().toLowerCase();
    const tab = state.ui.patientFilterTab;
    let list = state.patients.slice();
    if (tab !== 'all') list = list.filter(p => (p.type || '') === tab);
    if (q) list = list.filter(p => {
      return [p.first, p.last, p.preferred, p.id, p.phone, p.dob, p.email]
        .filter(Boolean).some(s => String(s).toLowerCase().includes(q));
    });
    list.sort((a, b) => (a.last + a.first).localeCompare(b.last + b.first));
    return list;
  }

  // ── Render dispatch ────────────────────────────────────────────
  function render() {
    const root = document.getElementById('app');
    root.innerHTML = `
      ${renderTopChrome()}
      ${renderRibbon()}
      <div class="flex-1 flex overflow-hidden">
        ${renderSidebar()}
        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
          ${renderBanner()}
          <div class="flex-1 overflow-auto">
            ${renderModule()}
          </div>
        </main>
      </div>
      ${renderModal()}
      ${renderPalette()}
    `;
    bindEvents();
  }
  const rerender = () => requestAnimationFrame(render);

  // ── Top chrome (dark navy title bar) ───────────────────────────
  function renderTopChrome() {
    const p = currentPatient();
    return `
      <header class="pp-chrome flex items-center justify-between px-3 py-1.5 text-[12px]">
        <div class="flex items-center gap-3">
          <button data-action="toggle-sidebar" class="md:hidden text-slate-300 hover:text-white">☰</button>
          <span class="flex items-center gap-1.5 font-semibold tracking-wide">
            <span class="inline-block w-2.5 h-2.5 bg-teal-500 rounded-sm"></span>
            PDA Practice Pro
            <span class="text-slate-500 font-normal">— Practice Management Trainer</span>
          </span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-slate-400">${escapeHtml(state.user ? `${state.user.first_name || 'Student'} ${state.user.last_name || ''}` : 'Student Demo')}</span>
          <button data-action="open-palette" class="bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded flex items-center gap-2 text-slate-200">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-4.3-4.3M10.5 18a7.5 7.5 0 110-15 7.5 7.5 0 010 15z"/></svg>
            <span>Search</span>
            <kbd>⌘K</kbd>
          </button>
          <button data-action="audit-toggle" class="text-slate-300 hover:text-white" title="Audit log">⏱</button>
        </div>
      </header>
    `;
  }

  // ── Ribbon (module switcher) ───────────────────────────────────
  function renderRibbon() {
    const tabs = [
      { id: 'today',    label: 'Today',    shortcut: 'H' },
      { id: 'overview', label: 'Patient',  shortcut: '1' },
      { id: 'chart',    label: 'Chart',    shortcut: 'T' },
      { id: 'perio',    label: 'Perio',    shortcut: '3' },
      { id: 'tx',       label: 'Tx Plan',  shortcut: '4' },
      { id: 'ledger',   label: 'Ledger',   shortcut: 'L' },
      { id: 'comms',    label: 'Comms',    shortcut: 'C' },
      { id: 'schedule', label: 'Schedule', shortcut: 'S' },
      { id: 'recall',   label: 'Recall',   shortcut: '7' },
      { id: 'imaging',  label: 'Imaging',  shortcut: 'I' },
    ];
    return `
      <div class="pp-ribbon px-3 flex items-center gap-1 overflow-x-auto">
        ${tabs.map(t => `
          <button data-action="set-module" data-module="${t.id}"
            class="px-3 py-2.5 text-[12px] font-medium border-b-2 ${state.module === t.id ? 'pp-tab-active' : 'border-transparent text-slate-600 hover:text-slate-900 hover:bg-slate-100'}">
            ${t.label}
            <kbd class="ml-1.5 opacity-60">${t.shortcut}</kbd>
          </button>
        `).join('')}
        <span class="flex-1"></span>
        <div class="hidden sm:flex items-center gap-2 text-slate-500 pr-2">
          <kbd>?</kbd><span>help</span>
        </div>
      </div>
    `;
  }

  // ── Sidebar (patient list with search + tabs) ──────────────────
  function renderSidebar() {
    const list = filteredPatients();
    const tabs = [
      { id: 'all',      label: 'All',      cls: 'chip-slate' },
      { id: 'recall',   label: 'Recall',   cls: 'chip-emerald' },
      { id: 'new',      label: 'New',      cls: 'chip-sky' },
      { id: 'overdue',  label: 'Overdue',  cls: 'chip-rose' },
    ];
    return `
      ${state.ui.sidebarOpen && state.ui.isMobile ? '<div class="pp-backdrop" data-action="close-sidebar"></div>' : ''}
      <aside class="pp-sidebar w-72 flex flex-col ${state.ui.sidebarOpen ? 'open' : ''}">
        <div class="p-2 border-b border-slate-200">
          <div class="flex items-center gap-1 mb-1.5 md:hidden">
            <span class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold flex-1">Patients</span>
            <button data-action="close-sidebar" class="text-slate-500 hover:text-slate-900 px-2 py-1 rounded hover:bg-slate-100" aria-label="Close patient list">✕</button>
          </div>
          <div class="relative">
            <input id="patient-search" data-action="patient-filter"
              value="${escapeHtml(state.ui.patientFilter)}"
              placeholder="Search patients (F)..."
              class="w-full pl-7 pr-2 py-1.5 text-[12px] bg-slate-50 border border-slate-300 rounded focus:outline-none focus:border-teal-600" />
            <svg class="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-4.3-4.3M10.5 18a7.5 7.5 0 110-15 7.5 7.5 0 010 15z"/></svg>
          </div>
          <div class="flex gap-1 mt-2">
            ${tabs.map(t => `
              <button data-action="patient-filter-tab" data-tab="${t.id}"
                class="px-2 py-0.5 text-[11px] rounded ${state.ui.patientFilterTab === t.id ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}">
                ${t.label}
              </button>
            `).join('')}
            <button data-action="open-modal" data-modal="new-patient" class="ml-auto btn btn-primary !py-0.5 !px-2 !text-[11px]" title="New patient (N)">＋ New</button>
          </div>
        </div>
        <div class="flex-1 overflow-auto">
          ${list.length === 0 ? `
            <div class="p-6 text-center text-[12px] text-slate-500">No patients match.</div>
          ` : list.map(p => renderPatientRow(p)).join('')}
        </div>
        <div class="p-2 border-t border-slate-200 text-[11px] text-slate-500 flex justify-between">
          <span>${list.length} of ${state.patients.length} pts</span>
          <button data-action="open-modal" data-modal="audit" class="hover:text-teal-700">Audit log</button>
        </div>
      </aside>
    `;
  }

  function renderPatientRow(p) {
    const sel = p.id === state.currentPatientId;
    const due = p.recall?.due ? new Date(p.recall.due) : null;
    const today = new Date('2026-05-04');
    const dueDays = due ? Math.round((due - today) / 86400000) : null;
    const recallChip = dueDays != null
      ? (dueDays < -30 ? `<span class="chip chip-rose">overdue</span>`
        : dueDays < 0 ? `<span class="chip chip-amber">recall due</span>`
        : dueDays < 30 ? `<span class="chip chip-emerald">due ${dueDays}d</span>`
        : '')
      : '';
    const balance = balanceFor(p);
    const balChip = balance > 0
      ? `<span class="text-rose-600 font-semibold mono">${fmt.money(balance)}</span>`
      : `<span class="text-slate-400 mono">${fmt.money(0)}</span>`;
    return `
      <button data-action="select-patient" data-id="${p.id}"
        class="w-full text-left px-2.5 py-2 border-b border-slate-100 hover:bg-slate-50 ${sel ? 'bg-teal-50 border-l-4 border-l-teal-600' : 'border-l-4 border-l-transparent'}">
        <div class="flex items-center gap-2">
          <img src="${avatarUrl(p.first + ' ' + p.last)}" alt="" class="w-7 h-7 rounded-full bg-slate-200" />
          <div class="flex-1 min-w-0">
            <div class="text-[13px] font-semibold text-slate-900 truncate">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</div>
            <div class="text-[11px] text-slate-500 flex items-center gap-1.5 mono">
              ${p.id} · ${fmt.age(p.dob)}y ${escapeHtml(p.sex || '')}
            </div>
          </div>
          <div class="text-right">
            ${(p.alerts || []).length ? `<span class="chip chip-rose" title="${escapeHtml(p.alerts.join(', '))}">!</span>` : ''}
          </div>
        </div>
        <div class="flex items-center justify-between mt-1">
          ${recallChip || `<span class="text-[10px] text-slate-400">${escapeHtml(p.insurance?.primary?.carrier || 'self-pay')}</span>`}
          ${balChip}
        </div>
      </button>
    `;
  }

  // ── Patient banner (sticky, with name/photo/alerts) ────────────
  function renderBanner() {
    // Hide banner for practice-wide modules
    if (['today','schedule','recall'].includes(state.module)) return '';
    const p = currentPatient();
    if (!p) return `<div class="p-8 text-slate-400">No patient selected.</div>`;
    const ins = p.insurance?.primary;
    const alerts = (p.alerts || []);
    const balance = balanceFor(p);
    const balanceColor = balance > 0 ? 'text-rose-600' : 'text-slate-700';
    return `
      <header class="bg-white border-b border-slate-200 px-4 py-3 flex flex-wrap gap-4 items-center sticky top-0 z-10">
        <img src="${avatarUrl(p.first + ' ' + p.last)}" class="w-14 h-14 rounded-full border-2 border-slate-200" alt="" />
        <div class="flex-1 min-w-[220px]">
          <div class="flex items-center gap-2 flex-wrap">
            <h1 class="text-lg font-semibold text-slate-900">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</h1>
            ${p.preferred && p.preferred !== p.first ? `<span class="text-slate-400 text-[12px]">"${escapeHtml(p.preferred)}"</span>` : ''}
            <span class="chip chip-slate mono">${escapeHtml(p.id)}</span>
            ${p.medical?.premedicate ? '<span class="chip chip-amber">PREMED</span>' : ''}
            ${(p.medical?.allergies || []).filter(a => a !== 'NKDA').length ? '<span class="chip chip-rose">ALLERGY</span>' : ''}
          </div>
          <div class="text-[12px] text-slate-500 flex flex-wrap gap-x-4 gap-y-0.5 mt-0.5">
            <span>DOB <span class="mono text-slate-700">${fmt.dateShort(p.dob)}</span> (${fmt.age(p.dob)} y)</span>
            <span>${escapeHtml(p.sex || '')}${p.pronouns ? ' · ' + escapeHtml(p.pronouns) : ''}</span>
            <span class="mono">${escapeHtml(p.phone || '')}</span>
            ${p.familyId ? `<span class="text-teal-700">Family ${escapeHtml(p.familyId)}</span>` : ''}
          </div>
        </div>
        <div class="text-right">
          <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Insurance</div>
          <div class="text-[12px] text-slate-800">${escapeHtml(ins?.carrier || 'Self-pay')}</div>
          <div class="text-[11px] text-slate-500 mono">Used ${fmt.money(ins?.used || 0)}/${ins?.max ? fmt.money(ins.max) : '—'}</div>
        </div>
        <div class="text-right border-l border-slate-200 pl-4">
          <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Balance</div>
          <div class="text-lg ${balanceColor} font-semibold mono">${fmt.money(balance)}</div>
          <button data-action="open-modal" data-modal="walkout" class="text-[11px] text-teal-700 hover:underline">Walkout statement →</button>
        </div>
        ${alerts.length ? `
          <div class="basis-full flex flex-wrap gap-1.5 pt-2 border-t border-slate-100 -mx-4 px-4">
            ${alerts.map(a => `<span class="chip chip-amber">⚠ ${escapeHtml(a)}</span>`).join('')}
          </div>
        ` : ''}
      </header>
    `;
  }

  // ── Module router ──────────────────────────────────────────────
  function renderModule() {
    const wrap = (inner) => `<div class="pp-fade p-4 max-w-[1400px] mx-auto">${inner}</div>`;
    // Practice-wide modules don't require a selected patient
    if (state.module === 'today')    return wrap(renderToday());
    if (state.module === 'recall')   return wrap(renderRecall());
    if (state.module === 'schedule') return wrap(renderScheduleStub());
    const p = currentPatient();
    if (!p) return `<div class="p-8 text-slate-400">Select a patient.</div>`;
    switch (state.module) {
      case 'overview': return wrap(renderOverview(p));
      case 'chart':    return wrap(renderChart(p));
      case 'ledger':   return wrap(renderLedger(p));
      case 'tx':       return wrap(renderTxPlan(p));
      case 'perio':    return wrap(renderPerio(p));
      case 'comms':    return wrap(renderComms(p));
      case 'imaging':  return wrap(renderImaging(p));
      default: return '';
    }
  }

  // ── Overview module ────────────────────────────────────────────
  function renderOverview(p) {
    const ins = p.insurance?.primary || {};
    const med = p.medical || {};
    return `
      <div class="grid lg:grid-cols-3 gap-4">
        <!-- Demographics -->
        <section class="bg-white rounded border border-slate-200 p-4 lg:col-span-2">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-slate-900 text-[13px]">Demographics</h2>
            <span class="text-[11px] text-slate-400">Auto-saves on blur</span>

  // ── Stubs for modules that arrive in subsequent pushes ─────────
  // ── Today dashboard (practice-wide hub) ────────────────────────
  function renderToday() {
    const today = new Date('2026-05-04');
    const todayStr = '2026-05-04';

    // Recall buckets
    const buckets = { overdue: [], dueSoon: [], dueLater: [] };
    state.patients.forEach(p => {
      const due = p.recall?.due ? new Date(p.recall.due) : null;
      if (!due) return;
      const days = Math.round((due - today) / 86400000);
      if (days < -7) buckets.overdue.push({ p, days });
      else if (days <= 14) buckets.dueSoon.push({ p, days });
      else if (days <= 60) buckets.dueLater.push({ p, days });
    });
    buckets.overdue.sort((a, b) => a.days - b.days);
    buckets.dueSoon.sort((a, b) => a.days - b.days);

    // Outstanding A/R
    const arBuckets = { current: 0, d30: 0, d60: 0, d90: 0, total: 0, count: 0 };
    state.patients.forEach(p => {
      const bal = balanceFor(p);
      if (bal <= 0) return;
      arBuckets.count++;
      arBuckets.total += bal;
      // Use most recent ledger entry date as proxy
      const lastDate = (p.ledger || []).map(e => e.date).filter(Boolean).sort().slice(-1)[0];
      const ageDays = lastDate ? Math.round((today - new Date(lastDate)) / 86400000) : 0;
      if (ageDays >= 90)      arBuckets.d90 += bal;
      else if (ageDays >= 60) arBuckets.d60 += bal;
      else if (ageDays >= 30) arBuckets.d30 += bal;
      else                    arBuckets.current += bal;
    });

    // Today's production (from ledger)
    let prodToday = 0, prodMonth = 0;
    const monthPrefix = todayStr.slice(0, 7);
    state.patients.forEach(p => (p.ledger || []).forEach(e => {
      const fee = Number(e.fee) || 0;
      if (e.date === todayStr) prodToday += fee;
      if ((e.date || '').startsWith(monthPrefix)) prodMonth += fee;
    }));
    const prodGoalDay = 2500;
    const prodGoalMonth = 50000;

    // Treatment-plan opportunity
    let unscheduledTx = 0;
    state.patients.forEach(p => (p.treatmentPlan || []).forEach(l => unscheduledTx += (Number(l.fee) || 0)));

    // Today's appointments — derived from patients with a recall due today/this week + their provider
    const todaysAppts = state.patients
      .filter(p => p.recall?.due)
      .map(p => ({ p, when: new Date(p.recall.due), days: Math.round((new Date(p.recall.due) - today) / 86400000) }))
      .filter(x => x.days >= -3 && x.days <= 3)
      .sort((a, b) => a.days - b.days)
      .slice(0, 6);

    // Recent activity feed from session audit
    const feed = state.audit.slice(0, 8);

    return `
      <div class="space-y-4">
        <!-- Header strip -->
        <div class="flex flex-wrap items-end justify-between gap-2">
          <div>
            <h1 class="text-2xl font-semibold text-slate-900 leading-tight">Good ${greeting()}, ${escapeHtml(state.user?.first_name || 'Student')}.</h1>
            <p class="text-[12px] text-slate-500 mt-0.5">${today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })} · Premier Dental Academy of Longview</p>
          </div>
          <div class="flex flex-wrap gap-2">
            <button class="btn btn-soft" data-action="open-modal" data-modal="new-patient">＋ New patient</button>
            <button class="btn btn-soft" data-action="open-palette">⌘K Search</button>
            <button class="btn btn-primary" data-action="set-module" data-module="recall">Recall pipeline →</button>
          </div>
        </div>

        <!-- KPI tiles -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
          ${tile('Today\'s production', fmt.money(prodToday), `Goal ${fmt.money(prodGoalDay)}`, Math.min(100, (prodToday / prodGoalDay) * 100), 'teal')}
          ${tile('This month', fmt.money(prodMonth), `Goal ${fmt.money(prodGoalMonth)}`, Math.min(100, (prodMonth / prodGoalMonth) * 100), 'sky')}
          ${tile('Outstanding A/R', fmt.money(arBuckets.total), `${arBuckets.count} accounts`, null, 'rose')}
          ${tile('Unscheduled tx', fmt.money(unscheduledTx), 'Across treatment plans', null, 'amber')}
        </div>

        <div class="grid lg:grid-cols-3 gap-4">
          <!-- Recall pipeline -->
          <section class="bg-white rounded border border-slate-200 lg:col-span-2 overflow-hidden">
            <header class="px-4 py-3 border-b border-slate-200 flex items-center justify-between">
              <div>
                <h2 class="font-semibold text-[13px]">Recall pipeline</h2>
                <p class="text-[11px] text-slate-500 mt-0.5">Click any patient to follow up. Send a recall text in two taps.</p>
              </div>
              <button class="text-[11px] text-teal-700 hover:underline" data-action="set-module" data-module="recall">Open pipeline →</button>
            </header>
            <div class="grid grid-cols-3 divide-x divide-slate-200 text-center text-[12px]">
              <div class="p-3"><div class="text-2xl font-semibold text-rose-600">${buckets.overdue.length}</div><div class="text-slate-500 text-[11px] uppercase tracking-wide">Overdue</div></div>
              <div class="p-3"><div class="text-2xl font-semibold text-amber-600">${buckets.dueSoon.length}</div><div class="text-slate-500 text-[11px] uppercase tracking-wide">Due ≤ 14 days</div></div>
              <div class="p-3"><div class="text-2xl font-semibold text-slate-600">${buckets.dueLater.length}</div><div class="text-slate-500 text-[11px] uppercase tracking-wide">Due 15–60 days</div></div>
            </div>
            <ul class="divide-y divide-slate-100 max-h-72 overflow-auto">
              ${[...buckets.overdue.slice(0, 4), ...buckets.dueSoon.slice(0, 4)].map(({p, days}) => `
                <li class="px-4 py-2 flex items-center gap-3 hover:bg-slate-50">
                  <img src="${avatarUrl(p.first + ' ' + p.last)}" class="w-8 h-8 rounded-full" alt="">
                  <button class="flex-1 text-left" data-action="select-patient-and-go" data-id="${p.id}" data-module="overview">
                    <div class="text-[13px] font-medium text-slate-900">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</div>
                    <div class="text-[11px] text-slate-500">${escapeHtml(p.provider || '')} · ${escapeHtml(p.phone || '')}</div>
                  </button>
                  <span class="chip ${days < 0 ? 'chip-rose' : days < 7 ? 'chip-amber' : 'chip-slate'} mono">${days < 0 ? `${-days}d late` : `${days}d`}</span>
                  <button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="quick-text-recall" data-id="${p.id}" title="Send a recall text">Text</button>
                </li>
              `).join('') || '<li class="p-6 text-center text-[12px] text-slate-500">All caught up — no patients due.</li>'}
            </ul>
          </section>

          <!-- A/R aging -->
          <section class="bg-white rounded border border-slate-200 overflow-hidden">
            <header class="px-4 py-3 border-b border-slate-200">
              <h2 class="font-semibold text-[13px]">A/R aging</h2>
              <p class="text-[11px] text-slate-500 mt-0.5">Outstanding receivables.</p>
            </header>
            <div class="p-4">
              ${arRow('Current',     arBuckets.current, arBuckets.total, 'bg-emerald-500')}
              ${arRow('30+ days',    arBuckets.d30,     arBuckets.total, 'bg-amber-500')}
              ${arRow('60+ days',    arBuckets.d60,     arBuckets.total, 'bg-orange-500')}
              ${arRow('90+ days',    arBuckets.d90,     arBuckets.total, 'bg-rose-600')}
              <div class="border-t border-slate-200 mt-3 pt-3 flex justify-between text-[13px] font-semibold"><span>Total</span><span class="mono">${fmt.money(arBuckets.total)}</span></div>
            </div>
          </section>
        </div>

        <div class="grid lg:grid-cols-3 gap-4">
          <!-- Today's appointments (derived) -->
          <section class="bg-white rounded border border-slate-200 lg:col-span-2 overflow-hidden">
            <header class="px-4 py-3 border-b border-slate-200 flex items-center justify-between">
              <h2 class="font-semibold text-[13px]">Around today</h2>
              <button class="text-[11px] text-teal-700 hover:underline" data-action="set-module" data-module="schedule">Open schedule →</button>
            </header>
            ${todaysAppts.length === 0
              ? '<div class="p-6 text-[12px] text-slate-500 text-center">Nothing scheduled in the next 3 days.</div>'
              : `<table class="pp"><thead><tr><th>When</th><th>Patient</th><th>Provider</th><th>Reason</th><th></th></tr></thead><tbody>${todaysAppts.map(({p, when, days}) => `
                <tr>
                  <td class="mono">${days === 0 ? 'Today' : days < 0 ? `${-days}d ago` : `${days}d`}</td>
                  <td><button class="text-teal-700 hover:underline" data-action="select-patient-and-go" data-id="${p.id}" data-module="overview">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</button></td>
                  <td>${escapeHtml(p.provider || '')}</td>
                  <td>Recall — ${escapeHtml(p.type || '—')}</td>
                  <td class="text-right"><button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="quick-text-recall" data-id="${p.id}">Confirm</button></td>
                </tr>`).join('')}</tbody></table>`}
          </section>

          <!-- Activity feed -->
          <section class="bg-white rounded border border-slate-200 overflow-hidden">
            <header class="px-4 py-3 border-b border-slate-200">
              <h2 class="font-semibold text-[13px]">Practice activity</h2>
            </header>
            <ul class="p-3 space-y-2 max-h-72 overflow-auto">
              ${feed.length === 0 ? '<li class="text-[12px] text-slate-500">Take an action to see it here.</li>' :
              feed.map(a => `
                <li class="flex items-start gap-2">
                  <span class="mono text-[10px] text-slate-400 mt-0.5 shrink-0 w-12">${a.at.slice(11, 16)}</span>
                  <span class="text-[12px] text-slate-700"><span class="font-medium capitalize">${escapeHtml(a.action.replace(/_/g, ' '))}</span> <span class="text-slate-400">${escapeHtml(JSON.stringify(a.metadata || {}).slice(0, 60))}</span></span>
                </li>
              `).join('')}
            </ul>
          </section>
        </div>
      </div>
    `;
  }

  function greeting() {
    const h = new Date().getHours();
    if (h < 12) return 'morning';
    if (h < 17) return 'afternoon';
    return 'evening';
  }
  function tile(label, value, sub, pct, tone) {
    const toneCls = ({ teal: 'bg-teal-600', sky: 'bg-sky-600', rose: 'bg-rose-600', amber: 'bg-amber-500' })[tone];
    return `
      <div class="bg-white rounded border border-slate-200 p-3">
        <div class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold">${escapeHtml(label)}</div>
        <div class="text-2xl font-semibold mono text-slate-900 mt-1">${escapeHtml(value)}</div>
        <div class="text-[11px] text-slate-500 mt-0.5">${escapeHtml(sub)}</div>
        ${pct != null ? `<div class="h-1.5 bg-slate-100 rounded mt-2"><div class="h-1.5 rounded ${toneCls}" style="width:${pct}%"></div></div>` : ''}
      </div>
    `;
  }
  function arRow(label, amount, total, color) {
    const pct = total > 0 ? Math.round((amount / total) * 100) : 0;
    return `
      <div class="mb-2">
        <div class="flex justify-between text-[12px]"><span>${label}</span><span class="mono">${fmt.money(amount)}</span></div>
        <div class="h-1.5 bg-slate-100 rounded mt-1"><div class="h-1.5 rounded ${color}" style="width:${pct}%"></div></div>
      </div>
    `;
  }

  // ── Communications module ──────────────────────────────────────
  const COMM_KINDS = [
    { id: 'sms',       label: 'Text message', icon: '💬', color: 'sky' },
    { id: 'call',      label: 'Phone call',   icon: '📞', color: 'emerald' },
    { id: 'email',     label: 'Email',        icon: '✉️', color: 'slate' },
    { id: 'voicemail', label: 'Voicemail',    icon: '🎙️', color: 'amber' },
    { id: 'note',      label: 'Note',         icon: '📝', color: 'slate' },
    { id: 'inperson',  label: 'In person',    icon: '👋', color: 'emerald' },
  ];

  function renderComms(p) {
    const comms = (p.comms || []).slice().sort((a, b) => (b.at || '').localeCompare(a.at || ''));
    const filter = state.ui.commsFilter || 'all';
    const filtered = filter === 'all' ? comms : comms.filter(c => c.kind === filter);
    return `
      <div class="space-y-3">
        <div class="bg-white rounded border border-slate-200 p-3 flex flex-wrap gap-2 items-center">
          <span class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold mr-2">Filter</span>
          <button data-action="comms-filter" data-f="all" class="px-2 py-1 text-[11px] rounded ${filter === 'all' ? 'bg-slate-900 text-white' : 'bg-slate-100 hover:bg-slate-200'}">All (${comms.length})</button>
          ${COMM_KINDS.map(k => `<button data-action="comms-filter" data-f="${k.id}" class="px-2 py-1 text-[11px] rounded ${filter === k.id ? 'bg-slate-900 text-white' : 'bg-slate-100 hover:bg-slate-200'}">${k.icon} ${k.label}</button>`).join('')}
          <span class="flex-1"></span>
          <button class="btn btn-soft" data-action="open-modal" data-modal="quick-text" data-id="${p.id}">💬 Send text</button>
          <button class="btn btn-soft" data-action="open-modal" data-modal="log-call" data-id="${p.id}">📞 Log call</button>
          <button class="btn btn-primary" data-action="open-modal" data-modal="log-comm" data-id="${p.id}">＋ Log communication</button>
        </div>

        <div class="bg-white rounded border border-slate-200 overflow-hidden">
          ${filtered.length === 0
            ? '<div class="p-8 text-center text-[12px] text-slate-500">No communications logged${filter !== "all" ? " of this type" : ""}. Use a button above to log one.</div>'
            : `<ul class="divide-y divide-slate-100">${filtered.map(c => commRow(c)).join('')}</ul>`}
        </div>
      </div>
    `;
  }

  function commRow(c) {
    const k = COMM_KINDS.find(k => k.id === c.kind) || { icon: '•', label: c.kind, color: 'slate' };
    const dirChip = c.direction ? `<span class="chip chip-${c.direction === 'in' ? 'sky' : 'emerald'}">${c.direction === 'in' ? '◀ inbound' : '▶ outbound'}</span>` : '';
    return `
      <li class="p-3 hover:bg-slate-50">
        <div class="flex items-start gap-3">
          <div class="text-xl shrink-0 select-none" aria-hidden="true">${k.icon}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-2 flex-wrap">
              <span class="text-[12px] font-semibold capitalize">${escapeHtml(k.label)}</span>
              ${dirChip}
              <span class="text-[11px] text-slate-500 mono">${c.at ? new Date(c.at).toLocaleString() : ''}</span>
              <span class="text-[11px] text-slate-500">by ${escapeHtml(c.by || '—')}</span>
            </div>
            <div class="text-[12px] text-slate-700 mt-1 whitespace-pre-wrap">${escapeHtml(c.text || '')}</div>
            ${c.subject ? `<div class="text-[11px] text-slate-500 mt-1">Subject: ${escapeHtml(c.subject)}</div>` : ''}
          </div>
        </div>
      </li>
    `;
  }

  const FMX_LAYOUT = {
    maxRow: [
      { id: 'm-r-mol', label: '1–3',   teeth: [1, 2, 3] },
      { id: 'm-r-pre', label: '4–5',   teeth: [4, 5] },
      { id: 'm-r-cus', label: '6',     teeth: [6] },

  // Tooth class by universal number (1-32)
  function toothClass(n) {
    if ([1,2,3, 14,15,16, 17,18,19, 30,31,32].includes(n)) return 'molar';
    if ([4,5, 12,13, 20,21, 28,29].includes(n)) return 'premolar';
    if ([6, 11, 22, 27].includes(n)) return 'canine';
    if ([8, 9, 24, 25].includes(n)) return 'central';
    return 'lateral'; // 7, 10, 23, 26
  }
  function isAnterior(n) { return (n >= 6 && n <= 11) || (n >= 22 && n <= 27); }

  // Anatomically-shaped tooth SVG paths.
  // viewBox is 0 0 40 76 — root (top), gingival line, crown body, occlusal/incisal edge.
  // Crown SVG path is the only thing that gets surface-marked; the root stays neutral.
  // For maxillary teeth (1-16) we draw root-up, crown-down (the way you see them in patient's mouth).
  // For mandibular teeth (17-32) we flip so crown faces up.
  // Anatomically-detailed tooth SVGs.
  // viewBox is 0 0 56 110 — root at top (y 4–48), gingival line at y=50, crown at y=50–106.
  // Crown SVG path is the only thing that gets surface-marked; root + gingiva are decorative.
  // Maxillary teeth (1-16) draw root-up / crown-down (the anatomical convention).
  // Mandibular teeth (17-32) get vertically flipped at render time.
  function toothShapes(cls, num) {
    // Posterior maxillary molars have 3 roots (2 buccal + 1 palatal); mandibular have 2.
    // We render a simplified 2-root view for both since the chart is a buccal-view diagram.
    if (cls === 'molar') {
      return {
        // Two distinct roots branching from the cervical line
        roots: [
          'M 18 48 Q 14 28 12 8 Q 12 4 14 4 Q 17 4 18 8 Q 22 28 22 48 Z',  // mesial root
          'M 34 48 Q 38 28 40 8 Q 40 4 42 4 Q 39 4 38 8 Q 34 28 34 48 Z', // distal root
          'M 22 48 Q 24 32 26 24 Q 28 32 30 48 Z',                           // central (palatal hint)
        ],
        crown: [
          // Crown body — wider than root, narrows slightly toward occlusal edge,
          // with 4 rounded cusp bumps along the chewing surface
          'M 8 50',
          'Q 6 50 6 54',                         // cervical bulge mesial
          'L 6 90',
          'Q 6 102 12 104',                       // mesial corner
          'Q 14 108 17 105',                      // MB cusp
          'Q 20 109 23 105',                      // ML cusp
          'Q 26 110 28 106',                      // central groove dip
          'Q 31 110 34 106',                      // DL cusp
          'Q 37 110 40 105',                      // DB cusp
          'Q 44 102 44 90',                       // distal corner
          'L 44 54',
          'Q 44 50 42 50',                        // cervical bulge distal
          'Z'
        ].join(' '),
        zones: {

          D: 'M 36 52 L 36 108 L 44 105 L 44 52 Z',
          B: 'M 6 50 L 44 50 L 44 70 L 6 70 Z',
          L: 'M 6 92 L 44 92 L 44 108 L 6 108 Z',

        ],
        groove: 'M 14 82 L 40 82',
      };
    }
    if (cls === 'premolar') {
      return {
        roots: [
          // single root with hint of bifurcation at apex
          'M 18 48 Q 14 30 18 8 Q 22 4 25 4 Q 28 4 32 8 Q 36 30 32 48 L 28 48 Q 30 30 28 16 Q 26 30 26 48 Q 26 30 22 16 Q 20 30 22 48 Z',
        ],
        crown: [
          'M 10 50',
          'Q 8 50 8 54',
          'L 8 88',
          'Q 8 100 14 104',
          'Q 17 109 22 105',                      // buccal cusp (taller)
          'Q 25 110 28 106',                      // central groove
          'Q 32 109 36 105',                      // lingual cusp
          'Q 42 100 42 88',
          'L 42 54',
          'Q 42 50 40 50',
          'Z'
        ].join(' '),
        zones: {
          M: 'M 8 52 L 8 105 L 16 107 L 16 52 Z',
          D: 'M 34 52 L 34 107 L 42 105 L 42 52 Z',
          B: 'M 8 50 L 42 50 L 42 72 L 8 72 Z',

        },
        cusps: [{ x: 22, y: 105 }, { x: 36, y: 105 }],
        groove: 'M 18 88 L 36 88',
      };
    }
    if (cls === 'canine') {
      return {
        roots: [
          // Single very long root — the longest in the human mouth
          'M 22 48 Q 20 24 24 4 Q 25 2 26 2 Q 28 2 29 4 Q 32 24 30 48 Z',
        ],
        crown: [
          'M 10 50',
          'Q 8 50 8 54',
          'L 8 80',                                // narrows toward incisal third
          'Q 8 92 11 100',
          'Q 14 106 18 104',                       // mesial slope of cusp
          'Q 22 110 26 110',                       // POINTED CUSP TIP
          'Q 30 110 34 104',                       // distal slope of cusp

          'Q 44 92 44 80',
          'L 44 54',
          'Q 44 50 42 50',

          L: 'M 8 95 L 44 95 L 44 110 L 8 110 Z',

        },
        cusps: [{ x: 26, y: 110, peak: true }],
        cingulum: 'M 22 90 Q 26 95 30 90',
      };
    }
    if (cls === 'central') {
      return {
        roots: [
          'M 22 48 Q 20 26 24 6 Q 26 4 26 4 Q 28 4 30 6 Q 32 26 30 48 Z',

        crown: [
          'M 10 50',

          M: 'M 8 52 L 8 105 L 16 107 L 16 52 Z',

        cingulum: 'M 22 90 Q 26 95 30 90',
      };
    }
    // lateral incisor — narrower
    return {
      roots: [
        'M 22 48 Q 21 26 24 6 Q 26 4 26 4 Q 28 4 30 6 Q 31 26 30 48 Z',
      ],
      crown: [
        'M 13 50',
        'Q 11 50 11 54',

        B: 'M 11 50 L 41 50 L 41 75 L 11 75 Z',
        L: 'M 11 92 L 41 92 L 41 108 L 11 108 Z',
        I: 'M 17 75 L 35 75 L 35 92 L 17 92 Z',

      mamelons: [{ x: 20, y: 105 }, { x: 26, y: 106 }, { x: 32, y: 105 }],

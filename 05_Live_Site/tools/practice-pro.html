<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDA Practice Pro — Practice Management Trainer</title>
  <meta name="description" content="Premier Dental Academy of Longview — Practice Pro practice management trainer." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='4' fill='%230f172a'/%3E%3Ctext x='12' y='17' text-anchor='middle' font-family='Inter,sans-serif' font-size='14' font-weight='700' fill='%230d9488'%3EP%3C/text%3E%3C/svg%3E" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    html, body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
    body { font-size: 13px; color: #0f172a; background: #f1f5f9; }
    .mono { font-family: 'SFMono-Regular', Menlo, Consolas, monospace; }

    /* Dark navy app chrome */
    .pp-chrome { background: #0f172a; color: #e2e8f0; }
    .pp-ribbon { background: #f8fafc; border-bottom: 1px solid #cbd5e1; }
    .pp-sidebar { background: #ffffff; border-right: 1px solid #cbd5e1; }
    .pp-tab-active { background: #ffffff; color: #0f172a; border-bottom-color: #0d9488 !important; }

    /* Subtle fade-in for module switches */
    @keyframes fade { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
    .pp-fade { animation: fade .14s ease-out; }
    @keyframes slidein { from { transform: translateX(8px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* Tooth SVG default + states */
    .tooth { cursor: pointer; }
    .tooth:hover .tooth-shape { stroke: #0d9488; stroke-width: 1.5; }
    .surface { fill: #ffffff; stroke: #94a3b8; }
    .surface.s-amalgam   { fill: #475569; }
    .surface.s-composite { fill: #0d9488; }
    .surface.s-caries    { fill: #ef4444; }
    .surface.s-sealant   { fill: #a3e635; }
    .surface.s-crown     { fill: #fbbf24; }
    .surface.s-rct       { fill: #9333ea; }
    .surface.s-missing   { fill: #1e293b; opacity: .35; }
    .surface.s-implant   { fill: #0ea5e9; }
    .surface.s-watch     { fill: #f97316; }
    .surface.s-fracture  { fill: #be185d; }

    /* Form polish — explicit Tailwind utilities (CDN doesn't support @apply outside special blocks) */
  </style>

  <style type="text/tailwindcss">
    @layer components {
      .input { @apply w-full px-2 py-1.5 bg-white border border-slate-300 rounded text-[13px] focus:outline-none focus:border-teal-600 focus:ring-1 focus:ring-teal-600; }
      .label { @apply block text-[11px] uppercase tracking-wide text-slate-500 font-semibold mb-0.5; }
      .btn { @apply inline-flex items-center gap-1.5 px-3 py-1.5 rounded text-[12px] font-medium transition; }
      .btn-primary { @apply bg-teal-700 text-white hover:bg-teal-800; }
      .btn-ghost { @apply text-slate-700 hover:bg-slate-100; }
      .btn-danger { @apply bg-rose-600 text-white hover:bg-rose-700; }
      .btn-soft { @apply bg-slate-100 text-slate-800 hover:bg-slate-200; }
      .marker-btn { @apply px-2 py-1 rounded text-[11px] font-medium border transition flex items-center gap-1.5; }
    }
  </style>

  <style>

    /* Scrollbar polish */
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* No outline on programmatic focus */
    [data-pf] { outline: none; }

    /* Print styling for walkout statements */
    @media print {
      body * { visibility: hidden; }
      #print-root, #print-root * { visibility: visible; }
      #print-root { position: absolute; left: 0; top: 0; width: 100%; }
    }

    /* Table polish */
    table.pp { width: 100%; border-collapse: collapse; }
    table.pp th { background: #f8fafc; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #64748b; padding: 8px 10px; border-bottom: 1px solid #cbd5e1; }
    table.pp td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    table.pp tr:hover td { background: #f8fafc; }

    /* Alert chip */
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .chip-amber { background: #fef3c7; color: #92400e; }
    .chip-rose  { background: #ffe4e6; color: #9f1239; }
    .chip-sky   { background: #e0f2fe; color: #075985; }
    .chip-emerald { background: #d1fae5; color: #065f46; }
    .chip-slate { background: #e2e8f0; color: #334155; }

    /* Keyboard kbd polish */
    kbd { background: #1e293b; color: #e2e8f0; padding: 1px 6px; border-radius: 3px; font-family: 'SFMono-Regular', monospace; font-size: 10px; border-bottom: 2px solid #0f172a; }

    /* Modal */
    .modal-back { position: fixed; inset: 0; background: rgba(15, 23, 42, .55); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: #fff; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,.25); width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-lg { max-width: 880px; }
    .modal h2 { font-size: 14px; font-weight: 600; }

    /* Mobile */
    @media (max-width: 768px) {
      .pp-sidebar { position: fixed; inset: 0 auto 0 0; z-index: 40; transform: translateX(-100%); transition: transform .2s; width: 86vw; max-width: 320px; box-shadow: 4px 0 18px rgba(0,0,0,.15); }
      .pp-sidebar.open { transform: none; }
      .pp-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 35; }
    }
  </style>
</head>
<body>

<!-- ─────────────────────────── App shell ───────────────────────────── -->
<div id="app" class="h-screen flex flex-col"></div>

<!-- Off-screen print root for walkout statements / treatment plans -->
<div id="print-root" style="display:none;"></div>

<!-- Toast host gets injected at runtime -->

<!-- Shared modules -->
<script src="/auth.js"></script>
<script src="/assets/pda-shared.js"></script>
<script src="/assets/pda-seed-patients.js"></script>

<script>
/* ============================================================
 * PDA Practice Pro v2
 * Single-file vanilla-JS dental practice management trainer.
 * Dark-navy ribbon UI workflow for RDA students.
 * ============================================================ */
(function () {
  'use strict';

  const APP = 'practice_pro';
  const { fmt, uid, debounce, escapeHtml, avatarUrl, toast, exportPDF,
          patientPortion, PERM_TEETH, SURFACES, SURFACE_COLORS, Store } = window.PDA_SHARED;
  const SEED = window.PDA_SEED;

  // ── State ──────────────────────────────────────────────────────
  const state = {
    user: null,
    patients: [],
    currentPatientId: null,
    module: 'overview',     // overview | chart | perio | tx | ledger | schedule | recall | docs
    ui: {
      sidebarOpen: window.matchMedia('(min-width: 769px)').matches,
      isMobile: window.matchMedia('(max-width: 768px)').matches,
      chartMarker: 'caries',
      toothContext: null,
      paletteOpen: false,
      modal: null,          // { type, props }
      patientFilter: '',
      patientFilterTab: 'all', // all | recall | new | overdue
    },
    audit: [],
  };

  // ── Persistence ────────────────────────────────────────────────
  async function loadState() {
    const saved = await Store.load(APP);
    if (saved && Array.isArray(saved.patients) && saved.patients.length) {
      state.patients = saved.patients;
      state.currentPatientId = saved.currentPatientId || saved.patients[0].id;
    } else {
      // First run: seed
      state.patients = JSON.parse(JSON.stringify(SEED.patients));
      state.currentPatientId = state.patients[0].id;
      await Store.save(APP, { patients: state.patients, currentPatientId: state.currentPatientId });
      Store.log(APP, 'seeded_patients', { count: state.patients.length });
    }
  }
  const saveSoon = debounce(() => {
    Store.save(APP, { patients: state.patients, currentPatientId: state.currentPatientId });
  }, 350);

  function logAction(action, metadata) {
    state.audit.unshift({ at: new Date().toISOString(), action, metadata });
    if (state.audit.length > 80) state.audit.length = 80;
    Store.log(APP, action, metadata);
  }

  // ── Selectors ──────────────────────────────────────────────────
  function currentPatient() {
    return state.patients.find(p => p.id === state.currentPatientId) || null;
  }

  function balanceFor(p) {
    return (p.ledger || []).reduce((acc, e) => acc + (Number(e.fee) || 0) - (Number(e.payment) || 0), 0);
  }

  function filteredPatients() {
    const q = state.ui.patientFilter.trim().toLowerCase();
    const tab = state.ui.patientFilterTab;
    let list = state.patients.slice();
    if (tab !== 'all') list = list.filter(p => (p.type || '') === tab);
    if (q) list = list.filter(p => {
      return [p.first, p.last, p.preferred, p.id, p.phone, p.dob, p.email]
        .filter(Boolean).some(s => String(s).toLowerCase().includes(q));
    });
    list.sort((a, b) => (a.last + a.first).localeCompare(b.last + b.first));
    return list;
  }

  // ── Render dispatch ────────────────────────────────────────────
  function render() {
    const root = document.getElementById('app');
    root.innerHTML = `
      ${renderTopChrome()}
      ${renderRibbon()}
      <div class="flex-1 flex overflow-hidden">
        ${renderSidebar()}
        <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
          ${renderBanner()}
          <div class="flex-1 overflow-auto">
            ${renderModule()}
          </div>
        </main>
      </div>
      ${renderModal()}
      ${renderPalette()}
    `;
    bindEvents();
  }
  const rerender = () => requestAnimationFrame(render);

  // ── Top chrome (dark navy title bar) ───────────────────────────
  function renderTopChrome() {
    const p = currentPatient();
    return `
      <header class="pp-chrome flex items-center justify-between px-3 py-1.5 text-[12px]">
        <div class="flex items-center gap-3">
          <button data-action="toggle-sidebar" class="md:hidden text-slate-300 hover:text-white">☰</button>
          <span class="flex items-center gap-1.5 font-semibold tracking-wide">
            <span class="inline-block w-2.5 h-2.5 bg-teal-500 rounded-sm"></span>
            PDA Practice Pro
            <span class="text-slate-500 font-normal">— Practice Management Trainer</span>
          </span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-slate-400">${escapeHtml(state.user ? `${state.user.first_name || 'Student'} ${state.user.last_name || ''}` : 'Student Demo')}</span>
          <button data-action="open-palette" class="bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded flex items-center gap-2 text-slate-200">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-4.3-4.3M10.5 18a7.5 7.5 0 110-15 7.5 7.5 0 010 15z"/></svg>
            <span>Search</span>
            <kbd>⌘K</kbd>
          </button>
          <button data-action="audit-toggle" class="text-slate-300 hover:text-white" title="Audit log">⏱</button>
        </div>
      </header>
    `;
  }

  // ── Ribbon (module switcher) ───────────────────────────────────
  function renderRibbon() {
    const tabs = [
      { id: 'overview', label: 'Overview', shortcut: '1' },
      { id: 'chart',    label: 'Chart',    shortcut: 'T' },
      { id: 'perio',    label: 'Perio',    shortcut: '3' },
      { id: 'tx',       label: 'Tx Plan',  shortcut: '4' },
      { id: 'ledger',   label: 'Ledger',   shortcut: 'L' },
      { id: 'schedule', label: 'Schedule', shortcut: 'S' },
      { id: 'recall',   label: 'Recall',   shortcut: '7' },
      { id: 'docs',     label: 'Documents',shortcut: '8' },
    ];
    return `
      <div class="pp-ribbon px-3 flex items-center gap-1 overflow-x-auto">
        ${tabs.map(t => `
          <button data-action="set-module" data-module="${t.id}"
            class="px-3 py-2.5 text-[12px] font-medium border-b-2 ${state.module === t.id ? 'pp-tab-active' : 'border-transparent text-slate-600 hover:text-slate-900 hover:bg-slate-100'}">
            ${t.label}
            <kbd class="ml-1.5 opacity-60">${t.shortcut}</kbd>
          </button>
        `).join('')}
        <span class="flex-1"></span>
        <div class="hidden sm:flex items-center gap-2 text-slate-500 pr-2">
          <kbd>?</kbd><span>help</span>
        </div>
      </div>
    `;
  }

  // ── Sidebar (patient list with search + tabs) ──────────────────
  function renderSidebar() {
    const list = filteredPatients();
    const tabs = [
      { id: 'all',      label: 'All',      cls: 'chip-slate' },
      { id: 'recall',   label: 'Recall',   cls: 'chip-emerald' },
      { id: 'new',      label: 'New',      cls: 'chip-sky' },
      { id: 'overdue',  label: 'Overdue',  cls: 'chip-rose' },
    ];
    return `
      ${state.ui.sidebarOpen && state.ui.isMobile ? '<div class="pp-backdrop" data-action="close-sidebar"></div>' : ''}
      <aside class="pp-sidebar w-72 flex flex-col ${state.ui.sidebarOpen ? 'open' : ''}">
        <div class="p-2 border-b border-slate-200">
          <div class="flex items-center gap-1 mb-1.5 md:hidden">
            <span class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold flex-1">Patients</span>
            <button data-action="close-sidebar" class="text-slate-500 hover:text-slate-900 px-2 py-1 rounded hover:bg-slate-100" aria-label="Close patient list">✕</button>
          </div>
          <div class="relative">
            <input id="patient-search" data-action="patient-filter"
              value="${escapeHtml(state.ui.patientFilter)}"
              placeholder="Search patients (F)..."
              class="w-full pl-7 pr-2 py-1.5 text-[12px] bg-slate-50 border border-slate-300 rounded focus:outline-none focus:border-teal-600" />
            <svg class="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-4.3-4.3M10.5 18a7.5 7.5 0 110-15 7.5 7.5 0 010 15z"/></svg>
          </div>
          <div class="flex gap-1 mt-2">
            ${tabs.map(t => `
              <button data-action="patient-filter-tab" data-tab="${t.id}"
                class="px-2 py-0.5 text-[11px] rounded ${state.ui.patientFilterTab === t.id ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}">
                ${t.label}
              </button>
            `).join('')}
            <button data-action="open-modal" data-modal="new-patient" class="ml-auto btn btn-primary !py-0.5 !px-2 !text-[11px]" title="New patient (N)">＋ New</button>
          </div>
        </div>
        <div class="flex-1 overflow-auto">
          ${list.length === 0 ? `
            <div class="p-6 text-center text-[12px] text-slate-500">No patients match.</div>
          ` : list.map(p => renderPatientRow(p)).join('')}
        </div>
        <div class="p-2 border-t border-slate-200 text-[11px] text-slate-500 flex justify-between">
          <span>${list.length} of ${state.patients.length} pts</span>
          <button data-action="open-modal" data-modal="audit" class="hover:text-teal-700">Audit log</button>
        </div>
      </aside>
    `;
  }

  function renderPatientRow(p) {
    const sel = p.id === state.currentPatientId;
    const due = p.recall?.due ? new Date(p.recall.due) : null;
    const today = new Date('2026-05-04');
    const dueDays = due ? Math.round((due - today) / 86400000) : null;
    const recallChip = dueDays != null
      ? (dueDays < -30 ? `<span class="chip chip-rose">overdue</span>`
        : dueDays < 0 ? `<span class="chip chip-amber">recall due</span>`
        : dueDays < 30 ? `<span class="chip chip-emerald">due ${dueDays}d</span>`
        : '')
      : '';
    const balance = balanceFor(p);
    const balChip = balance > 0
      ? `<span class="text-rose-600 font-semibold mono">${fmt.money(balance)}</span>`
      : `<span class="text-slate-400 mono">${fmt.money(0)}</span>`;
    return `
      <button data-action="select-patient" data-id="${p.id}"
        class="w-full text-left px-2.5 py-2 border-b border-slate-100 hover:bg-slate-50 ${sel ? 'bg-teal-50 border-l-4 border-l-teal-600' : 'border-l-4 border-l-transparent'}">
        <div class="flex items-center gap-2">
          <img src="${avatarUrl(p.first + ' ' + p.last)}" alt="" class="w-7 h-7 rounded-full bg-slate-200" />
          <div class="flex-1 min-w-0">
            <div class="text-[13px] font-semibold text-slate-900 truncate">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</div>
            <div class="text-[11px] text-slate-500 flex items-center gap-1.5 mono">
              ${p.id} · ${fmt.age(p.dob)}y ${escapeHtml(p.sex || '')}
            </div>
          </div>
          <div class="text-right">
            ${(p.alerts || []).length ? `<span class="chip chip-rose" title="${escapeHtml(p.alerts.join(', '))}">!</span>` : ''}
          </div>
        </div>
        <div class="flex items-center justify-between mt-1">
          ${recallChip || `<span class="text-[10px] text-slate-400">${escapeHtml(p.insurance?.primary?.carrier || 'self-pay')}</span>`}
          ${balChip}
        </div>
      </button>
    `;
  }

  // ── Patient banner (sticky, with name/photo/alerts) ────────────
  function renderBanner() {
    const p = currentPatient();
    if (!p) return `<div class="p-8 text-slate-400">No patient selected.</div>`;
    const ins = p.insurance?.primary;
    const alerts = (p.alerts || []);
    const balance = balanceFor(p);
    const balanceColor = balance > 0 ? 'text-rose-600' : 'text-slate-700';
    return `
      <header class="bg-white border-b border-slate-200 px-4 py-3 flex flex-wrap gap-4 items-center sticky top-0 z-10">
        <img src="${avatarUrl(p.first + ' ' + p.last)}" class="w-14 h-14 rounded-full border-2 border-slate-200" alt="" />
        <div class="flex-1 min-w-[220px]">
          <div class="flex items-center gap-2 flex-wrap">
            <h1 class="text-lg font-semibold text-slate-900">${escapeHtml(p.last)}, ${escapeHtml(p.first)}</h1>
            ${p.preferred && p.preferred !== p.first ? `<span class="text-slate-400 text-[12px]">"${escapeHtml(p.preferred)}"</span>` : ''}
            <span class="chip chip-slate mono">${escapeHtml(p.id)}</span>
            ${p.medical?.premedicate ? '<span class="chip chip-amber">PREMED</span>' : ''}
            ${(p.medical?.allergies || []).filter(a => a !== 'NKDA').length ? '<span class="chip chip-rose">ALLERGY</span>' : ''}
          </div>
          <div class="text-[12px] text-slate-500 flex flex-wrap gap-x-4 gap-y-0.5 mt-0.5">
            <span>DOB <span class="mono text-slate-700">${fmt.dateShort(p.dob)}</span> (${fmt.age(p.dob)} y)</span>
            <span>${escapeHtml(p.sex || '')}${p.pronouns ? ' · ' + escapeHtml(p.pronouns) : ''}</span>
            <span class="mono">${escapeHtml(p.phone || '')}</span>
            ${p.familyId ? `<span class="text-teal-700">Family ${escapeHtml(p.familyId)}</span>` : ''}
          </div>
        </div>
        <div class="text-right">
          <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Insurance</div>
          <div class="text-[12px] text-slate-800">${escapeHtml(ins?.carrier || 'Self-pay')}</div>
          <div class="text-[11px] text-slate-500 mono">Used ${fmt.money(ins?.used || 0)}/${ins?.max ? fmt.money(ins.max) : '—'}</div>
        </div>
        <div class="text-right border-l border-slate-200 pl-4">
          <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Balance</div>
          <div class="text-lg ${balanceColor} font-semibold mono">${fmt.money(balance)}</div>
          <button data-action="open-modal" data-modal="walkout" class="text-[11px] text-teal-700 hover:underline">Walkout statement →</button>
        </div>
        ${alerts.length ? `
          <div class="basis-full flex flex-wrap gap-1.5 pt-2 border-t border-slate-100 -mx-4 px-4">
            ${alerts.map(a => `<span class="chip chip-amber">⚠ ${escapeHtml(a)}</span>`).join('')}
          </div>
        ` : ''}
      </header>
    `;
  }

  // ── Module router ──────────────────────────────────────────────
  function renderModule() {
    const p = currentPatient();
    if (!p) return `<div class="p-8 text-slate-400">Select a patient.</div>`;
    const wrap = (inner) => `<div class="pp-fade p-4 max-w-[1400px] mx-auto">${inner}</div>`;
    switch (state.module) {
      case 'overview': return wrap(renderOverview(p));
      case 'chart':    return wrap(renderChart(p));
      case 'ledger':   return wrap(renderLedger(p));
      case 'tx':       return wrap(renderTxPlan(p));
      case 'perio':    return wrap(renderPerioStub(p));
      case 'schedule': return wrap(renderScheduleStub(p));
      case 'recall':   return wrap(renderRecall(p));
      case 'docs':     return wrap(renderDocsStub(p));
      default: return '';
    }
  }

  // ── Overview module ────────────────────────────────────────────
  function renderOverview(p) {
    const ins = p.insurance?.primary || {};
    const med = p.medical || {};
    return `
      <div class="grid lg:grid-cols-3 gap-4">
        <!-- Demographics -->
        <section class="bg-white rounded border border-slate-200 p-4 lg:col-span-2">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-slate-900 text-[13px]">Demographics</h2>
            <span class="text-[11px] text-slate-400">Auto-saves on blur</span>
          </div>
          <div class="grid sm:grid-cols-2 gap-3">
            ${field('first',     'First name',  p.first)}
            ${field('last',      'Last name',   p.last)}
            ${field('preferred', 'Goes by',     p.preferred || '')}
            ${field('dob',       'Date of birth', p.dob, 'date')}
            ${field('sex',       'Sex',         p.sex || '')}
            ${field('pronouns',  'Pronouns',    p.pronouns || '')}
            ${field('phone',     'Phone',       p.phone || '')}
            ${field('email',     'Email',       p.email || '')}

  function field(key, label, value, type = 'text', span = 1) {
    return `
      <label class="block ${span === 2 ? 'sm:col-span-2' : ''}">
        <span class="label">${escapeHtml(label)}</span>
        <input type="${type}" data-edit="${key}" value="${escapeHtml(value || '')}" class="input" />
      </label>
    `;
  }

  // ── Stubs for modules that arrive in subsequent pushes ─────────
  // ── Chart module: odontogram with surface marking ──────────────
  const MARKERS = [
    { id: '',          label: 'Erase',      color: '#ffffff', text: 'Clear' },
    { id: 'caries',    label: 'Caries',     color: '#ef4444' },
    { id: 'composite', label: 'Composite',  color: '#0d9488' },
    { id: 'amalgam',   label: 'Amalgam',    color: '#475569' },
    { id: 'sealant',   label: 'Sealant',    color: '#a3e635' },
    { id: 'crown',     label: 'Crown',      color: '#fbbf24', whole: true },
    { id: 'rct',       label: 'RCT',        color: '#9333ea', whole: true },
    { id: 'missing',   label: 'Missing',    color: '#1e293b', whole: true },
    { id: 'implant',   label: 'Implant',    color: '#0ea5e9', whole: true },
    { id: 'watch',     label: 'Watch',      color: '#f97316' },
    { id: 'fracture',  label: 'Fracture',   color: '#be185d' },
  ];

  // Determine if a tooth is anterior (incisor/canine) by universal number.
  function isAnterior(n) { return (n >= 6 && n <= 11) || (n >= 22 && n <= 27); }

  function renderChart(p) {
    const chart = p.chart || {};
    const counts = { caries: 0, composite: 0, amalgam: 0, missing: 0, crown: 0, planned: 0 };
    Object.values(chart).forEach(t => {
      Object.values(t || {}).forEach(v => { if (counts[v] != null) counts[v]++; });
    });
    const planned = (p.treatmentPlan || []).filter(l => l.tooth).length;
    counts.planned = planned;
    const activeMarker = state.ui.chartMarker || 'caries';
    const ctx = state.ui.toothContext;

    return `
      <div class="space-y-3">
        <!-- Toolbar -->
        <div class="bg-white rounded border border-slate-200 p-3">
          <div class="flex flex-wrap items-center gap-2">
            <span class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold mr-2">Marker</span>
            ${MARKERS.map(m => `
              <button data-action="set-marker" data-marker="${m.id}"
                class="marker-btn ${activeMarker === m.id ? 'border-teal-600 ring-1 ring-teal-600 bg-teal-50' : 'border-slate-200 bg-white hover:bg-slate-50'}"
                title="${m.label}${m.whole ? ' (whole tooth)' : ''}">
                <span class="inline-block w-3 h-3 rounded-sm border border-slate-300" style="background:${m.color}"></span>
                <span>${m.label}</span>
              </button>`).join('')}
            <span class="flex-1"></span>
            <button class="btn btn-soft" data-action="chart-reset" title="Clear all chart markings">Reset chart</button>
          </div>
          <div class="text-[11px] text-slate-500 mt-2">
            Click a surface to apply the active marker. <span class="hidden md:inline">Right-click a tooth for more actions.</span>
            Whole-tooth markers (Crown, RCT, Missing, Implant) apply to the entire tooth.
          </div>
        </div>

        <!-- Stats strip -->
        <div class="grid grid-cols-2 sm:grid-cols-6 gap-2">
          ${[
            { k: 'caries',    l: 'Active caries',  cls: 'text-rose-700' },
            { k: 'composite', l: 'Composites',     cls: 'text-teal-700' },
            { k: 'amalgam',   l: 'Amalgams',       cls: 'text-slate-700' },
            { k: 'crown',     l: 'Crowns',         cls: 'text-amber-700' },
            { k: 'missing',   l: 'Missing',        cls: 'text-slate-900' },
            { k: 'planned',   l: 'Tx-planned',     cls: 'text-sky-700' },
          ].map(s => `
            <div class="bg-white rounded border border-slate-200 p-2">
              <div class="text-[10px] uppercase tracking-wide text-slate-500">${s.l}</div>
              <div class="text-lg mono font-semibold ${s.cls}">${counts[s.k] || 0}</div>
            </div>`).join('')}
        </div>

        <!-- Odontogram -->
        <div class="bg-white rounded border border-slate-200 p-4 overflow-x-auto">
          <div class="min-w-[760px]">
            ${renderArch(chart, true,  PERM_TEETH.slice(0, 16))}
            <div class="my-2 border-t-2 border-dashed border-slate-200 relative">
              <span class="absolute -top-2 left-1/2 -translate-x-1/2 bg-white px-2 text-[10px] uppercase tracking-wider text-slate-400 font-semibold">midline</span>
            </div>
            ${renderArch(chart, false, PERM_TEETH.slice(16).reverse())}
          </div>
        </div>

        <!-- Existing chart legend / chart history -->
        <div class="grid lg:grid-cols-2 gap-3">
          <div class="bg-white rounded border border-slate-200 p-3">
            <div class="text-[12px] font-semibold mb-2">Existing restorations + findings</div>
            ${renderChartFindings(chart, false)}
          </div>
          <div class="bg-white rounded border border-slate-200 p-3">
            <div class="text-[12px] font-semibold mb-2">Treatment-planned</div>
            ${(p.treatmentPlan || []).filter(l => l.tooth).length === 0 ? '<div class="text-[12px] text-slate-500">No tooth-specific treatment planned.</div>' :
            `<ul class="text-[12px] space-y-1">${(p.treatmentPlan || []).filter(l => l.tooth).map(l => `
              <li class="flex justify-between border-b border-slate-100 pb-1">
                <span><span class="mono font-semibold">#${escapeHtml(l.tooth)}${l.surface ? ' ' + escapeHtml(l.surface) : ''}</span> · ${escapeHtml(l.code)} ${escapeHtml(l.desc)}</span>
                <span class="mono">${fmt.money(l.fee)}</span>
              </li>`).join('')}</ul>`}
          </div>
        </div>

        ${ctx ? renderToothMenu(ctx) : ''}
      </div>
    `;
  }

  function renderArch(chart, isUpper, teethRange) {
    return `
      <div class="grid grid-cols-16 gap-1" style="grid-template-columns: repeat(16, minmax(0, 1fr));">
        ${teethRange.map(n => renderTooth(n, chart[`T-${n}`] || {}, isUpper)).join('')}
      </div>
      <div class="grid grid-cols-16 gap-1 mt-0.5" style="grid-template-columns: repeat(16, minmax(0, 1fr));">
        ${teethRange.map(n => `<div class="text-center text-[10px] mono text-slate-500">${n}</div>`).join('')}
      </div>
    `;
  }

  function renderTooth(num, marks, isUpper) {
    const ant = isAnterior(num);
    // Surfaces always fetched as M, B/F, D, L, O/I but we render strips around a center
    const m = marks || {};
    const surfaceColor = (key) => {
      const v = m[key]; if (!v) return '#ffffff';
      const found = MARKERS.find(x => x.id === v);
      return found ? found.color : '#ffffff';
    };
    // Whole-tooth markers: explicit `whole` key, OR any surface containing a whole-marker value
    const WHOLE_VALS = ['crown', 'rct', 'missing', 'implant'];
    const wholeVal = m.whole || Object.values(m).find(v => WHOLE_VALS.includes(v));
    const wholeColor = wholeVal ? (MARKERS.find(x => x.id === wholeVal)?.color || '#ffffff') : null;
    // Check for treatment-planned overlay (planned) — drawn as outline ring
    const w = 36, h = 56;
    const stroke = wholeColor ? '#0f172a' : '#94a3b8';
    return `
      <div class="tooth flex flex-col items-center" data-tooth="${num}">
        <svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:38px;height:auto" oncontextmenu="return false">
          ${ wholeColor ? `<rect x="2" y="2" width="${w-4}" height="${h-4}" rx="6" ry="6" fill="${wholeColor}" stroke="${stroke}" stroke-width="1" />`
            : `
            <rect class="tooth-shape" x="2" y="2" width="${w-4}" height="${h-4}" rx="6" ry="6" fill="#ffffff" stroke="${stroke}" stroke-width="1"/>
            <!-- B/F (top) -->
            <rect data-surface="B" x="6" y="4" width="${w-12}" height="9"  rx="2" fill="${surfaceColor('B')}" stroke="#cbd5e1" />
            <!-- L (bottom) -->
            <rect data-surface="L" x="6" y="${h-13}" width="${w-12}" height="9" rx="2" fill="${surfaceColor('L')}" stroke="#cbd5e1" />
            <!-- M (left) -->
            <rect data-surface="M" x="4" y="14" width="9" height="${h-28}" rx="2" fill="${surfaceColor('M')}" stroke="#cbd5e1" />
            <!-- D (right) -->
            <rect data-surface="D" x="${w-13}" y="14" width="9" height="${h-28}" rx="2" fill="${surfaceColor('D')}" stroke="#cbd5e1" />
            <!-- O/I (center) -->
            <rect data-surface="${ant ? 'I' : 'O'}" x="14" y="16" width="${w-28}" height="${h-32}" rx="2" fill="${surfaceColor(ant ? 'I' : 'O') !== '#ffffff' ? surfaceColor(ant ? 'I' : 'O') : surfaceColor('O')}" stroke="#cbd5e1" />
          ` }
        </svg>
      </div>
    `;
  }

  function renderChartFindings(chart, includeWhole) {
    const rows = [];
    Object.keys(chart).sort((a, b) => parseInt(a.split('-')[1]) - parseInt(b.split('-')[1])).forEach(k => {
      const num = k.split('-')[1];
      const m = chart[k];
      Object.entries(m).forEach(([surf, val]) => {
        if (!val) return;
        rows.push({ tooth: num, surf, val });
      });
    });
    if (rows.length === 0) return '<div class="text-[12px] text-slate-500">No existing chart markings.</div>';
    return `<ul class="text-[12px] space-y-1 max-h-56 overflow-auto">${rows.map(r => {
      const m = MARKERS.find(x => x.id === r.val);
      return `<li class="flex items-center gap-2 border-b border-slate-100 pb-1">
        <span class="inline-block w-3 h-3 rounded-sm" style="background:${m?.color || '#cbd5e1'}"></span>
        <span class="mono">#${r.tooth} ${r.surf === 'whole' ? '' : r.surf}</span>
        <span class="capitalize">${escapeHtml(m?.label || r.val)}</span>
      </li>`;
    }).join('')}</ul>`;
  }

  function renderToothMenu(ctx) {
    return `
      <div class="fixed inset-0 z-30" data-action="close-tooth-menu" style="background:transparent">
        <div class="absolute bg-white border border-slate-200 rounded shadow-lg py-1 text-[12px]"
             style="left:${ctx.x}px;top:${ctx.y}px;min-width:180px"
             onclick="event.stopPropagation()">
          <div class="px-3 py-1.5 text-[11px] font-semibold uppercase tracking-wide text-slate-500 border-b border-slate-100">Tooth #${ctx.tooth}</div>
          <button class="w-full text-left px-3 py-1.5 hover:bg-slate-50" data-action="tooth-plan" data-tooth="${ctx.tooth}">＋ Plan procedure</button>
          <button class="w-full text-left px-3 py-1.5 hover:bg-slate-50" data-action="tooth-mark-missing" data-tooth="${ctx.tooth}">Mark missing</button>
          <button class="w-full text-left px-3 py-1.5 hover:bg-slate-50" data-action="tooth-mark-watch" data-tooth="${ctx.tooth}">Mark watch (occlusal)</button>
          <button class="w-full text-left px-3 py-1.5 hover:bg-slate-50" data-action="tooth-clear" data-tooth="${ctx.tooth}">Clear all markings</button>
        </div>
      </div>
    `;
  }
  function renderPerioStub(p) { return placeholder('Perio', '6-point perio chart ships in a follow-up push.'); }
  function renderScheduleStub(p) { return placeholder('Schedule', 'Op grid + drag-drop schedule ships in a follow-up push.'); }
  function renderTxPlan(p) {
    const tp = p.treatmentPlan || [];
    if (tp.length === 0) return `<div class="bg-white rounded border border-slate-200 p-6 text-center text-slate-500 text-[12px]">No treatment planned for this patient yet. The full Tx Plan editor lands in a follow-up push.</div>`;
    const total = tp.reduce((a, l) => a + (Number(l.fee) || 0), 0);
    const portion = tp.reduce((a, l) => a + patientPortion(l, SEED.adaCodes, SEED.coverage), 0);
    const phases = [1, 2, 3];
    return `
      <div class="bg-white rounded border border-slate-200 overflow-hidden">
        <div class="p-3 border-b border-slate-200 flex justify-between items-center">
          <h2 class="font-semibold text-[13px]">Treatment plan</h2>
          <div class="text-[12px] flex gap-4">
            <span>Total: <span class="mono font-semibold">${fmt.money(total)}</span></span>
            <span>Pt portion (est): <span class="mono font-semibold text-rose-700">${fmt.money(portion)}</span></span>
          </div>
        </div>
        ${phases.map(ph => {
          const lines = tp.filter(l => (l.phase || 1) === ph);
          if (lines.length === 0) return '';
          const phTotal = lines.reduce((a, l) => a + (Number(l.fee) || 0), 0);
          return `
            <div>
              <div class="px-3 py-1.5 bg-slate-50 border-b border-slate-200 text-[11px] uppercase tracking-wide font-semibold text-slate-600 flex justify-between">
                <span>Phase ${ph}</span><span class="mono">${fmt.money(phTotal)}</span>
              </div>
              <table class="pp">
                <tbody>
                  ${lines.map(l => `
                    <tr>
                      <td class="mono">${escapeHtml(l.code)}</td>
                      <td>${escapeHtml(l.desc)}</td>
                      <td class="mono">${l.tooth || '—'}${l.surface ? ' ' + escapeHtml(l.surface) : ''}</td>
                      <td><span class="chip ${l.priority === 'high' ? 'chip-rose' : l.priority === 'medium' ? 'chip-amber' : 'chip-slate'}">${escapeHtml(l.priority || 'medium')}</span></td>
                      <td class="text-right mono">${fmt.money(l.fee)}</td>
                      <td class="text-right text-[11px] text-slate-500 mono">est ${fmt.money(patientPortion(l, SEED.adaCodes, SEED.coverage))}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>`;
        }).join('')}
      </div>
    `;
  }
  function renderLedger(p) {
    const entries = (p.ledger || []).slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
    let running = 0;
    const rows = entries.map(e => {
      const charge = Number(e.fee) || 0;
      const payment = Number(e.payment) || 0;
      running += charge - payment;
      return `
        <tr>
          <td class="mono">${fmt.dateShort(e.date)}</td>
          <td class="mono">${escapeHtml(e.code || '')}</td>
          <td>${escapeHtml(e.desc || '')}</td>
          <td class="mono">${e.tooth || '—'}${e.surface ? ' ' + escapeHtml(e.surface) : ''}</td>
          <td>${escapeHtml(e.provider || '')}</td>
          <td class="text-right mono">${charge ? fmt.money(charge) : '—'}</td>
          <td class="text-right mono">${payment ? fmt.money(payment) : '—'}</td>
          <td class="text-right mono ${running > 0 ? 'text-rose-700 font-semibold' : 'text-slate-700'}">${fmt.money(running)}</td>
        </tr>
      `;
    }).join('');
    return `
      <div class="bg-white rounded border border-slate-200 overflow-hidden">
        <div class="p-3 border-b border-slate-200 flex flex-wrap justify-between items-center gap-2">
          <h2 class="font-semibold text-[13px]">Ledger</h2>
          <div class="flex gap-2">
            <button class="btn btn-soft" data-action="open-modal" data-modal="post-procedure">＋ Post procedure</button>
            <button class="btn btn-soft" data-action="open-modal" data-modal="post-payment">$ Post payment</button>
            <button class="btn btn-primary" data-action="open-modal" data-modal="walkout">Walkout statement</button>
          </div>
        </div>
        ${entries.length === 0 ? '<div class="p-6 text-[12px] text-slate-500 text-center">No ledger entries. Post a procedure to begin.</div>' :
        `<table class="pp">
          <thead>
            <tr><th>Date</th><th>Code</th><th>Description</th><th>Tooth</th><th>Provider</th><th class="text-right">Charge</th><th class="text-right">Payment</th><th class="text-right">Balance</th></tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr class="bg-slate-50 font-semibold">
              <td colspan="5" class="text-right">Current balance</td>
              <td colspan="2"></td>
              <td class="text-right mono ${running > 0 ? 'text-rose-700' : 'text-slate-700'}">${fmt.money(running)}</td>
            </tr>
          </tfoot>
        </table>`}
      </div>
    `;
  }
  function renderRecall(p) {
    const today = new Date('2026-05-04');
    const list = state.patients.map(p2 => {
      const due = p2.recall?.due ? new Date(p2.recall.due) : null;
      const days = due ? Math.round((due - today) / 86400000) : null;
      return { p: p2, days };
    }).filter(x => x.days != null && x.days <= 30).sort((a, b) => a.days - b.days);
    return `
      <div class="bg-white rounded border border-slate-200 overflow-hidden">

  function renderPaletteResults(query = '') {
    const root = document.getElementById('palette-results');
    if (!root) return;
    const q = query.trim().toLowerCase();
    const out = [];
    if (q) {
      // Patients
      state.patients.forEach(p => {
        const hay = `${p.first} ${p.last} ${p.id} ${p.phone || ''}`.toLowerCase();
        if (hay.includes(q)) out.push({
          kind: 'Patient', label: `${p.last}, ${p.first}`, sub: `${p.id} · ${fmt.age(p.dob)}y`, action: () => { selectPatient(p.id); closePalette(); }
        });
      });
      // ADA codes
      SEED.adaCodes.forEach(c => {
        const hay = `${c.code} ${c.desc}`.toLowerCase();
        if (hay.includes(q)) out.push({
          kind: 'ADA', label: c.code, sub: c.desc, action: () => { closePalette(); openModal('post-procedure', { prefill: c }); }
        });
      });
      // Actions
      const actions = [
        { label: 'New patient', module: null, action: () => { closePalette(); openModal('new-patient'); } },
        { label: 'Post procedure', action: () => { closePalette(); openModal('post-procedure'); } },
        { label: 'Walkout statement', action: () => { closePalette(); openModal('walkout'); } },
        { label: 'Open Chart', action: () => { closePalette(); setModule('chart'); } },
        { label: 'Open Ledger', action: () => { closePalette(); setModule('ledger'); } },
        { label: 'Open Schedule', action: () => { closePalette(); setModule('schedule'); } },
      ];
      actions.forEach(a => { if (a.label.toLowerCase().includes(q)) out.push({ kind: 'Action', label: a.label, sub: '', action: a.action }); });
    }
    root.innerHTML = (out.length === 0 && q
      ? `<div class="p-4 text-[12px] text-slate-500">No matches.</div>`
      : (out.slice(0, 16).map((r, i) => `
        <button data-pi="${i}" class="w-full text-left px-3 py-2 rounded hover:bg-slate-100 flex items-baseline gap-2">
          <span class="text-[10px] uppercase tracking-wide text-slate-400 w-14 shrink-0">${r.kind}</span>
          <span class="flex-1 truncate">${escapeHtml(r.label)}</span>
          <span class="text-[11px] text-slate-500 truncate">${escapeHtml(r.sub)}</span>
        </button>
      `).join('')));
    Array.from(root.querySelectorAll('button[data-pi]')).forEach((b, i) => {
      b.onclick = () => out[i].action();
    });
  }

  // ── ADA typeahead in procedure modal ───────────────────────────
  function renderAdaSuggestions(q) {
    const box = document.getElementById('ada-suggest');
    if (!box) return;
    const ql = (q || '').trim().toLowerCase();
    if (!ql) { box.classList.add('hidden'); return; }
    const matches = SEED.adaCodes.filter(c =>
      c.code.toLowerCase().includes(ql) || c.desc.toLowerCase().includes(ql)
    ).slice(0, 8);
    if (matches.length === 0) { box.classList.add('hidden'); return; }
    box.classList.remove('hidden');
    box.innerHTML = matches.map((c, i) => `
      <button type="button" data-ada-i="${i}" class="w-full text-left px-3 py-2 hover:bg-teal-50 border-b border-slate-100 flex items-baseline gap-2">
        <span class="mono text-[12px] font-semibold w-14 shrink-0">${c.code}</span>
        <span class="flex-1 text-[12px]">${escapeHtml(c.desc)}</span>
        <span class="mono text-[11px] text-slate-500">${fmt.money(c.fee)}</span>
      </button>
    `).join('');
    Array.from(box.querySelectorAll('button[data-ada-i]')).forEach((btn, i) => {
      btn.onclick = () => {
        const c = matches[i];
        const form = box.closest('form');
        form.code.value = c.code;
        form.fee.value = c.fee;
        // Try to fill description in notes if helpful
        box.classList.add('hidden');
        form.querySelector('[name="tooth"]').focus();
      };
    });
  }

  // ── Actions ─────────────────────────────────────────────────────
  function markSurface(tooth, surf, val) {
    const p = currentPatient(); if (!p) return;
    p.chart = p.chart || {};
    const key = `T-${tooth}`;
    p.chart[key] = p.chart[key] || {};
    // If tooth had whole-tooth marker, clear it first
    if (p.chart[key].whole) delete p.chart[key].whole;
    p.chart[key][surf] = val;
    saveSoon();
    logAction('chart_mark_surface', { tooth, surf, val });
  }
  function markWholeTooth(tooth, val) {
    const p = currentPatient(); if (!p) return;
    p.chart = p.chart || {};
    p.chart[`T-${tooth}`] = { whole: val };
    saveSoon();
    logAction('chart_mark_whole', { tooth, val });
  }
  function clearSurface(tooth, surf) {
    const p = currentPatient(); if (!p) return;
    if (p.chart?.[`T-${tooth}`]) {
      delete p.chart[`T-${tooth}`][surf];
      if (Object.keys(p.chart[`T-${tooth}`]).length === 0) delete p.chart[`T-${tooth}`];
      saveSoon();
      logAction('chart_clear_surface', { tooth, surf });
    }
  }

  function closeModal() { state.ui.modal = null; rerender(); }
  function openPalette() { state.ui.paletteOpen = true; rerender(); setTimeout(() => renderPaletteResults(''), 0); }
  function closePalette() { state.ui.paletteOpen = false; rerender(); }

  // ── Event delegation ────────────────────────────────────────────
  function bindEvents() {
    const root = document.getElementById('app');

    root.onclick = (ev) => {
      const t = ev.target.closest('[data-action]');
      if (!t) return;
      const a = t.dataset.action;
      switch (a) {
        case 'toggle-sidebar': state.ui.sidebarOpen = !state.ui.sidebarOpen; rerender(); break;
        case 'close-sidebar': state.ui.sidebarOpen = false; rerender(); break;
        case 'open-palette': openPalette(); break;
        case 'close-palette': closePalette(); break;
        case 'audit-toggle': openModal('audit'); break;
        case 'set-module': setModule(t.dataset.module); break;
        case 'select-patient': selectPatient(t.dataset.id); break;
        case 'patient-filter-tab': state.ui.patientFilterTab = t.dataset.tab; rerender(); break;
        case 'open-modal': openModal(t.dataset.modal); break;
        case 'close-modal':
          if (ev.target === t) closeModal(); break;
        case 'walkout-print': window.print(); break;
        case 'walkout-pdf': downloadWalkout(); break;
        case 'toggle-premed': {
          const p = currentPatient(); if (p) {
            p.medical = p.medical || {};
            p.medical.premedicate = !p.medical.premedicate;
            saveSoon(); logAction('toggle_premed', { id: p.id, value: p.medical.premedicate }); rerender();
          }
          break;
        }
        case 'set-marker': state.ui.chartMarker = t.dataset.marker; rerender(); break;
        case 'chart-reset': {
          if (!confirm('Clear all chart markings for this patient?')) break;
          const p = currentPatient(); if (p) { p.chart = {}; saveSoon(); logAction('chart_reset', { id: p.id }); rerender(); toast('Chart cleared'); }
          break;
        }
        case 'tooth-plan': {
          const num = t.dataset.tooth;
          state.ui.toothContext = null;
          openModal('post-procedure', { prefillTooth: num, status: 'planned' });
          // Defer focus and prefill
          setTimeout(() => {
            const inp = document.querySelector('[name="tooth"]');
            if (inp) inp.value = num;
          }, 0);
          break;
        }
        case 'tooth-mark-missing': {
          markWholeTooth(t.dataset.tooth, 'missing');
          state.ui.toothContext = null; rerender(); break;
        }
        case 'tooth-mark-watch': {
          markSurface(t.dataset.tooth, isAnterior(+t.dataset.tooth) ? 'I' : 'O', 'watch');
          state.ui.toothContext = null; rerender(); break;
        }
        case 'tooth-clear': {
          const p = currentPatient(); if (p) { delete (p.chart || {})[`T-${t.dataset.tooth}`]; saveSoon(); logAction('tooth_clear', { tooth: t.dataset.tooth }); }
          state.ui.toothContext = null; rerender(); break;
        }
        case 'close-tooth-menu': {
          if (ev.target === t) state.ui.toothContext = null;
          rerender(); break;
        }
        case 'filter-family': {
          state.ui.patientFilter = ''; state.ui.patientFilterTab = 'all';
          // Filter list to family members of fid
          const fid = t.dataset.fid;
          const members = state.patients.filter(p => p.familyId === fid);
          if (members.length) {
            state.ui.patientFilter = members.map(p => p.last).join(' ');
          }
          rerender();
          break;
        }
      }
    };

    root.oninput = (ev) => {
      const t = ev.target.closest('[data-action]');
      if (!t) return;
      if (t.dataset.action === 'patient-filter') {
        state.ui.patientFilter = t.value;
        // Cheap re-render of just the list section
        const grid = document.querySelector('.pp-sidebar > div:nth-child(2)');
        if (grid) grid.innerHTML = filteredPatients().map(renderPatientRow).join('') || '<div class="p-6 text-center text-[12px] text-slate-500">No matches.</div>';
      }
      if (t.dataset.action === 'palette-input') renderPaletteResults(t.value);
      if (t.dataset.action === 'ada-typeahead') renderAdaSuggestions(t.value);
    };

    root.onsubmit = (ev) => {
      const t = ev.target.closest('[data-action]');
      if (!t) return;
      const a = t.dataset.action;
      ev.preventDefault();
      if (a === 'submit-new-patient') return submitNewPatient(t);
      if (a === 'submit-procedure')   return submitProcedure(t);
      if (a === 'submit-payment')     return submitPayment(t);
      if (a === 'submit-medical')     return submitMedical(t);
    };

    // Tooth surface paint (delegated to root)
    root.addEventListener('click', (ev) => {
      const surf = ev.target.closest?.('[data-surface]');
      if (!surf) return;
      const toothEl = surf.closest('[data-tooth]');
      if (!toothEl) return;
      const tooth = toothEl.dataset.tooth;
      const marker = state.ui.chartMarker;
      const def = MARKERS.find(m => m.id === marker);
      ev.stopPropagation();
      state.ui.toothContext = null;
      if (!marker) { clearSurface(tooth, surf.dataset.surface); rerender(); return; }
      if (def?.whole) {
        markWholeTooth(tooth, marker);
      } else {
        markSurface(tooth, surf.dataset.surface, marker);
      }
      rerender();
    });

    // Right-click on tooth → context menu
    root.addEventListener('contextmenu', (ev) => {
      const toothEl = ev.target.closest?.('[data-tooth]');
      if (!toothEl) return;
      ev.preventDefault();
      const r = toothEl.getBoundingClientRect();
      const x = Math.min(r.right, window.innerWidth - 220);
      const y = Math.min(r.bottom + 4, window.innerHeight - 200);
      state.ui.toothContext = { tooth: toothEl.dataset.tooth, x, y };
      rerender();
    });

    // Demographics autosave on blur
    root.addEventListener('blur', (ev) => {
      const inp = ev.target;
      if (!inp.matches?.('[data-edit]')) return;
      const p = currentPatient(); if (!p) return;
      const key = inp.dataset.edit;
      if (p[key] !== inp.value) {
        p[key] = inp.value;
        saveSoon();
        logAction('edit_demographics', { id: p.id, field: key });
        toast(`Saved ${key}`, { tone: 'success', ms: 1200 });
      }
    }, true);
  }

  // ── Submit handlers ─────────────────────────────────────────────
  function submitNewPatient(form) {
    const fd = new FormData(form);
    const id = `PT-${(Math.max(0, ...state.patients.map(p => parseInt(p.id.split('-')[1] || 0))) + 1).toString().padStart(4, '0')}`;
    const p = {
      id, mrn: id.split('-')[1],
      first: fd.get('first'), last: fd.get('last'),
      dob: fd.get('dob') || null, sex: fd.get('sex') || '',
      phone: fd.get('phone') || '', email: fd.get('email') || '',
      address: '', city: 'Longview', state: 'TX', zip: '',
      insurance: { primary: { carrier: 'Self-pay', plan: '', group: '', max: 0, deductible: 0, used: 0 } },
      medical: { allergies: ['NKDA'], meds: [], conditions: [], premedicate: false, notes: '' },
      alerts: [], ledger: [], treatmentPlan: [], chart: {}, perio: null, notes: [],
      provider: 'Dr. Williams', type: 'new',
      lastProphy: null, recall: { interval: 6, due: '2026-05-04' },
    };
    state.patients.push(p);
    state.currentPatientId = id;
    saveSoon();
    logAction('created_patient', { id, name: `${p.first} ${p.last}` });
    closeModal();
    toast(`Added ${p.first} ${p.last}`, { tone: 'success' });
  }

  function submitProcedure(form) {
    const p = currentPatient(); if (!p) return;
    const fd = new FormData(form);
    const code = String(fd.get('code') || '').toUpperCase().trim();
    const ada = SEED.adaCodes.find(c => c.code === code);
    const fee = Number(fd.get('fee')) || (ada?.fee) || 0;
    const entry = {
      date: '2026-05-04',
      code, desc: ada?.desc || code,
      tooth: fd.get('tooth') || null, surface: fd.get('surface') || null,
      fee, status: 'completed', provider: fd.get('provider') || 'Dr. Williams',
      notes: fd.get('notes') || '',
    };
    p.ledger = (p.ledger || []).concat([entry]);
    saveSoon();
    logAction('posted_procedure', { id: p.id, code, fee });
    closeModal();
    toast(`Posted ${code} — ${fmt.money(fee)}`, { tone: 'success' });
  }

  function submitPayment(form) {
    const p = currentPatient(); if (!p) return;
    const fd = new FormData(form);
    const amt = Number(fd.get('amount')) || 0;
    if (!amt) return toast('Enter an amount', { tone: 'warn' });
    p.ledger = (p.ledger || []).concat([{
      date: fd.get('date') || '2026-05-04',
      code: '', desc: `Payment — ${fd.get('method')}`,
      payment: amt, fee: 0,
    }]);
    saveSoon();
    logAction('posted_payment', { id: p.id, amount: amt });
    closeModal();
    toast(`Posted ${fmt.money(amt)} payment`, { tone: 'success' });
  }

  function submitMedical(form) {
    const p = currentPatient(); if (!p) return;
    const fd = new FormData(form);
    const split = (s) => String(s || '').split(/\n+/).map(x => x.trim()).filter(Boolean);
    p.medical = {
      allergies: split(fd.get('allergies')),
      meds: split(fd.get('meds')),
      conditions: split(fd.get('conditions')),
      notes: fd.get('notes') || '',
      premedicate: !!fd.get('premedicate'),
    };
    // Auto-update banner alerts: keep existing custom alerts but rebuild medically-derived ones
    const derived = [];
    p.medical.allergies.filter(a => a !== 'NKDA').forEach(a => derived.push(`${a} allergy`));
    if (p.medical.premedicate) derived.push('Premedicate');
    p.alerts = derived;
    saveSoon();
    logAction('edit_medical', { id: p.id });
    closeModal();
    toast('Medical history saved', { tone: 'success' });
  }

  async function downloadWalkout() {
    const p = currentPatient();
    const today = '2026-05-04';
    const todays = (p.ledger || []).filter(e => (e.date || '').slice(0, 10) === today);
    const balance = balanceFor(p);
    const charges = todays.reduce((a, e) => a + (Number(e.fee) || 0), 0);
    const payments = todays.reduce((a, e) => a + (Number(e.payment) || 0), 0);
    const html = `
      <div style="font-family:Inter,sans-serif;color:#0f172a;">
        <table style="width:100%;border-bottom:2px solid #0f172a;padding-bottom:8px;margin-bottom:16px"><tr>
          <td><strong style="font-size:18px">Premier Dental Academy of Longview</strong><br/>
          <span style="color:#64748b;font-size:12px">123 Practice Way · Longview, TX 75601 · (903) 555-0100</span></td>
          <td style="text-align:right">
            <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em">Walkout statement</div>
            <div style="font-family:monospace;font-size:14px">${today}</div>
          </td>
        </tr></table>
        <table style="width:100%;margin-bottom:16px"><tr>
          <td><strong>${escapeHtml(p.last)}, ${escapeHtml(p.first)}</strong><br/>
            <span style="color:#475569;font-size:12px">${escapeHtml(p.address || '')}<br/>${escapeHtml(p.city || '')} ${escapeHtml(p.state || '')} ${escapeHtml(p.zip || '')}</span></td>
          <td style="text-align:right;font-size:12px">
            Patient ID: <strong style="font-family:monospace">${escapeHtml(p.id)}</strong><br/>
            DOB: <span style="font-family:monospace">${fmt.dateShort(p.dob)}</span><br/>
            Provider: ${escapeHtml(p.provider || '—')}
          </td>
        </tr></table>
        <h3 style="border-bottom:1px solid #cbd5e1;padding-bottom:4px;margin-bottom:6px;font-size:13px">Today's services</h3>
        ${todays.length === 0 ? '<div style="color:#64748b;font-size:12px;margin-bottom:12px">No services posted today.</div>' :
        `<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px">
          <thead><tr style="background:#f8fafc"><th align="left" style="padding:6px;border-bottom:1px solid #cbd5e1">Code</th><th align="left" style="padding:6px;border-bottom:1px solid #cbd5e1">Description</th><th align="left" style="padding:6px;border-bottom:1px solid #cbd5e1">Tooth</th><th align="right" style="padding:6px;border-bottom:1px solid #cbd5e1">Fee</th></tr></thead>
          <tbody>
            ${todays.map(e => `<tr><td style="padding:6px;border-bottom:1px solid #f1f5f9;font-family:monospace">${escapeHtml(e.code || '')}</td><td style="padding:6px;border-bottom:1px solid #f1f5f9">${escapeHtml(e.desc || '')}</td><td style="padding:6px;border-bottom:1px solid #f1f5f9;font-family:monospace">${e.tooth || '—'}${e.surface ? ' ' + escapeHtml(e.surface) : ''}</td><td style="padding:6px;border-bottom:1px solid #f1f5f9;text-align:right;font-family:monospace">${fmt.money(e.fee)}</td></tr>`).join('')}
          </tbody>
        </table>`}
        <table style="width:100%;font-size:13px;margin-top:12px;border-top:1px solid #cbd5e1;padding-top:8px">
          <tr><td>Today's charges</td><td align="right" style="font-family:monospace">${fmt.money(charges)}</td></tr>
          <tr><td>Today's payments</td><td align="right" style="font-family:monospace">−${fmt.money(payments)}</td></tr>
          <tr style="font-weight:600;border-top:2px solid #0f172a"><td style="padding-top:6px">Balance forward</td><td align="right" style="font-family:monospace;padding-top:6px">${fmt.money(balance)}</td></tr>
        </table>
        <div style="margin-top:32px;font-size:11px;color:#64748b">
          <p>Patient signature: ____________________________________   Date: __________</p>
          <p style="margin-top:24px">This statement reflects services rendered on ${today}. Insurance estimate is for informational purposes only.</p>
        </div>
      </div>
    `;
    try {
      await exportPDF(html, `walkout-${p.id}-${today}.pdf`);
      toast('Walkout PDF downloaded', { tone: 'success' });
    } catch (e) {
      toast('PDF export failed: ' + e.message, { tone: 'error' });
    }
  }

  // ── Keyboard shortcuts ──────────────────────────────────────────
  function bindKeys() {
    document.addEventListener('keydown', (ev) => {
      const tag = (ev.target?.tagName || '').toLowerCase();
      const inField = tag === 'input' || tag === 'textarea' || tag === 'select';
      // Cmd-K is universal
      if ((ev.metaKey || ev.ctrlKey) && (ev.key === 'k' || ev.key === 'K')) {
        ev.preventDefault(); openPalette(); return;
      }
      if (ev.key === 'Escape') {
        if (state.ui.paletteOpen) { closePalette(); return; }
        if (state.ui.modal) { closeModal(); return; }
      }
      if (inField) return;
      switch (ev.key.toLowerCase()) {
        case 'n': openModal('new-patient'); break;
        case 'f': document.getElementById('patient-search')?.focus(); ev.preventDefault(); break;
        case 't': setModule('chart'); break;
        case 'l': setModule('ledger'); break;
        case 's': setModule('schedule'); break;
        case 'p': openModal('post-procedure'); break;
        case '?': openModal('help'); break;
        case '1': setModule('overview'); break;
        case '3': setModule('perio'); break;
        case '4': setModule('tx'); break;
        case '7': setModule('recall'); break;
        case '8': setModule('docs'); break;
      }
    });
  }

  // ── Boot ────────────────────────────────────────────────────────
  async function boot() {
    try {
      state.user = await window.PDA.requireAuth?.('/login.html').then(() => window.PDA.getProfile()).catch(() => null);
    } catch (e) { state.user = null; }
    await loadState();
    bindKeys();
    // Track viewport width — keeps isMobile + sidebar default in sync
    const mq = window.matchMedia('(max-width: 768px)');
    const onMQ = () => {
      state.ui.isMobile = mq.matches;
      if (!mq.matches) state.ui.sidebarOpen = true; // desktop = always show
      rerender();
    };
    if (mq.addEventListener) mq.addEventListener('change', onMQ);
    render();
    if ((window.PDA?.sb && state.user) || true) {
      // Show the welcome toast once per session
      if (!sessionStorage.getItem('pp.greeted')) {
        toast(`Welcome, ${state.user?.first_name || 'student'}. ${state.patients.length} patients loaded.`, { tone: 'info', ms: 3000 });
        sessionStorage.setItem('pp.greeted', '1');
      }
    }
  }

  document.addEventListener('DOMContentLoaded', boot);
})();
</script>

  // ── Chart module: odontogram with surface marking ──────────────
  const MARKERS = [
    { id: '',          label: 'Erase',      color: '#ffffff', text: 'Clear' },
    { id: 'caries',    label: 'Caries',     color: '#ef4444' },
    { id: 'composite', label: 'Composite',  color: '#0d9488' },
    { id: 'amalgam',   label: 'Amalgam',    color: '#475569' },
    { id: 'sealant',   label: 'Sealant',    color: '#a3e635' },
    { id: 'crown',     label: 'Crown',      color: '#fbbf24', whole: true },
    { id: 'rct',       label: 'RCT',        color: '#9333ea', whole: true },
    { id: 'missing',   label: 'Missing',    color: '#1e293b', whole: true },
    { id: 'implant',   label: 'Implant',    color: '#0ea5e9', whole: true },
    { id: 'watch',     label: 'Watch',      color: '#f97316' },
    { id: 'fracture',  label: 'Fracture',   color: '#be185d' },
  ];

  // Tooth class by universal number (1-32)
  function toothClass(n) {
    if ([1,2,3, 14,15,16, 17,18,19, 30,31,32].includes(n)) return 'molar';
    if ([4,5, 12,13, 20,21, 28,29].includes(n)) return 'premolar';
    if ([6, 11, 22, 27].includes(n)) return 'canine';
    if ([8, 9, 24, 25].includes(n)) return 'central';
    return 'lateral'; // 7, 10, 23, 26
  }
  function isAnterior(n) { return (n >= 6 && n <= 11) || (n >= 22 && n <= 27); }

  // Anatomically-shaped tooth SVG paths.
  // viewBox is 0 0 40 76 — root (top), gingival line, crown body, occlusal/incisal edge.
  // Crown SVG path is the only thing that gets surface-marked; the root stays neutral.
  // For maxillary teeth (1-16) we draw root-up, crown-down (the way you see them in patient's mouth).
  // For mandibular teeth (17-32) we flip so crown faces up.
  // Anatomically-detailed tooth SVGs.
  // viewBox is 0 0 56 110 — root at top (y 4–48), gingival line at y=50, crown at y=50–106.
  // Crown SVG path is the only thing that gets surface-marked; root + gingiva are decorative.
  // Maxillary teeth (1-16) draw root-up / crown-down (the anatomical convention).
  // Mandibular teeth (17-32) get vertically flipped at render time.
  function toothShapes(cls, num) {
    // Posterior maxillary molars have 3 roots (2 buccal + 1 palatal); mandibular have 2.
    // We render a simplified 2-root view for both since the chart is a buccal-view diagram.
    if (cls === 'molar') {
      return {
        // Two distinct roots branching from the cervical line
        roots: [
          'M 18 48 Q 14 28 12 8 Q 12 4 14 4 Q 17 4 18 8 Q 22 28 22 48 Z',  // mesial root
          'M 34 48 Q 38 28 40 8 Q 40 4 42 4 Q 39 4 38 8 Q 34 28 34 48 Z', // distal root
          'M 22 48 Q 24 32 26 24 Q 28 32 30 48 Z',                           // central (palatal hint)
        ],
        crown: [
          // Crown body — wider than root, narrows slightly toward occlusal edge,
          // with 4 rounded cusp bumps along the chewing surface
          'M 8 50',
          'Q 6 50 6 54',                         // cervical bulge mesial
          'L 6 90',
          'Q 6 102 12 104',                       // mesial corner
          'Q 14 108 17 105',                      // MB cusp
          'Q 20 109 23 105',                      // ML cusp
          'Q 26 110 28 106',                      // central groove dip
          'Q 31 110 34 106',                      // DL cusp
          'Q 37 110 40 105',                      // DB cusp
          'Q 44 102 44 90',                       // distal corner
          'L 44 54',
          'Q 44 50 42 50',                        // cervical bulge distal
          'Z'
        ].join(' '),
        zones: {
          M: 'M 6 52 L 6 105 L 14 108 L 14 52 Z',
          D: 'M 36 52 L 36 108 L 44 105 L 44 52 Z',
          B: 'M 6 50 L 44 50 L 44 70 L 6 70 Z',
          L: 'M 6 92 L 44 92 L 44 108 L 6 108 Z',
          O: 'M 14 70 L 36 70 L 36 92 L 14 92 Z',
        },
        cusps: [
          { x: 17, y: 105 }, { x: 23, y: 104 }, { x: 28, y: 106 }, { x: 34, y: 104 }, { x: 40, y: 104 }
        ],
        groove: 'M 14 82 L 40 82',
      };
    }
    if (cls === 'premolar') {
      return {
        roots: [
          // single root with hint of bifurcation at apex
          'M 18 48 Q 14 30 18 8 Q 22 4 25 4 Q 28 4 32 8 Q 36 30 32 48 L 28 48 Q 30 30 28 16 Q 26 30 26 48 Q 26 30 22 16 Q 20 30 22 48 Z',
        ],
        crown: [
          'M 10 50',
          'Q 8 50 8 54',
          'L 8 88',
          'Q 8 100 14 104',
          'Q 17 109 22 105',                      // buccal cusp (taller)
          'Q 25 110 28 106',                      // central groove
          'Q 32 109 36 105',                      // lingual cusp
          'Q 42 100 42 88',
          'L 42 54',
          'Q 42 50 40 50',
          'Z'
        ].join(' '),
        zones: {
          M: 'M 8 52 L 8 105 L 16 107 L 16 52 Z',
          D: 'M 34 52 L 34 107 L 42 105 L 42 52 Z',
          B: 'M 8 50 L 42 50 L 42 72 L 8 72 Z',
          L: 'M 8 92 L 42 92 L 42 108 L 8 108 Z',
          O: 'M 16 72 L 34 72 L 34 92 L 16 92 Z',
        },
        cusps: [{ x: 22, y: 105 }, { x: 36, y: 105 }],
        groove: 'M 18 88 L 36 88',
      };
    }
    if (cls === 'canine') {
      return {
        roots: [
          // Single very long root — the longest in the human mouth
          'M 22 48 Q 20 24 24 4 Q 25 2 26 2 Q 28 2 29 4 Q 32 24 30 48 Z',
        ],
        crown: [
          'M 10 50',
          'Q 8 50 8 54',
          'L 8 80',                                // narrows toward incisal third
          'Q 8 92 11 100',
          'Q 14 106 18 104',                       // mesial slope of cusp
          'Q 22 110 26 110',                       // POINTED CUSP TIP
          'Q 30 110 34 104',                       // distal slope of cusp
          'Q 38 106 41 100',
          'Q 44 92 44 80',
          'L 44 54',
          'Q 44 50 42 50',
          'Z'
        ].join(' '),
        zones: {
          M: 'M 8 52 L 8 100 L 18 106 L 18 52 Z',
          D: 'M 34 52 L 34 106 L 44 100 L 44 52 Z',
          B: 'M 8 50 L 44 50 L 44 75 L 8 75 Z',
          L: 'M 8 95 L 44 95 L 44 110 L 8 110 Z',
          I: 'M 18 75 L 34 75 L 34 95 L 18 95 Z',
        },
        cusps: [{ x: 26, y: 110, peak: true }],
        cingulum: 'M 22 90 Q 26 95 30 90',
      };
    }
    if (cls === 'central') {
      return {
        roots: [
          'M 22 48 Q 20 26 24 6 Q 26 4 26 4 Q 28 4 30 6 Q 32 26 30 48 Z',
        ],
        crown: [
          'M 10 50',
          'Q 8 50 8 54',
          'L 8 88',
          'Q 8 100 12 104',
          'L 14 106',                              // mesioincisal angle (sharper than canine)
          'Q 18 108 22 107',                       // mamelon dip
          'Q 26 109 30 107',                       // mamelon dip
          'L 38 106',                              // distoincisal angle
          'Q 44 100 44 88',
          'L 44 54',
          'Q 44 50 42 50',
          'Z'
        ].join(' '),
        zones: {
          M: 'M 8 52 L 8 105 L 16 107 L 16 52 Z',
          D: 'M 34 52 L 34 107 L 44 105 L 44 52 Z',
          B: 'M 8 50 L 44 50 L 44 75 L 8 75 Z',
          L: 'M 8 92 L 44 92 L 44 108 L 8 108 Z',
          I: 'M 16 75 L 34 75 L 34 92 L 16 92 Z',
        },
        mamelons: [{ x: 18, y: 105 }, { x: 26, y: 106 }, { x: 34, y: 105 }],
        cingulum: 'M 22 90 Q 26 95 30 90',
      };
    }
    // lateral incisor — narrower
    return {
      roots: [
        'M 22 48 Q 21 26 24 6 Q 26 4 26 4 Q 28 4 30 6 Q 31 26 30 48 Z',
      ],
      crown: [
        'M 13 50',
        'Q 11 50 11 54',
        'L 11 88',
        'Q 11 100 14 104',
        'L 17 106',
        'Q 20 108 24 107',
        'Q 28 109 32 107',
        'L 35 106',
        'Q 41 100 41 88',
        'L 41 54',
        'Q 41 50 39 50',
        'Z'
      ].join(' '),
      zones: {
        M: 'M 11 52 L 11 105 L 17 107 L 17 52 Z',
        D: 'M 35 52 L 35 107 L 41 105 L 41 52 Z',
        B: 'M 11 50 L 41 50 L 41 75 L 11 75 Z',
        L: 'M 11 92 L 41 92 L 41 108 L 11 108 Z',
        I: 'M 17 75 L 35 75 L 35 92 L 17 92 Z',
      },
      mamelons: [{ x: 20, y: 105 }, { x: 26, y: 106 }, { x: 32, y: 105 }],
      cingulum: 'M 23 90 Q 26 94 29 90',
    };
  }

  function toothLabel(num) {
    // Quadrant + tooth name for chart hover
    const isUpper = num <= 16;
    const isRight = (num <= 8) || (num >= 25 && num <= 32);
    const cls = toothClass(num);
    const idx = ({ 1:'3M', 2:'2M', 3:'1M', 4:'2PM', 5:'1PM', 6:'C', 7:'LI', 8:'CI',
                   9:'CI', 10:'LI', 11:'C', 12:'1PM', 13:'2PM', 14:'1M', 15:'2M', 16:'3M',
                   17:'3M', 18:'2M', 19:'1M', 20:'2PM', 21:'1PM', 22:'C', 23:'LI', 24:'CI',
                   25:'CI', 26:'LI', 27:'C', 28:'1PM', 29:'2PM', 30:'1M', 31:'2M', 32:'3M' })[num] || '';
    const names = { '3M':'3rd molar','2M':'2nd molar','1M':'1st molar','2PM':'2nd premolar','1PM':'1st premolar','C':'canine','LI':'lateral incisor','CI':'central incisor' };
    return `${isUpper?'Maxillary':'Mandibular'} ${isRight?'right':'left'} ${names[idx] || cls}`;
  }

  function renderTooth(num, marks, isUpper) {
    const cls = toothClass(num);
    const shape = toothShapes(cls, num);
    const m = marks || {};
    const WHOLE_VALS = ['crown', 'rct', 'missing', 'implant'];
    const wholeVal = m.whole || Object.values(m).find(v => WHOLE_VALS.includes(v));
    const wholeColor = wholeVal ? (MARKERS.find(x => x.id === wholeVal)?.color || '#ffffff') : null;
    const isMissing = wholeVal === 'missing';

    const surfaceColor = (key) => {
      const v = m[key]; if (!v || WHOLE_VALS.includes(v)) return null;
      return (MARKERS.find(x => x.id === v) || {}).color || null;
    };

    // Mandibular: flip vertically so crown faces up. ViewBox is now 56x110.
    const flip = !isUpper;
    const transform = flip ? 'scale(1,-1) translate(0,-110)' : '';

    const gradId = `tg-${num}`;
    const rootGrad = `tr-${num}`;

    const surfaceFills = Object.entries(shape.zones).map(([k, d]) => {
      const fill = surfaceColor(k); if (!fill) return '';
      return `<path d="${d}" fill="${fill}" stroke="none" pointer-events="none" opacity="0.78"/>`;
    }).join('');

    const cuspDots = (shape.cusps || []).map(c => `
      <circle cx="${c.x}" cy="${c.y - 2}" r="${c.peak ? 1.2 : 1.0}" fill="#ffffff" stroke="#94a3b8" stroke-width="0.4" pointer-events="none"/>
    `).join('');

    const mamelons = (shape.mamelons || []).map(c => `
      <circle cx="${c.x}" cy="${c.y}" r="0.8" fill="#cbd5e1" pointer-events="none"/>
    `).join('');

    const groove = shape.groove
      ? `<path d="${shape.groove}" stroke="#94a3b8" stroke-width="0.5" fill="none" pointer-events="none" stroke-dasharray="0.8 0.8"/>`
      : '';

    const cingulum = shape.cingulum
      ? `<path d="${shape.cingulum}" stroke="#cbd5e1" stroke-width="0.6" fill="none" pointer-events="none"/>`
      : '';

    const rootPaths = shape.roots.map(r => `<path d="${r}" fill="url(#${rootGrad})" stroke="#94a3b8" stroke-width="0.5" pointer-events="none"/>`).join('');

    return `
      <div class="tooth flex flex-col items-center" data-tooth="${num}" title="#${num} — ${escapeHtml(toothLabel(num))}">
        <svg viewBox="0 0 56 110" width="100%" style="max-width:50px;height:auto;display:block" oncontextmenu="return false">
          <defs>
            <linearGradient id="${gradId}" x1="0" y1="50" x2="0" y2="110" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#ffffff"/>
              <stop offset="1" stop-color="#f1f5f9"/>
            </linearGradient>
            <linearGradient id="${rootGrad}" x1="0" y1="4" x2="0" y2="50" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#fef3c7"/>
              <stop offset="1" stop-color="#fde68a"/>
            </linearGradient>
          </defs>
          <g transform="${transform}">
            ${ isMissing ? `
              <path d="${shape.crown}" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="2 2" pointer-events="none"/>
              <line x1="14" y1="56" x2="42" y2="100" stroke="#94a3b8" stroke-width="2"/>
              <line x1="42" y1="56" x2="14" y2="100" stroke="#94a3b8" stroke-width="2"/>
            ` : `
              <!-- Roots (anatomically correct count per class) -->
              ${rootPaths}
              <!-- Gingival margin -->
              <path d="M 4 50 Q 28 47 52 50" stroke="#fbcfe8" stroke-width="1.2" fill="none" pointer-events="none" opacity="0.7"/>
              <!-- Crown body -->
              <path d="${shape.crown}" fill="${wholeColor || `url(#${gradId})`}" stroke="${wholeVal === 'rct' ? '#0f172a' : '#475569'}" stroke-width="1" stroke-linejoin="round"/>
              ${ wholeColor ? '' : surfaceFills }
              ${ wholeColor ? '' : groove }
              ${ wholeColor ? '' : cingulum }
              ${ wholeColor ? '' : cuspDots }
              ${ wholeColor ? '' : mamelons }
              ${ wholeColor ? '' : Object.entries(shape.zones).map(([k, d]) => `
                <path d="${d}" fill="transparent" data-surface="${k}" class="surface-hit cursor-pointer" />
              `).join('') }
              ${ wholeVal === 'rct' ? '<path d="M 26 8 L 26 48" stroke="#9333ea" stroke-width="2.5" pointer-events="none" stroke-linecap="round"/>' : '' }
              ${ wholeVal === 'implant' ? '<rect x="24" y="6" width="6" height="42" rx="1" fill="#0ea5e9" pointer-events="none"/><rect x="22" y="48" width="10" height="3" fill="#0ea5e9" pointer-events="none"/>' : '' }
            ` }
          </g>
        </svg>
      </div>
    `;
  }

  function renderChart(p) {
    const chart = p.chart || {};
    const counts = { caries: 0, composite: 0, amalgam: 0, missing: 0, crown: 0, planned: 0 };
    Object.values(chart).forEach(t => {
      Object.values(t || {}).forEach(v => { if (counts[v] != null) counts[v]++; });
    });
    const planned = (p.treatmentPlan || []).filter(l => l.tooth).length;
    counts.planned = planned;
    const activeMarker = state.ui.chartMarker || 'caries';
    const ctx = state.ui.toothContext;

    return `
      <div class="space-y-3">
        <!-- Toolbar -->
        <div class="bg-white rounded border border-slate-200 p-3">
          <div class="flex flex-wrap items-center gap-2">
            <span class="text-[11px] uppercase tracking-wide text-slate-500 font-semibold mr-2">Marker</span>

              <button data-action="set-marker" data-marker="${m.id}"

          </div>
          <div class="text-[11px] text-slate-500 mt-2">
            Click a surface to apply the active marker. <span class="hidden md:inline">Right-click a tooth for more actions.</span>
            Whole-tooth markers (Crown, RCT, Missing, Implant) apply to the entire tooth.
          </div>
        </div>

        <!-- Stats strip -->
        <div class="grid grid-cols-2 sm:grid-cols-6 gap-2">
          ${[
            { k: 'caries',    l: 'Active caries',  cls: 'text-rose-700' },
            { k: 'composite', l: 'Composites',     cls: 'text-teal-700' },
            { k: 'amalgam',   l: 'Amalgams',       cls: 'text-slate-700' },
            { k: 'crown',     l: 'Crowns',         cls: 'text-amber-700' },
            { k: 'missing',   l: 'Missing',        cls: 'text-slate-900' },
            { k: 'planned',   l: 'Tx-planned',     cls: 'text-sky-700' },
          ].map(s => `
            <div class="bg-white rounded border border-slate-200 p-2">
              <div class="text-[10px] uppercase tracking-wide text-slate-500">${s.l}</div>
              <div class="text-lg mono font-semibold ${s.cls}">${counts[s.k] || 0}</div>
            </div>`).join('')}
        </div>

        <!-- Odontogram (anatomical view) -->
        <div class="bg-white rounded border border-slate-200 p-4 overflow-x-auto">
          <div class="min-w-[880px]">
            <div class="text-[10px] uppercase tracking-widest text-slate-400 font-semibold text-center mb-1">Maxillary (upper) — patient's right ⟵ ⟶ patient's left</div>
            ${renderArch(chart, true,  PERM_TEETH.slice(0, 16))}
            <div class="my-3 border-t-2 border-dashed border-slate-200 relative">
              <span class="absolute -top-2 left-1/2 -translate-x-1/2 bg-white px-2 text-[10px] uppercase tracking-wider text-slate-400 font-semibold">midline</span>
            </div>
            ${renderArch(chart, false, PERM_TEETH.slice(16).reverse())}
            <div class="text-[10px] uppercase tracking-widest text-slate-400 font-semibold text-center mt-1">Mandibular (lower)</div>
          </div>
        </div>

        <!-- Existing chart legend / chart history -->
        <div class="grid lg:grid-cols-2 gap-3">
          <div class="bg-white rounded border border-slate-200 p-3">
            <div class="text-[12px] font-semibold mb-2">Existing restorations + findings</div>
            ${renderChartFindings(chart, false)}
          </div>
          <div class="bg-white rounded border border-slate-200 p-3">
            <div class="text-[12px] font-semibold mb-2">Treatment-planned</div>
            ${(p.treatmentPlan || []).filter(l => l.tooth).length === 0 ? '<div class="text-[12px] text-slate-500">No tooth-specific treatment planned.</div>' :
            `<ul class="text-[12px] space-y-1">${(p.treatmentPlan || []).filter(l => l.tooth).map(l => `
              <li class="flex justify-between border-b border-slate-100 pb-1">
                <span><span class="mono font-semibold">#${escapeHtml(l.tooth)}${l.surface ? ' ' + escapeHtml(l.surface) : ''}</span> · ${escapeHtml(l.code)} ${escapeHtml(l.desc)}</span>
                <span class="mono">${fmt.money(l.fee)}</span>
              </li>`).join('')}</ul>`}
          </div>
        </div>

        ${ctx ? renderToothMenu(ctx) : ''}
      </div>
    `;
  }

  function renderArch(chart, isUpper, teethRange) {
    return `
      <div class="grid grid-cols-16 gap-1" style="grid-template-columns: repeat(16, minmax(0, 1fr));">
        ${teethRange.map(n => renderTooth(n, chart[`T-${n}`] || {}, isUpper)).join('')}
      </div>
      <div class="grid grid-cols-16 gap-1 mt-0.5" style="grid-template-columns: repeat(16, minmax(0, 1fr));">
        ${teethRange.map(n => `<div class="text-center text-[10px] mono text-slate-500">${n}</div>`).join('')}
      </div>
    `;
  }

  function renderChartFindings(chart, includeWhole) {
    const rows = [];
    Object.keys(chart).sort((a, b) => parseInt(a.split('-')[1]) - parseInt(b.split('-')[1])).forEach(k => {
      const num = k.split('-')[1];
      const m = chart[k];
      Object.entries(m).forEach(([surf, val]) => {
        if (!val) return;
        rows.push({ tooth: num, surf, val });
      });
    });
    if (rows.length === 0) return '<div class="text-[12px] text-slate-500">No existing chart markings.</div>';
    return `<ul class="text-[12px] space-y-1 max-h-56 overflow-auto">${rows.map(r => {
      const m = MARKERS.find(x => x.id === r.val);
      return `<li class="flex items-center gap-2 border-b border-slate-100 pb-1">
        <span class="inline-block w-3 h-3 rounded-sm" style="background:${m?.color || '#cbd5e1'}"></span>
        <span class="mono">#${r.tooth} ${r.surf === 'whole' ? '' : r.surf}</span>
        <span class="capitalize">${escapeHtml(m?.label || r.val)}</span>
      </li>`;
    }).join('')}</ul>`;
  }

  function renderToothMenu(ctx) {
    return `
      <div class="fixed inset-0 z-30" data-action="close-tooth-menu" style="background:transparent">
        <div class="absolute bg-white border border-slate-200 rounded shadow-lg py-1 text-[12px]"
             style="left:${ctx.x}px;top:${ctx.y}px;min-width:180px"
             onclick="event.stopPropagation()">
          <div class="px-3 py-1.5 text-[11px] font-semibold uppercase tracking-wide text-slate-500 border-b border-slate-100">Tooth #${ctx.tooth}</div>
          <button class="w-full text-left px-3 py-1.5 hover:bg-slate-50" data-action="tooth-plan" data-tooth="${ctx.tooth}">＋ Plan procedure</button>
          <button class="w-full text-left px-3 py-1.5 hover:bg-slate-50" data-action="tooth-mark-missing" data-tooth="${ctx.tooth}">Mark missing</button>
          <button class="w-full text-left px-3 py-1.5 hover:bg-slate-50" data-action="tooth-mark-watch" data-tooth="${ctx.tooth}">Mark watch (occlusal)</button>
          <button class="w-full text-left px-3 py-1.5 hover:bg-slate-50" data-action="tooth-clear" data-tooth="${ctx.tooth}">Clear all markings</button>
        </div>
      </div>
    `;
  }
  // ── Perio module: real 6-point exam with AAP 2017 staging ──────
  // Site order: [MB, B, DB, ML, L, DL]
  const PERIO_SITES = ['MB', 'B', 'DB', 'ML', 'L', 'DL'];
  const FURCATION_TEETH = new Set([1, 2, 3, 14, 15, 16, 17, 18, 19, 30, 31, 32, 4, 13]); // molars + max first PMs
  const SKIP_TEETH = new Set([1, 16, 17, 32]); // 3rd molars often missing/extracted; skip in default exam

  function ensurePerio(p) {
    p.perioExams = p.perioExams || [];
    if (p.perioExams.length === 0) {
      p.perioExams.push(makeBlankExam('2026-05-04', p.provider || 'Hyg. Smith'));
    }
    if (state.ui.perioExamId == null) state.ui.perioExamId = p.perioExams.length - 1;
    return p.perioExams[state.ui.perioExamId];
  }

  function makeBlankExam(date, examiner) {
    const teeth = {};
    for (let n = 1; n <= 32; n++) {
      teeth[n] = { pd: [3,3,3,3,3,3], rec: [0,0,0,0,0,0], bop: [0,0,0,0,0,0], mob: 0, furc: 0, plaque: 0 };
    }
    return { id: `pe-${date}-${Math.random().toString(36).slice(2, 6)}`, date, examiner, teeth };
  }

  function depthClass(pd) {
    if (!pd) return 'bg-slate-100 text-slate-400';
    if (pd <= 3) return 'bg-emerald-100 text-emerald-800';
    if (pd <= 5) return 'bg-amber-200 text-amber-900';
    return 'bg-rose-300 text-rose-900';
  }

  function calcPerioStats(exam, p) {
    let pds = [], cals = [], bops = 0, sites = 0, plaques = 0, teeth = 0;
    let maxPD = 0, maxCAL = 0, sitesGE4 = 0, sitesGE5 = 0;
    Object.entries(exam.teeth).forEach(([num, t]) => {
      const n = +num;
      // Skip teeth marked "missing" in chart so stats reflect remaining dentition
      if (p.chart?.[`T-${num}`]?.whole === 'missing') return;
      teeth++;
      if (t.plaque) plaques++;
      for (let i = 0; i < 6; i++) {
        const pd = +t.pd?.[i] || 0;
        const rec = +t.rec?.[i] || 0;
        if (pd > 0) sites++;
        pds.push(pd);
        cals.push(pd + rec);
        if (pd > maxPD) maxPD = pd;
        if (pd + rec > maxCAL) maxCAL = pd + rec;
        if (pd >= 4) sitesGE4++;
        if (pd >= 5) sitesGE5++;
        if (t.bop?.[i]) bops++;
      }
    });
    const avg = (a) => a.length ? (a.reduce((s, v) => s + v, 0) / a.length) : 0;
    return {
      teethExamined: teeth,
      sites,
      meanPD: avg(pds),
      maxPD,
      bopCount: bops,
      bopPct: sites ? Math.round(bops / sites * 100) : 0,
      plaquePct: teeth ? Math.round(plaques / teeth * 100) : 0,
      meanCAL: avg(cals),
      maxCAL,
      sitesGE4, sitesGE5,
      extentPct: sites ? Math.round(sitesGE4 / sites * 100) : 0,
    };
  }

  function aapStageGrade(s, p) {
    // AAP 2017 staging
    let stage = 'I';
    if (s.maxCAL >= 5 || s.maxPD >= 6) stage = 'III';
    else if (s.maxCAL >= 3 || s.maxPD >= 5) stage = 'II';
    // Stage IV upgrade if Stage III + complexity (high tooth loss, mobility, etc.)
    if (stage === 'III') {
      const missingCount = Object.values(p.chart || {}).filter(t => t.whole === 'missing' || Object.values(t).includes('missing')).length;
      if (missingCount >= 5) stage = 'IV';
    }
    // Extent
    const extent = s.extentPct >= 30 ? 'Generalized' : 'Localized';
    // Grade — indirect estimation
    let grade = 'B';
    const meds = (p.medical?.meds || []).join(' ').toLowerCase();
    const conds = (p.medical?.conditions || []).join(' ').toLowerCase();
    const isSmoker = /smok|tobacco|nicotine|vape/i.test(meds + ' ' + conds + ' ' + (p.medical?.notes || ''));
    const hasDM = /diabet|t2dm|t1dm|a1c\s*[8-9]|a1c\s*[1-9][0-9]/i.test(meds + ' ' + conds + ' ' + (p.medical?.notes || ''));
    if (isSmoker || hasDM) grade = 'C';
    if (s.bopPct < 10 && s.maxPD <= 4) grade = 'A';
    return { stage, grade, extent, isSmoker, hasDM };
  }

  function renderPerio(p) {
    const exam = ensurePerio(p);
    const stats = calcPerioStats(exam, p);
    const sg = aapStageGrade(stats, p);
    const examIdx = state.ui.perioExamId;
    const arch = state.ui.perioArch || 'both';
    return `
      <div class="space-y-4">
        <!-- Header strip -->
        <div class="bg-white rounded border border-slate-200 p-3 flex flex-wrap items-center gap-3">
          <div class="flex items-center gap-2">
            <div>
              <label class="block text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Exam date</label>
              <input data-action="perio-date" type="date" value="${exam.date}" class="text-[12px] mono px-2 py-1 border border-slate-300 rounded" />
            </div>
            <div>
              <label class="block text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Examiner</label>
              <input data-action="perio-examiner" value="${escapeHtml(exam.examiner || '')}" class="text-[12px] px-2 py-1 border border-slate-300 rounded w-40" />
            </div>
            ${p.perioExams.length > 1 ? `
              <div>
                <label class="block text-[10px] uppercase tracking-wider text-slate-500 font-semibold">Switch exam</label>
                <select data-action="perio-switch" class="text-[12px] px-2 py-1 border border-slate-300 rounded">
                  ${p.perioExams.map((e, i) => `<option value="${i}" ${i === examIdx ? 'selected' : ''}>${e.date} — ${escapeHtml(e.examiner || '')}</option>`).join('')}
                </select>
              </div>` : ''}
          </div>
          <span class="flex-1"></span>
          <div class="flex gap-1.5">
            <button class="btn btn-soft" data-action="perio-arch" data-a="max" title="Maxillary only">Max</button>
            <button class="btn btn-soft" data-action="perio-arch" data-a="mand" title="Mandibular only">Mand</button>
            <button class="btn btn-soft ${arch === 'both' ? '!bg-slate-900 !text-white' : ''}" data-action="perio-arch" data-a="both" title="Both arches">Both</button>
            <span class="w-1"></span>
            <button class="btn btn-soft" data-action="perio-fill-healthy" title="Set all sites to 3mm, no BOP">Fill healthy</button>
            <button class="btn btn-primary" data-action="perio-new-exam">＋ New exam</button>
          </div>
        </div>

        <!-- Stats strip -->
        <div class="grid grid-cols-2 sm:grid-cols-7 gap-2">
          ${perioStatTile('Mean PD', stats.meanPD.toFixed(1) + 'mm', 'avg pocket depth')}
          ${perioStatTile('Max PD', stats.maxPD + 'mm', 'deepest site', stats.maxPD >= 6 ? 'rose' : stats.maxPD >= 5 ? 'amber' : 'emerald')}
          ${perioStatTile('BOP', stats.bopPct + '%', stats.bopCount + ' bleeding sites', stats.bopPct >= 30 ? 'rose' : stats.bopPct >= 10 ? 'amber' : 'emerald')}
          ${perioStatTile('Plaque', stats.plaquePct + '%', 'teeth with plaque', stats.plaquePct >= 30 ? 'rose' : stats.plaquePct >= 15 ? 'amber' : 'emerald')}
          ${perioStatTile('Mean CAL', stats.meanCAL.toFixed(1) + 'mm', 'attachment loss')}
          ${perioStatTile('Stage', sg.stage, sg.extent + ', max CAL ' + stats.maxCAL + 'mm', sg.stage === 'IV' ? 'rose' : sg.stage === 'III' ? 'rose' : sg.stage === 'II' ? 'amber' : 'emerald')}
          ${perioStatTile('Grade', sg.grade, sg.grade === 'C' ? 'rapid risk' : sg.grade === 'A' ? 'slow' : 'moderate', sg.grade === 'C' ? 'rose' : sg.grade === 'A' ? 'emerald' : 'amber')}
        </div>

        <!-- Interpretation -->
        <div class="bg-white rounded border border-slate-200 p-3 text-[12px]">
          <div class="font-semibold mb-1">Clinical interpretation</div>
          ${perioInterpretation(stats, sg, p)}
        </div>

        <!-- Chart legend -->
        <div class="bg-white rounded border border-slate-200 p-3 flex flex-wrap items-center gap-3 text-[11px]">
          <span class="text-slate-500 font-semibold uppercase tracking-wide">Legend:</span>
          <span class="flex items-center gap-1"><span class="w-4 h-4 rounded bg-emerald-100 border border-emerald-200"></span> 1–3mm healthy</span>
          <span class="flex items-center gap-1"><span class="w-4 h-4 rounded bg-amber-200"></span> 4–5mm warning</span>
          <span class="flex items-center gap-1"><span class="w-4 h-4 rounded bg-rose-300"></span> 6+ mm severe</span>
          <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-rose-600"></span> BOP</span>
          <span class="text-slate-400">Click a depth → edit. Tab moves to next site.</span>
        </div>

        <!-- The chart -->
        <div class="bg-white rounded border border-slate-200 p-3 overflow-x-auto">
          <div class="min-w-[920px]">
            ${(arch === 'both' || arch === 'max') ? renderPerioArch(exam, p, 'max', PERM_TEETH.slice(0, 16)) : ''}
            ${(arch === 'both') ? '<div class="h-3"></div>' : ''}
            ${(arch === 'both' || arch === 'mand') ? renderPerioArch(exam, p, 'mand', PERM_TEETH.slice(16).reverse()) : ''}
          </div>
        </div>

        <!-- Action footer -->
        <div class="bg-white rounded border border-slate-200 p-3 flex flex-wrap gap-2 items-center justify-between text-[12px]">
          <div class="text-slate-500">Recommended recall interval based on Stage ${sg.stage}, Grade ${sg.grade}: <strong class="text-slate-900">${recallForStage(sg.stage, sg.grade)} months</strong></div>
          <div class="flex gap-2">
            <button class="btn btn-soft" data-action="perio-print">⎙ Print exam</button>
            <button class="btn btn-soft" data-action="perio-save-recall" title="Update patient's recall interval">Apply recall interval</button>
          </div>
        </div>
      </div>
    `;
  }

  function perioStatTile(label, value, sub, tone) {
    const toneCls = tone === 'rose' ? 'text-rose-700' : tone === 'amber' ? 'text-amber-700' : tone === 'emerald' ? 'text-emerald-700' : 'text-slate-900';
    return `
      <div class="bg-white rounded border border-slate-200 p-2">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-semibold">${escapeHtml(label)}</div>
        <div class="text-xl mono font-semibold ${toneCls}">${escapeHtml(value)}</div>
        <div class="text-[10px] text-slate-500">${escapeHtml(sub)}</div>
      </div>
    `;
  }

  function perioInterpretation(stats, sg, p) {
    const lines = [];
    if (stats.maxPD >= 6) lines.push(`<span class="text-rose-700 font-semibold">Severe pocketing</span> — ${stats.sitesGE5} sites ≥ 5mm. Consider periodontal therapy (D4341 SRP) and re-evaluation in 4–6 weeks.`);
    else if (stats.maxPD >= 5) lines.push(`<span class="text-amber-700 font-semibold">Moderate pocketing</span> — ${stats.sitesGE4} sites ≥ 4mm. SRP indicated for affected quadrants.`);
    else lines.push(`<span class="text-emerald-700 font-semibold">No significant pocketing</span> — all sites ≤ 4mm. Maintain routine prophy.`);

    if (stats.bopPct >= 30) lines.push(`Bleeding on probing is <span class="text-rose-700 font-semibold">${stats.bopPct}%</span> — active gingival inflammation. Reinforce home care.`);
    else if (stats.bopPct >= 10) lines.push(`BOP at ${stats.bopPct}%. Localized inflammation — review interproximal hygiene.`);
    else if (stats.sites > 0) lines.push(`BOP only ${stats.bopPct}% — clinically stable.`);

    if (stats.plaquePct >= 30) lines.push(`Plaque present on ${stats.plaquePct}% of teeth. Strong link to gingivitis — patient education indicated.`);

    lines.push(`<span class="font-semibold">AAP 2017: Stage ${sg.stage}${sg.stage !== 'I' ? ', Grade ' + sg.grade : ''}, ${sg.extent.toLowerCase()}.</span>`);
    if (sg.isSmoker) lines.push(`Smoking documented — Grade upgraded to C (rapid risk). Smoking cessation counselling recommended.`);
    if (sg.hasDM) lines.push(`Diabetes documented — bidirectional risk with periodontitis. Coordinate with PCP on glycemic control.`);
    if (sg.stage === 'IV') lines.push(`<span class="text-rose-700 font-semibold">Stage IV</span> — multiple missing teeth + advanced disease. Comprehensive rehabilitation indicated; refer to periodontist.`);

    return `<ul class="list-disc pl-5 space-y-0.5 text-slate-700">${lines.map(l => `<li>${l}</li>`).join('')}</ul>`;
  }

  function recallForStage(stage, grade) {
    if (stage === 'I') return 6;
    if (stage === 'II') return 4;
    if (grade === 'C') return 3;
    return 3;
  }

  function renderPerioArch(exam, p, archId, teethRange) {
    return `
      <div>
        <div class="text-[11px] uppercase tracking-wider text-slate-500 font-semibold mb-1 ${archId === 'mand' ? 'mt-2' : ''}">${archId === 'max' ? 'Maxillary (buccal up · lingual down)' : 'Mandibular (lingual up · buccal down)'}</div>
        <div class="grid gap-px" style="grid-template-columns: repeat(16, minmax(0, 1fr));">
          ${teethRange.map(n => renderPerioTooth(exam, p, n, archId)).join('')}
        </div>
      </div>
    `;
  }

  function renderPerioTooth(exam, p, num, archId) {
    const t = exam.teeth[num] || { pd: [], rec: [], bop: [], mob: 0, furc: 0, plaque: 0 };
    const isMissing = p.chart?.[`T-${num}`]?.whole === 'missing'
      || Object.values(p.chart?.[`T-${num}`] || {}).includes('missing');
    if (isMissing) {
      return `<div class="border-l border-slate-200 px-0.5">
        <div class="text-center text-[10px] mono text-slate-400">${num}</div>
        <div class="h-24 flex items-center justify-center text-slate-300 text-[10px]">missing</div>
      </div>`;
    }
    // Site cell helper
    const cell = (i, kind) => {
      const v = +t[kind]?.[i] || 0;
      const cls = kind === 'pd' ? depthClass(v) : (v ? 'bg-rose-500' : 'bg-slate-100');
      const display = kind === 'pd' ? (v || '·') : (v ? '●' : '');
      return `<button class="${cls} text-[10px] mono w-full h-5 leading-none rounded-sm hover:ring-1 hover:ring-teal-500"
        data-action="perio-edit" data-tooth="${num}" data-i="${i}" data-kind="${kind}" tabindex="0" title="${kind.toUpperCase()} site ${PERIO_SITES[i]}: ${v}">${display}</button>`;
    };
    // For maxillary: buccal sites on top (0-2 = MB,B,DB), lingual on bottom (3-5 = ML,L,DL)
    // For mandibular: lingual on top, buccal on bottom (flipped)
    const top = archId === 'max' ? [0,1,2] : [3,4,5];
    const bot = archId === 'max' ? [3,4,5] : [0,1,2];
    const showFurc = FURCATION_TEETH.has(num);
    return `
      <div class="border-l border-slate-200 px-0.5">
        <div class="text-center text-[10px] mono ${SKIP_TEETH.has(num) ? 'text-slate-400' : 'text-slate-700 font-semibold'}">${num}</div>
        <!-- Top row: 3 PD + 3 BOP -->
        <div class="grid grid-cols-3 gap-px">${top.map(i => cell(i, 'pd')).join('')}</div>
        <div class="grid grid-cols-3 gap-px mt-px">${top.map(i => cell(i, 'bop')).join('')}</div>
        <!-- Tooth body indicator -->
        <div class="my-0.5 h-2 bg-slate-100 rounded-sm flex items-center justify-center text-[9px] mono">
          ${t.mob ? `<span class="text-rose-700" title="Mobility ${t.mob}">M${t.mob}</span>` : ''}
          ${showFurc && t.furc ? `<span class="text-amber-700 ml-1" title="Furcation ${t.furc}">F${t.furc}</span>` : ''}
          ${t.plaque ? `<span class="text-slate-700 ml-1" title="Plaque present">P</span>` : ''}
        </div>
        <!-- Bottom row: 3 BOP + 3 PD -->
        <div class="grid grid-cols-3 gap-px">${bot.map(i => cell(i, 'bop')).join('')}</div>
        <div class="grid grid-cols-3 gap-px mt-px">${bot.map(i => cell(i, 'pd')).join('')}</div>
        <!-- Mob/Furc quick toggles -->
        <div class="grid grid-cols-3 gap-px mt-1 text-[9px]">
          <button class="bg-slate-50 hover:bg-slate-200 rounded-sm py-0.5" data-action="perio-cycle" data-tooth="${num}" data-k="mob" title="Mobility 0–3">m${t.mob}</button>
          ${showFurc ? `<button class="bg-slate-50 hover:bg-slate-200 rounded-sm py-0.5" data-action="perio-cycle" data-tooth="${num}" data-k="furc" title="Furcation 0–3">f${t.furc}</button>` : '<span></span>'}
          <button class="bg-slate-50 hover:bg-slate-200 rounded-sm py-0.5" data-action="perio-cycle" data-tooth="${num}" data-k="plaque" title="Plaque toggle">${t.plaque ? '✓' : 'p'}</button>
        </div>
      </div>
    `;
  }
  // ── Schedule module: operatory grid with drag-drop appointments ─
  const PROVIDERS = [
    { id: 'will',  name: 'Dr. Williams', role: 'doctor',     color: '#0d9488' },
    { id: 'pat',   name: 'Dr. Patel',    role: 'doctor',     color: '#0891b2' },
    { id: 'smith', name: 'Hyg. Smith',   role: 'hygienist',  color: '#f59e0b' },
    { id: 'jord',  name: 'Hyg. Jordan',  role: 'hygienist',  color: '#a16207' },
    { id: 'asst1', name: 'RDA Garcia',   role: 'assistant',  color: '#7c3aed' },
  ];
  const OPERATORIES = [
    { id: 'op1', label: 'Op 1', kind: 'doctor' },
    { id: 'op2', label: 'Op 2', kind: 'doctor' },
    { id: 'op3', label: 'Op 3', kind: 'hygiene' },
    { id: 'op4', label: 'Op 4', kind: 'hygiene' },
  ];
  // Schedule data lives in a top-level state.schedule keyed by date YYYY-MM-DD
  // each is an array of { id, opId, time (HH:MM), duration (minutes), patientId, providerId, reason, status }

  function ensureSchedule() {
    state.schedule = state.schedule || {};
    return state.schedule;
  }

  function seedScheduleFor(dateKey) {
    const sched = ensureSchedule();
    if (sched[dateKey] && sched[dateKey].length) return;
    // Auto-build a believable day from patients with type=recall/maintenance
    const candidates = state.patients.slice(0, 12);
    const items = [];
    const blocks = [
      { time: '08:00', dur: 60, opId: 'op1', providerId: 'will',  reason: 'Crown seat #14' },
      { time: '08:00', dur: 60, opId: 'op3', providerId: 'smith', reason: 'Adult prophy + exam' },
      { time: '08:00', dur: 30, opId: 'op4', providerId: 'jord',  reason: 'Child prophy' },
      { time: '09:00', dur: 90, opId: 'op1', providerId: 'will',  reason: 'RCT #8' },
      { time: '09:00', dur: 60, opId: 'op2', providerId: 'pat',   reason: 'Composite #19 OD' },
      { time: '09:00', dur: 60, opId: 'op3', providerId: 'smith', reason: 'Perio maintenance' },
      { time: '09:30', dur: 30, opId: 'op4', providerId: 'jord',  reason: 'Sealants' },
      { time: '10:30', dur: 60, opId: 'op2', providerId: 'pat',   reason: 'Crown prep #14' },
      { time: '10:30', dur: 60, opId: 'op3', providerId: 'smith', reason: 'SRP UR/UL' },
      { time: '11:00', dur: 30, opId: 'op4', providerId: 'jord',  reason: 'Limited exam' },
      { time: '13:00', dur: 60, opId: 'op1', providerId: 'will',  reason: 'New patient comprehensive' },
      { time: '13:00', dur: 60, opId: 'op2', providerId: 'pat',   reason: 'Extraction #32' },
      { time: '13:00', dur: 60, opId: 'op3', providerId: 'smith', reason: 'Adult prophy + BWX' },
      { time: '14:00', dur: 60, opId: 'op2', providerId: 'pat',   reason: 'Composite #30 MO' },
      { time: '14:30', dur: 30, opId: 'op4', providerId: 'jord',  reason: 'Topical fluoride' },
      { time: '15:00', dur: 60, opId: 'op1', providerId: 'will',  reason: 'Crown delivery #19' },
      { time: '15:00', dur: 60, opId: 'op3', providerId: 'smith', reason: 'Adult prophy' },
      { time: '16:00', dur: 30, opId: 'op2', providerId: 'pat',   reason: 'Post-op check' },
    ];
    blocks.forEach((b, i) => {
      const pat = candidates[i % candidates.length];
      items.push({
        id: uid('appt'),
        opId: b.opId,
        time: b.time,
        duration: b.dur,
        patientId: pat?.id,
        providerId: b.providerId,
        reason: b.reason,
        status: i % 7 === 0 ? 'arrived' : i % 11 === 0 ? 'cancelled' : 'scheduled',
        notes: '',
      });
    });
    sched[dateKey] = items;
    saveSoon();
  }

  function renderScheduleStub() { return renderSchedule(); }

  function renderSchedule() {
    const date = state.ui.scheduleDate || '2026-05-04';
    const dt = new Date(date);
    seedScheduleFor(date);
    const sched = ensureSchedule();
    const items = (sched[date] || []).slice();
    const filterProvider = state.ui.scheduleProvider || 'all';
    const filterOp = state.ui.scheduleOp || 'all';
    const visible = items.filter(a =>
      (filterProvider === 'all' || a.providerId === filterProvider) &&
      (filterOp === 'all' || a.opId === filterOp)
    );

    // Summary stats
    let production = 0, scheduledCount = 0, noShowCount = 0, openSlots = 0;
    items.forEach(a => {
      if (a.status === 'arrived' || a.status === 'completed' || a.status === 'scheduled') scheduledCount++;
      if (a.status === 'no-show') noShowCount++;
    });
    // Approximate production from reason keywords
    items.forEach(a => {
      const r = (a.reason || '').toLowerCase();
      if (a.status === 'cancelled') return;
      if (/crown/.test(r))                production += 1295;
      else if (/rct|root canal/.test(r))  production += 925;
      else if (/extraction/.test(r))      production += 245;
      else if (/composite/.test(r))       production += 245;
      else if (/srp/.test(r))             production += 285;
      else if (/perio main/.test(r))      production += 145;
      else if (/sealant/.test(r))         production += 55;
      else if (/prophy.*adult/.test(r) || /adult prophy/.test(r))    production += 95;
      else if (/prophy.*child/.test(r) || /child prophy/.test(r))    production += 65;
      else if (/exam|new patient/.test(r))production += 95;
      else                                 production += 50;
    });

    const startHour = 8, endHour = 17, slotMin = 30;
    const slots = [];
    for (let h = startHour; h < endHour; h++) {
      slots.push(`${String(h).padStart(2,'0')}:00`);
      slots.push(`${String(h).padStart(2,'0')}:30`);
    }

    // Map appointments to grid positions
    const minOf = (t) => { const [h, m] = t.split(':').map(Number); return (h - startHour) * 60 + m; };
    const slotHeight = 28;   // px per 30-min slot
    const gridHeight = slots.length * slotHeight;

    return `
      <div class="space-y-3">
        <!-- Header strip -->
        <div class="bg-white rounded border border-slate-200 p-3 flex flex-wrap items-center gap-2">
          <div class="flex items-center gap-2">
            <button class="btn btn-soft" data-action="sched-prev" title="Previous day">‹</button>
            <input data-action="sched-date" type="date" value="${date}" class="text-[12px] mono px-2 py-1 border border-slate-300 rounded" />
            <button class="btn btn-soft" data-action="sched-next" title="Next day">›</button>
            <button class="btn btn-soft" data-action="sched-today">Today</button>
          </div>
          <div class="hidden sm:block ml-2">
            <h1 class="text-lg font-semibold text-slate-900 leading-tight">${dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</h1>
          </div>
          <span class="flex-1"></span>
          <select data-action="sched-filter-provider" class="text-[12px] px-2 py-1 border border-slate-300 rounded bg-white">
            <option value="all">All providers</option>
            ${PROVIDERS.map(p => `<option value="${p.id}" ${filterProvider===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}
          </select>
          <select data-action="sched-filter-op" class="text-[12px] px-2 py-1 border border-slate-300 rounded bg-white">
            <option value="all">All ops</option>
            ${OPERATORIES.map(o => `<option value="${o.id}" ${filterOp===o.id?'selected':''}>${escapeHtml(o.label)}</option>`).join('')}
          </select>
          <button class="btn btn-primary" data-action="open-modal" data-modal="sched-add">＋ Appointment</button>
        </div>

        <!-- Day stats -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          ${perioStatTile('Scheduled', scheduledCount + ' appts', 'today')}
          ${perioStatTile('Est. production', fmt.money(production), 'today, before adjustments')}
          ${perioStatTile('No-shows', noShowCount, 'today', noShowCount > 0 ? 'rose' : 'emerald')}
          ${perioStatTile('Cancelled', items.filter(a => a.status === 'cancelled').length, 'today', 'amber')}
        </div>

        <!-- Provider legend -->
        <div class="bg-white rounded border border-slate-200 p-2 flex flex-wrap gap-3 text-[11px]">
          ${PROVIDERS.map(p => `<span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-sm" style="background:${p.color}"></span>${escapeHtml(p.name)} <span class="text-slate-400">(${escapeHtml(p.role)})</span></span>`).join('')}
        </div>

        <!-- Schedule grid -->
        <div class="bg-white rounded border border-slate-200 overflow-x-auto">
          <div class="min-w-[860px] grid" style="grid-template-columns: 60px repeat(${OPERATORIES.length}, 1fr);">
            <!-- Top header row -->
            <div class="bg-slate-50 border-b border-slate-200"></div>
            ${OPERATORIES.map(o => `
              <div class="bg-slate-50 border-b border-l border-slate-200 px-2 py-1.5">
                <div class="text-[12px] font-semibold">${escapeHtml(o.label)}</div>
                <div class="text-[10px] text-slate-500 capitalize">${escapeHtml(o.kind)}</div>
              </div>`).join('')}

            <!-- Time column + op columns body -->
            <div class="border-r border-slate-200" style="height:${gridHeight}px;position:relative;">
              ${slots.map((s, i) => `
                <div class="absolute left-0 right-0 px-1 text-[10px] mono text-slate-400 ${s.endsWith(':00') ? 'border-t border-slate-200 font-semibold text-slate-600' : ''}" style="top:${i*slotHeight}px;height:${slotHeight}px;">
                  ${s.endsWith(':00') ? s : ''}
                </div>
              `).join('')}
            </div>
            ${OPERATORIES.map(op => `
              <div class="border-l border-slate-200 relative" style="height:${gridHeight}px;" data-op-col="${op.id}">
                ${slots.map((s, i) => `
                  <button class="absolute left-0 right-0 ${s.endsWith(':00') ? 'border-t border-slate-200' : 'border-t border-dashed border-slate-100'} hover:bg-teal-50/30"
                    style="top:${i*slotHeight}px;height:${slotHeight}px;"
                    data-action="sched-empty-click" data-op="${op.id}" data-time="${s}" title="Add ${s} appt"></button>
                `).join('')}
                ${visible.filter(a => a.opId === op.id).map(a => renderApptBlock(a, slotHeight, minOf(a.time))).join('')}
              </div>
            `).join('')}
          </div>
        </div>

        <p class="text-[11px] text-slate-500">Click any empty slot to schedule. Click an appointment to open it. Drag any appointment to a different time/op to reschedule.</p>
      </div>
    `;
  }

  function renderApptBlock(a, slotHeight, topMinutes) {
    const provider = PROVIDERS.find(pr => pr.id === a.providerId) || PROVIDERS[0];
    const pat = state.patients.find(p => p.id === a.patientId);
    const heightPx = Math.max(slotHeight, (a.duration / 30) * slotHeight) - 2;
    const statusBorder = ({
      'arrived':   '4px solid #10b981',
      'completed': '4px solid #059669',
      'scheduled': '4px solid ' + provider.color,
      'cancelled': '4px solid #94a3b8',
      'no-show':   '4px solid #ef4444',
    })[a.status] || '4px solid ' + provider.color;
    const statusOpacity = ['cancelled', 'no-show'].includes(a.status) ? 'opacity-60' : '';
    return `
      <div class="absolute left-1 right-1 rounded shadow-sm cursor-grab text-[11px] overflow-hidden ${statusOpacity}"
           style="top:${(topMinutes/30)*slotHeight + 1}px;height:${heightPx}px;background:${provider.color}15;border-left:${statusBorder};"
           draggable="true"
           data-appt-id="${a.id}"
           data-action="sched-open-appt">
        <div class="px-1.5 py-1 leading-tight">
          <div class="font-semibold text-slate-900 truncate">${pat ? escapeHtml(pat.last + ', ' + pat.first) : 'No patient'}</div>
          <div class="text-slate-600 truncate">${escapeHtml(a.reason || '')}</div>
          <div class="text-[10px] text-slate-500 mono">${a.time} · ${a.duration}m · ${escapeHtml(provider.name)}</div>
          ${a.status !== 'scheduled' ? `<div class="text-[10px] uppercase tracking-wide font-semibold mt-0.5" style="color:${({arrived:'#059669',completed:'#059669',cancelled:'#475569','no-show':'#dc2626'})[a.status] || '#475569'}">${a.status.replace('-',' ')}</div>` : ''}
        </div>
      </div>
    `;
  }
  // ── Tx Plan module: editable, phased, insurance-estimated ──────
  const TX_STATUSES = [
    { id: 'planned',     label: 'Planned',     cls: 'chip-slate' },
    { id: 'accepted',    label: 'Accepted',    cls: 'chip-emerald' },
    { id: 'scheduled',   label: 'Scheduled',   cls: 'chip-sky' },
    { id: 'inprogress',  label: 'In progress', cls: 'chip-amber' },
    { id: 'completed',   label: 'Completed',   cls: 'chip-emerald' },
    { id: 'declined',    label: 'Declined',    cls: 'chip-rose' },
  ];

  function txEstimates(line, p) {
    // Returns { fee, ins, pt } using carrier coverage matrix from SEED.coverage.
    const fee = Number(line.fee) || 0;
    if (line.estInsurance != null) {
      const ins = Math.min(fee, Math.max(0, Number(line.estInsurance) || 0));
      return { fee, ins, pt: fee - ins };
    }
    const code = SEED.adaCodes.find(c => c.code === line.code);
    const cat = code?.cat;
    let pct = (cat && SEED.coverage[cat] != null) ? SEED.coverage[cat] : 0.8;
    // No insurance => pt pays all
    const carrier = (p.insurance?.primary?.carrier || '').toLowerCase();
    if (!carrier || /self.?pay|cash/i.test(carrier)) pct = 0;
    // Apply remaining-max cap (roughly)
    const ins = Math.round(fee * pct * 100) / 100;
    return { fee, ins, pt: fee - ins };
  }

  function renderTxPlan(p) {
    p.treatmentPlan = p.treatmentPlan || [];
    // Lazy-init line ids and statuses
    p.treatmentPlan.forEach(l => {
      if (!l.id) l.id = uid('tx');
      if (!l.status) l.status = 'planned';
    });
    const tp = p.treatmentPlan;

    const filter = state.ui.txFilter || 'active';   // active | all | completed | declined
    const visible = tp.filter(l =>
      filter === 'active'    ? !['completed','declined'].includes(l.status) :
      filter === 'completed' ? l.status === 'completed' :
      filter === 'declined'  ? l.status === 'declined'  : true
    );

    let totalPresented = 0, totalAccepted = 0, totalCompleted = 0, totalIns = 0, totalPt = 0;
    tp.forEach(l => {
      const e = txEstimates(l, p);
      totalPresented += e.fee;
      totalIns += e.ins;
      totalPt += e.pt;
      if (['accepted','scheduled','inprogress','completed'].includes(l.status)) totalAccepted += e.fee;
      if (l.status === 'completed') totalCompleted += e.fee;
    });
    const acceptancePct = totalPresented > 0 ? Math.round((totalAccepted / totalPresented) * 100) : 0;

    const phases = [1, 2, 3];

    return `
      <div class="space-y-3">
        <!-- Header: totals + actions -->
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-2">
          ${perioStatTile('Presented', fmt.money(totalPresented), `${tp.length} procedures`)}
          ${perioStatTile('Accepted', fmt.money(totalAccepted), `${acceptancePct}% case acceptance`, acceptancePct >= 70 ? 'emerald' : acceptancePct >= 40 ? 'amber' : 'rose')}
          ${perioStatTile('Completed', fmt.money(totalCompleted), 'Production from this plan')}
          ${perioStatTile('Ins. estimate', fmt.money(totalIns), escapeHtml(p.insurance?.primary?.carrier || 'self-pay'))}
          ${perioStatTile('Patient portion', fmt.money(totalPt), 'Out-of-pocket', 'rose')}
        </div>

        <!-- Toolbar -->
        <div class="bg-white rounded border border-slate-200 p-3 flex flex-wrap items-center gap-2">
          <div class="flex gap-1.5">
            ${[
              { id: 'active',    label: `Active (${tp.filter(l => !['completed','declined'].includes(l.status)).length})` },
              { id: 'all',       label: `All (${tp.length})` },
              { id: 'completed', label: `Completed (${tp.filter(l => l.status === 'completed').length})` },
              { id: 'declined',  label: `Declined (${tp.filter(l => l.status === 'declined').length})` },
            ].map(t => `<button data-action="tx-filter" data-f="${t.id}"
                class="px-2 py-1 text-[11px] rounded ${filter === t.id ? 'bg-slate-900 text-white' : 'bg-slate-100 hover:bg-slate-200'}">${t.label}</button>`).join('')}
          </div>
          <span class="flex-1"></span>
          <button class="btn btn-soft" data-action="tx-print">⎙ Print plan</button>
          <button class="btn btn-soft" data-action="tx-pdf">⬇ PDF</button>
          <button class="btn btn-soft" data-action="tx-sign">✓ Sign &amp; accept</button>
          <button class="btn btn-primary" data-action="open-modal" data-modal="tx-add-line">＋ Add procedure</button>
        </div>

        <!-- Phases -->
        ${phases.map(ph => {
          const lines = visible.filter(l => (l.phase || 1) === ph);
          const phTotal = lines.reduce((a, l) => a + (Number(l.fee) || 0), 0);
          const phEst = lines.reduce((acc, l) => {
            const e = txEstimates(l, p);
            return { ins: acc.ins + e.ins, pt: acc.pt + e.pt };
          }, { ins: 0, pt: 0 });
          return `
            <section class="bg-white rounded border border-slate-200 overflow-hidden">
              <header class="px-3 py-2 bg-slate-50 border-b border-slate-200 flex flex-wrap items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                  <span class="text-[11px] uppercase tracking-wide font-semibold text-slate-700">Phase ${ph}</span>
                  <span class="text-[11px] text-slate-500">${ph === 1 ? 'Immediate (urgent + foundational)' : ph === 2 ? 'Stabilization (3–6 mo)' : 'Definitive / elective'}</span>
                </div>
                <div class="text-[11px] flex gap-3">
                  <span>Total <span class="mono font-semibold">${fmt.money(phTotal)}</span></span>
                  <span>Ins <span class="mono">${fmt.money(phEst.ins)}</span></span>
                  <span>Pt <span class="mono text-rose-700">${fmt.money(phEst.pt)}</span></span>
                </div>
              </header>
              ${lines.length === 0 ? `<div class="p-4 text-center text-[12px] text-slate-400">— no procedures —</div>` :
              `<table class="pp">
                <thead><tr>
                  <th>Code</th><th>Description</th><th>Tooth</th><th>Priority</th><th>Status</th>
                  <th class="text-right">Fee</th><th class="text-right">Ins. est</th><th class="text-right">Patient</th>
                  <th class="text-right">Actions</th>
                </tr></thead>
                <tbody>
                  ${lines.map(l => {
                    const e = txEstimates(l, p);
                    const status = TX_STATUSES.find(s => s.id === l.status) || TX_STATUSES[0];
                    return `
                      <tr data-tx-id="${l.id}">
                        <td class="mono">${escapeHtml(l.code)}</td>
                        <td>${escapeHtml(l.desc)} ${l.preauthRequired ? '<span class="chip chip-amber ml-1" title="Pre-authorization required">pre-auth</span>' : ''}</td>
                        <td class="mono">${l.tooth || '—'}${l.surface ? ' ' + escapeHtml(l.surface) : ''}</td>
                        <td><span class="chip ${l.priority === 'high' ? 'chip-rose' : l.priority === 'medium' ? 'chip-amber' : 'chip-slate'}">${escapeHtml(l.priority || 'medium')}</span></td>
                        <td>
                          <select data-action="tx-set-status" data-id="${l.id}" class="text-[11px] px-1.5 py-0.5 border border-slate-300 rounded bg-white">
                            ${TX_STATUSES.map(s => `<option value="${s.id}" ${s.id === l.status ? 'selected' : ''}>${s.label}</option>`).join('')}
                          </select>
                        </td>
                        <td class="text-right mono">${fmt.money(e.fee)}</td>
                        <td class="text-right mono text-emerald-700">${fmt.money(e.ins)}</td>
                        <td class="text-right mono text-rose-700">${fmt.money(e.pt)}</td>
                        <td class="text-right whitespace-nowrap">
                          ${l.status === 'planned' ? `<button class="btn btn-soft !py-1 !px-1.5 !text-[11px]" data-action="tx-accept" data-id="${l.id}" title="Accept this line">✓</button>` : ''}

  function renderRecall() {
    const today = new Date('2026-05-04');
    const filter = state.ui.recallFilter || 'all';   // all | overdue | due30 | due60
    const all = state.patients.map(p => {
      const due = p.recall?.due ? new Date(p.recall.due) : null;
      const days = due ? Math.round((due - today) / 86400000) : null;
      const lastTouch = (p.comms || []).map(c => c.at).sort().slice(-1)[0];
      return { p, days, lastTouch };
    }).filter(x => x.days != null);
    const list = all.filter(x =>
      filter === 'all'    ? x.days <= 60 :
      filter === 'overdue'? x.days < 0 :
      filter === 'due30'  ? x.days >= 0 && x.days <= 30 :
      filter === 'due60'  ? x.days > 30 && x.days <= 60 : true
    ).sort((a, b) => a.days - b.days);
    const counts = {
      overdue: all.filter(x => x.days < 0).length,
      due30:   all.filter(x => x.days >= 0 && x.days <= 30).length,
      due60:   all.filter(x => x.days > 30 && x.days <= 60).length,
    };
    const tabs = [
      { id: 'all',     label: `All (${counts.overdue + counts.due30 + counts.due60})` },
      { id: 'overdue', label: `Overdue (${counts.overdue})`,     cls: 'text-rose-700' },
      { id: 'due30',   label: `Due in 30 days (${counts.due30})`,cls: 'text-amber-700' },
      { id: 'due60',   label: `Due in 31–60 days (${counts.due60})`, cls: 'text-slate-700' },
    ];
    return `
      <div class="space-y-3">
        <div class="bg-white rounded border border-slate-200 p-3 flex flex-wrap gap-2 items-center">
          <h1 class="text-lg font-semibold text-slate-900 mr-3">Recall pipeline</h1>
          ${tabs.map(t => `
            <button data-action="recall-filter" data-f="${t.id}" class="px-2 py-1 text-[11px] rounded ${filter === t.id ? 'bg-slate-900 text-white' : 'bg-slate-100 hover:bg-slate-200'} ${t.cls || ''}">${t.label}</button>
          `).join('')}
          <span class="flex-1"></span>
          <button class="btn btn-soft" data-action="recall-export" title="Export the visible list as CSV">⬇ Export CSV</button>
        </div>

        <div class="bg-white rounded border border-slate-200 overflow-hidden">
          ${list.length === 0 ? '<div class="p-6 text-center text-[12px] text-slate-500">No patients in this bucket.</div>' :
          `<table class="pp">
            <thead><tr><th>Patient</th><th>Provider</th><th>Last prophy</th><th>Recall due</th><th>Days</th><th>Last contact</th><th>Phone</th><th class="text-right">Actions</th></tr></thead>
            <tbody>
              ${list.map(({ p: p2, days, lastTouch }) => `
                <tr>
                  <td>
                    <button class="text-teal-700 hover:underline font-medium" data-action="select-patient-and-go" data-id="${p2.id}" data-module="overview">${escapeHtml(p2.last)}, ${escapeHtml(p2.first)}</button>
                    <div class="text-[10px] text-slate-500 capitalize">${escapeHtml(p2.type || '')}</div>
                  </td>
                  <td class="text-[12px]">${escapeHtml(p2.provider || '—')}</td>
                  <td class="mono text-[12px]">${fmt.dateShort(p2.lastProphy)}</td>
                  <td class="mono text-[12px]">${fmt.dateShort(p2.recall?.due)}</td>
                  <td><span class="chip mono ${days < 0 ? 'chip-rose' : days < 14 ? 'chip-amber' : 'chip-slate'}">${days < 0 ? `${-days}d late` : `${days}d`}</span></td>
                  <td class="text-[11px] text-slate-500 mono">${lastTouch ? new Date(lastTouch).toLocaleDateString() : '—'}</td>
                  <td class="mono text-[12px]">${escapeHtml(p2.phone || '')}</td>
                  <td class="text-right whitespace-nowrap">
                    <button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="quick-text-recall" data-id="${p2.id}" title="Send recall text">💬</button>
                    <button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="open-modal" data-modal="log-call" data-id="${p2.id}" title="Log a call">📞</button>
                    <button class="btn btn-soft !py-1 !px-2 !text-[11px]" data-action="recall-mark-contacted" data-id="${p2.id}" title="Mark contacted">✓</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>`}
        </div>
      </div>
    `;
  }

  function triggerImageUpload(type, id) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = type === 'docs' ? '*/*' : 'image/*';
    input.multiple = type === 'docs';
    input.onchange = (e) => {
      const files = Array.from(e.target.files || []);
      files.forEach(f => readAndStore(type, id, f));
    };
    input.click();
  }

  function readAndStore(type, id, file) {
    const reader = new FileReader();
    reader.onload = () => {
      const p = currentPatient(); if (!p) return;
      const img = ensureImaging(p);
      const entry = { dataUrl: reader.result, date: '2026-05-04', name: file.name, kind: file.type, notes: '' };
      if (type === 'fmx' || type === 'bw' || type === 'photos') {
        img[type][id || file.name] = entry;
      } else if (type === 'docs') {
        img.docs.push(entry);
      } else {
        img[type] = entry;
      }
      saveSoon();
      logAction('imaging_upload', { type, id });
      rerender();
      toast(`Image saved`, { tone: 'success' });
    };
    reader.readAsDataURL(file);
  }

  function renderPaletteResults(query = '') {
    const root = document.getElementById('palette-results');
    if (!root) return;
    const q = query.trim().toLowerCase();
    const out = [];
    if (q) {
      // Patients
      state.patients.forEach(p => {
        const hay = `${p.first} ${p.last} ${p.id} ${p.phone || ''}`.toLowerCase();
        if (hay.includes(q)) out.push({
          kind: 'Patient', label: `${p.last}, ${p.first}`, sub: `${p.id} · ${fmt.age(p.dob)}y`, action: () => { selectPatient(p.id); closePalette(); }
        });
      });
      // ADA codes
      SEED.adaCodes.forEach(c => {
        const hay = `${c.code} ${c.desc}`.toLowerCase();
        if (hay.includes(q)) out.push({
          kind: 'ADA', label: c.code, sub: c.desc, action: () => { closePalette(); openModal('post-procedure', { prefill: c }); }
        });
      });
      // Actions
      const actions = [
        { label: 'New patient', module: null, action: () => { closePalette(); openModal('new-patient'); } },
        { label: 'Post procedure', action: () => { closePalette(); openModal('post-procedure'); } },
        { label: 'Walkout statement', action: () => { closePalette(); openModal('walkout'); } },
        { label: 'Open Chart', action: () => { closePalette(); setModule('chart'); } },
        { label: 'Open Ledger', action: () => { closePalette(); setModule('ledger'); } },
        { label: 'Open Schedule', action: () => { closePalette(); setModule('schedule'); } },
      ];
      actions.forEach(a => { if (a.label.toLowerCase().includes(q)) out.push({ kind: 'Action', label: a.label, sub: '', action: a.action }); });
    }
    root.innerHTML = (out.length === 0 && q
      ? `<div class="p-4 text-[12px] text-slate-500">No matches.</div>`
      : (out.slice(0, 16).map((r, i) => `
        <button data-pi="${i}" class="w-full text-left px-3 py-2 rounded hover:bg-slate-100 flex items-baseline gap-2">
          <span class="text-[10px] uppercase tracking-wide text-slate-400 w-14 shrink-0">${r.kind}</span>
          <span class="flex-1 truncate">${escapeHtml(r.label)}</span>
          <span class="text-[11px] text-slate-500 truncate">${escapeHtml(r.sub)}</span>
        </button>
      `).join('')));
    Array.from(root.querySelectorAll('button[data-pi]')).forEach((b, i) => {
      b.onclick = () => out[i].action();
    });
  }

  // ── ADA typeahead in procedure modal ───────────────────────────
  function renderAdaSuggestions(q) {
    const box = document.getElementById('ada-suggest');
    if (!box) return;
    const ql = (q || '').trim().toLowerCase();
    if (!ql) { box.classList.add('hidden'); return; }
    const matches = SEED.adaCodes.filter(c =>
      c.code.toLowerCase().includes(ql) || c.desc.toLowerCase().includes(ql)
    ).slice(0, 8);
    if (matches.length === 0) { box.classList.add('hidden'); return; }
    box.classList.remove('hidden');
    box.innerHTML = matches.map((c, i) => `
      <button type="button" data-ada-i="${i}" class="w-full text-left px-3 py-2 hover:bg-teal-50 border-b border-slate-100 flex items-baseline gap-2">
        <span class="mono text-[12px] font-semibold w-14 shrink-0">${c.code}</span>
        <span class="flex-1 text-[12px]">${escapeHtml(c.desc)}</span>
        <span class="mono text-[11px] text-slate-500">${fmt.money(c.fee)}</span>
      </button>
    `).join('');
    Array.from(box.querySelectorAll('button[data-ada-i]')).forEach((btn, i) => {
      btn.onclick = () => {
        const c = matches[i];
        const form = box.closest('form');
        form.code.value = c.code;
        form.fee.value = c.fee;
        // Try to fill description in notes if helpful
        box.classList.add('hidden');
        form.querySelector('[name="tooth"]').focus();
      };
    });
  }

  function markSurface(tooth, surf, val) {
    const p = currentPatient(); if (!p) return;
    p.chart = p.chart || {};
    const key = `T-${tooth}`;
    p.chart[key] = p.chart[key] || {};
    // If tooth had whole-tooth marker, clear it first
    if (p.chart[key].whole) delete p.chart[key].whole;
    p.chart[key][surf] = val;
    saveSoon();
    logAction('chart_mark_surface', { tooth, surf, val });
  }
  function markWholeTooth(tooth, val) {
    const p = currentPatient(); if (!p) return;
    p.chart = p.chart || {};
    p.chart[`T-${tooth}`] = { whole: val };
    saveSoon();
    logAction('chart_mark_whole', { tooth, val });
  }
  function clearSurface(tooth, surf) {
    const p = currentPatient(); if (!p) return;
    if (p.chart?.[`T-${tooth}`]) {
      delete p.chart[`T-${tooth}`][surf];
      if (Object.keys(p.chart[`T-${tooth}`]).length === 0) delete p.chart[`T-${tooth}`];
      saveSoon();
      logAction('chart_clear_surface', { tooth, surf });
    }
  }

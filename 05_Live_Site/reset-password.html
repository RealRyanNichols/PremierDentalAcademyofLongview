<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Set your password — Premier Dental Academy of Longview</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='4' fill='%230d9488'/%3E%3Ctext x='12' y='17' text-anchor='middle' font-family='Inter,sans-serif' font-size='14' font-weight='700' fill='white'%3EP%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; color: #0f172a; }
    .display { font-family: 'Fraunces', serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-cyan-50/40 to-teal-50/40 min-h-screen flex items-center">

<main class="max-w-md w-full mx-auto p-6">
  <a href="/" class="flex items-center justify-center gap-2 font-bold text-slate-900 mb-8">
    <span class="inline-block w-9 h-9 rounded-lg bg-gradient-to-br from-teal-600 to-cyan-700 text-white font-extrabold text-lg grid place-items-center">P</span>
    <span class="text-lg">Premier Dental Academy</span>
  </a>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-lg p-8">
    <!-- Loading -->
    <div id="state-loading">
      <h1 class="display text-2xl font-bold mb-1">One moment…</h1>
      <p class="text-sm text-slate-500">Verifying your link.</p>
    </div>

    <!-- Set password form -->
    <div id="state-form" class="hidden">
      <h1 class="display text-2xl font-bold mb-1">Set your password</h1>
      <p class="text-sm text-slate-500 mb-6">Choose a new password for <span id="user-email" class="font-semibold text-slate-700"></span>. You'll use it to sign in from now on.</p>
      <form id="form-password" class="space-y-4">
        <label class="block">
          <span class="text-sm font-medium">New password</span>
          <input name="password" type="password" required minlength="8" autocomplete="new-password" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-teal-600 focus:ring-1 focus:ring-teal-600" />
          <span class="text-xs text-slate-500">At least 8 characters</span>
        </label>
        <label class="block">
          <span class="text-sm font-medium">Confirm new password</span>
          <input name="confirm" type="password" required minlength="8" autocomplete="new-password" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-teal-600" />
        </label>
        <button type="submit" id="btn-save" class="w-full bg-teal-700 hover:bg-teal-800 text-white font-bold py-2.5 rounded-lg">Save password →</button>
      </form>
    </div>

    <!-- Expired / no session -->
    <div id="state-expired" class="hidden">
      <h1 class="display text-2xl font-bold mb-1">Link expired</h1>
      <p class="text-sm text-slate-500 mb-6">That reset link is no longer valid. Enter your email and we'll send you a fresh one.</p>
      <form id="form-resend" class="space-y-4">
        <label class="block">
          <span class="text-sm font-medium">Email</span>
          <input name="email" type="email" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:border-teal-600" />
        </label>
        <button type="submit" class="w-full bg-teal-700 hover:bg-teal-800 text-white font-bold py-2.5 rounded-lg">Email me a new link →</button>
      </form>
    </div>

    <div id="msg" class="hidden mt-4 p-3 rounded-lg text-sm"></div>
  </div>

  <p class="text-center text-sm text-slate-500 mt-6">
    <a href="/login" class="text-teal-700 hover:underline">← Back to sign in</a>
  </p>
</main>

<script>
(async () => {
  const SUPABASE_URL = 'https://lmbsuwslsycukynzpzik.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_vzuQZbkmj-UsYZVs5Zqw9w_c8PiOfbh';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const msg = document.getElementById('msg');
  const show = (text, tone = 'info') => {
    msg.textContent = text;
    msg.className = `mt-4 p-3 rounded-lg text-sm ${tone === 'error' ? 'bg-rose-50 text-rose-900 border border-rose-200' : tone === 'success' ? 'bg-emerald-50 text-emerald-900 border border-emerald-200' : 'bg-slate-50 text-slate-700 border border-slate-200'}`;
    msg.classList.remove('hidden');
  };
  const setState = (name) => {
    ['loading', 'form', 'expired'].forEach(s => document.getElementById('state-' + s).classList.add('hidden'));
    document.getElementById('state-' + name).classList.remove('hidden');
  };

  // The recovery/invite/magic link signs the user in via the URL hash.
  // Give supabase-js a moment to process it, then check for a session.
  let session = null;
  for (let i = 0; i < 10; i++) {
    const { data } = await sb.auth.getSession();
    if (data?.session) { session = data.session; break; }
    await new Promise(r => setTimeout(r, 300));
  }

  if (session) {
    document.getElementById('user-email').textContent = session.user.email || '';
    setState('form');
  } else {
    setState('expired');
  }

  document.getElementById('form-password').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const password = fd.get('password');
    if (password !== fd.get('confirm')) return show('Passwords do not match.', 'error');
    const btn = document.getElementById('btn-save');
    btn.disabled = true; btn.textContent = 'Saving…';
    const { error } = await sb.auth.updateUser({ password });
    if (error) {
      btn.disabled = false; btn.textContent = 'Save password →';
      return show(error.message, 'error');
    }
    // Clear the "needs password setup" flag on their profile (best effort).
    try {
      const { data: { user } } = await sb.auth.getUser();
      if (user) await sb.from('profiles').update({ needs_password_setup: false }).eq('id', user.id);
    } catch (_) { /* non-blocking */ }
    show('Password saved! Taking you to your dashboard…', 'success');
    setTimeout(() => location.href = '/dashboard', 900);
  };

  document.getElementById('form-resend').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const { error } = await sb.auth.resetPasswordForEmail(fd.get('email'), {
      redirectTo: location.origin + '/reset-password',
    });
    if (error) return show(error.message, 'error');
    show('Reset link sent. Check your email (and spam folder).', 'success');
  };
})();
</script>
</body>
</html>

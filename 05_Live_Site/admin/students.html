<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Students — PDA Admin</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='4' fill='%230d9488'/%3E%3C/svg%3E" />
  <meta name="robots" content="noindex,nofollow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>body{font-family:Inter,sans-serif;color:#0f172a;-webkit-font-smoothing:antialiased}.display{font-family:Fraunces,serif}.mono{font-family:'SFMono-Regular',Menlo,Consolas,monospace}</style>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

<nav class="bg-slate-900 text-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
    <a href="/admin" class="flex items-center gap-2 font-bold">
      <span class="w-7 h-7 rounded bg-gradient-to-br from-teal-500 to-cyan-600 text-white grid place-items-center font-extrabold">P</span>
      <span>PDA Admin</span>
      <span class="text-slate-400 text-sm font-normal">/ Students</span>
    </a>
    <div class="flex items-center gap-4 text-sm">
      <a href="/admin" class="text-slate-300 hover:text-white">Home</a>
      <a href="/admin/students" class="text-teal-300">Students</a>
      <a href="/admin/leads" class="text-slate-300 hover:text-white">Inbox</a>
      <button id="signout" class="text-slate-300 hover:text-white">Sign out</button>
    </div>
  </div>
</nav>

<main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-8">

  <div id="auth-wall" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8 max-w-md mx-auto text-center hidden">
    <div class="text-5xl mb-3">🔐</div>
    <h1 class="display text-2xl font-bold">Admin access only</h1>
    <a href="/login" class="inline-block mt-5 bg-teal-700 hover:bg-teal-800 text-white font-bold px-5 py-2.5 rounded-lg">Sign in →</a>
  </div>

  <div id="view" class="hidden">
    <div class="flex flex-wrap items-end justify-between gap-3 mb-6">
      <div>
        <p class="text-xs uppercase tracking-widest text-teal-700 font-semibold">Roster</p>
        <h1 class="display text-3xl font-bold mt-1">All students <span id="count" class="text-slate-400 font-normal">—</span></h1>
      </div>
      <div class="flex gap-2 items-center">
        <input id="search" placeholder="Search name / email / phone" class="bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm w-64" />
        <select id="program-filter" class="bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm">
          <option value="">All programs</option>
          <option value="in_person">In-Person</option>
          <option value="online">Online</option>
          <option value="foundation">Foundation</option>
          <option value="career_track">Career Track</option>
          <option value="preview">Preview only</option>
        </select>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
      <div id="list" class="divide-y divide-slate-100"></div>
      <div id="empty" class="p-10 text-center text-slate-500 hidden">No students match. Try clearing the filter.</div>
    </div>
  </div>
</main>

<!-- SMS modal -->
<div id="sms-modal" class="hidden fixed inset-0 bg-slate-900/60 z-50 grid place-items-center p-4">
  <div class="bg-white rounded-2xl max-w-md w-full p-6">
    <div class="flex items-start justify-between mb-3">
      <div>
        <div class="text-xs uppercase tracking-widest text-teal-700 font-semibold">Send SMS</div>
        <h3 id="sms-target" class="display text-lg font-bold">—</h3>
      </div>
      <button id="sms-close" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button>
    </div>
    <textarea id="sms-body" rows="4" placeholder="Your message — sent from the PDA Quo number." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:border-teal-600 focus:outline-none text-sm"></textarea>
    <div class="flex justify-between items-center mt-3">
      <span id="sms-status" class="text-xs text-slate-500"></span>
      <button id="sms-send" class="bg-teal-700 hover:bg-teal-800 text-white font-semibold px-5 py-2 rounded-lg text-sm">Send →</button>
    </div>
  </div>
</div>

<script>
(async () => {
  const SUPABASE_URL = 'https://lmbsuwslsycukynzpzik.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_vzuQZbkmj-UsYZVs5Zqw9w_c8PiOfbh';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const { data: { session } } = await sb.auth.getSession();
  if (!session) { document.getElementById('auth-wall').classList.remove('hidden'); return; }
  const { data: profile } = await sb.from('profiles').select('is_admin').eq('id', session.user.id).maybeSingle();
  if (!profile?.is_admin) { document.getElementById('auth-wall').classList.remove('hidden'); return; }

  document.getElementById('view').classList.remove('hidden');
  document.getElementById('signout').onclick = () => { location.href = '/logout?then=home'; };

  let all = [];

  async function load() {
    const { data } = await sb.from('profiles')
      .select('id, email, first_name, last_name, phone, city, state, program, cohort, enrollment_path, enrolled_at, created_at, is_admin, kajabi_id')
      .neq('is_admin', true)
      .order('created_at', { ascending: false });
    all = data || [];
    render();
  }

  function render() {
    const q = (document.getElementById('search').value || '').toLowerCase().trim();
    const programFilter = document.getElementById('program-filter').value;
    const list = all.filter(s => {
      if (programFilter && s.program !== programFilter && s.enrollment_path !== programFilter) return false;
      if (!q) return true;
      const hay = `${s.first_name||''} ${s.last_name||''} ${s.email||''} ${s.phone||''} ${s.cohort||''} ${s.city||''}`.toLowerCase();
      return hay.includes(q);
    });

    document.getElementById('count').textContent = list.length === all.length ? `(${all.length})` : `(${list.length} of ${all.length})`;
    document.getElementById('empty').classList.toggle('hidden', list.length > 0);

    const listEl = document.getElementById('list');
    listEl.innerHTML = list.map(s => {
      const initials = `${(s.first_name?.[0]||'?').toUpperCase()}${(s.last_name?.[0]||'').toUpperCase()}`;
      const name = `${s.first_name||''} ${s.last_name||''}`.trim() || s.email || 'Unnamed';
      const phone = (s.phone || '').replace(/[^\d+]/g, '');
      const program = s.program || s.enrollment_path || '—';
      const programLabel = ({ in_person: '🏫 In-Person', online: '💻 Online', foundation: '🏫 In-Person', career_track: '💻 Online', preview: '🔍 Preview', staff: '🛠 Staff', admin: '🛠 Admin' })[program] || program;
      return `
        <div class="p-4 sm:p-5 hover:bg-slate-50">
          <div class="flex items-start gap-4 flex-wrap">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-teal-500 to-cyan-600 text-white grid place-items-center font-bold text-sm shrink-0">${initials}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-baseline gap-2 flex-wrap">
                <span class="font-semibold">${name.replace(/</g,'&lt;')}</span>
                <span class="text-xs bg-slate-100 text-slate-700 px-2 py-0.5 rounded-full">${programLabel}</span>
                ${s.cohort ? `<span class="text-xs text-slate-500">· ${s.cohort.replace(/</g,'&lt;')}</span>` : ''}
                ${s.kajabi_id ? `<span class="text-xs bg-cyan-100 text-cyan-700 px-2 py-0.5 rounded-full">Kajabi linked</span>` : ''}
              </div>
              <div class="text-sm text-slate-600 mt-1 flex flex-wrap gap-x-3 gap-y-0.5">
                ${s.email ? `<a href="mailto:${s.email}" class="text-teal-700 hover:underline">${s.email}</a>` : ''}
                ${s.phone ? `<a href="tel:${phone}" class="text-teal-700 hover:underline">${s.phone}</a>` : ''}
                ${s.city ? `<span>${s.city}, ${s.state || 'TX'}</span>` : ''}
              </div>
              <div class="text-xs text-slate-500 mt-1">Joined ${new Date(s.created_at).toLocaleDateString()}${s.enrolled_at ? ` · Enrolled ${new Date(s.enrolled_at).toLocaleDateString()}` : ''}</div>
            </div>
            <div class="flex gap-2 shrink-0 flex-wrap">
              ${s.phone ? `<button data-action="sms" data-phone="${phone}" data-name="${name.replace(/"/g,'&quot;')}" data-id="${s.id}" class="bg-cyan-700 hover:bg-cyan-800 text-white text-xs font-semibold px-3 py-1.5 rounded-lg">💬 Text</button>` : ''}
              ${s.phone ? `<a href="tel:${phone}" class="bg-emerald-700 hover:bg-emerald-800 text-white text-xs font-semibold px-3 py-1.5 rounded-lg">📞 Call</a>` : ''}
              ${s.email ? `<a href="mailto:${s.email}?subject=Hi%20from%20Premier%20Dental%20Academy" class="bg-slate-700 hover:bg-slate-800 text-white text-xs font-semibold px-3 py-1.5 rounded-lg">✉️ Email</a>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');

    listEl.querySelectorAll('[data-action="sms"]').forEach(btn => {
      btn.onclick = () => openSms(btn.dataset.phone, btn.dataset.name, btn.dataset.id);
    });
  }

  // ── SMS modal
  const modal     = document.getElementById('sms-modal');
  const targetEl  = document.getElementById('sms-target');
  const bodyEl    = document.getElementById('sms-body');
  const statusEl  = document.getElementById('sms-status');
  let currentTo = null, currentStudentId = null;
  document.getElementById('sms-close').onclick = () => modal.classList.add('hidden');
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });

  function openSms(phone, name, studentId) {
    currentTo = phone;
    currentStudentId = studentId;
    targetEl.textContent = `${name} · ${phone}`;
    bodyEl.value = '';
    statusEl.textContent = '';
    modal.classList.remove('hidden');
    setTimeout(() => bodyEl.focus(), 50);
  }

  document.getElementById('sms-send').onclick = async () => {
    const body = bodyEl.value.trim();
    if (!body || !currentTo) return;
    statusEl.textContent = 'Sending…';
    const resp = await sb.functions.invoke('quo-send-sms', { body: { to: currentTo, body, related_student_id: currentStudentId } });
    if (resp?.error || resp?.data?.error) {
      statusEl.textContent = '✗ ' + (resp?.data?.error || resp?.error?.message || 'failed');
    } else {
      statusEl.textContent = '✓ Sent';
      setTimeout(() => modal.classList.add('hidden'), 700);
    }
  };

  document.getElementById('search').oninput = render;
  document.getElementById('program-filter').onchange = render;

  load();
})();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Who am I? — PDA Admin diagnostic</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;max-width:760px;margin:24px auto;padding:0 16px;color:#0f172a;line-height:1.5}
    h1{font-size:20px} .row{padding:10px 12px;border:1px solid #e2e8f0;border-radius:10px;margin:8px 0;background:#fff}
    .k{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#64748b;font-weight:700}
    .v{font-family:Menlo,Consolas,monospace;font-size:13px;word-break:break-all;margin-top:2px}
    .ok{color:#047857;font-weight:700}.bad{color:#b91c1c;font-weight:700}
    button{background:#0f766e;color:#fff;border:0;border-radius:8px;padding:10px 16px;font-weight:600;cursor:pointer;margin:6px 6px 0 0}
    a.btn{display:inline-block;text-decoration:none}
    pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:10px;overflow:auto;font-size:12px}
  </style>
</head>
<body>
  <h1>PDA admin diagnostic — “Who am I?”</h1>
  <p style="color:#475569;font-size:14px">This page checks what your browser sees about your login. Share a screenshot with support if asked.</p>
  <div id="out">Running checks…</div>
  <div style="margin-top:14px">
    <button id="fix">🔧 Refresh my login &amp; re-check</button>
    <button id="hardfix">🧹 Sign out everywhere &amp; reload</button>
    <a class="btn" href="/login" style="background:#334155">Go to login</a>
    <a class="btn" href="/dashboard" style="background:#334155">Go to dashboard</a>
  </div>

<script>
(async () => {
  const SUPABASE_URL = 'https://lmbsuwslsycukynzpzik.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_vzuQZbkmj-UsYZVs5Zqw9w_c8PiOfbh';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true },
  });
  const out = document.getElementById('out');
  const rows = [];
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const row = (k, v, cls) => rows.push(`<div class="row"><div class="k">${esc(k)}</div><div class="v ${cls||''}">${esc(v)}</div></div>`);

  // 1) storage presence
  const storeKey = Object.keys(localStorage).find(k => /-auth-token$/.test(k))
                 || Object.keys(sessionStorage).find(k => /-auth-token$/.test(k));
  row('Auth token in localStorage', Object.keys(localStorage).some(k=>/-auth-token$/.test(k)) ? 'yes' : 'NO',
      Object.keys(localStorage).some(k=>/-auth-token$/.test(k)) ? 'ok' : 'bad');
  row('Auth token in sessionStorage (remember-me OFF)', Object.keys(sessionStorage).some(k=>/-auth-token$/.test(k)) ? 'yes' : 'no');

  // 2) session
  const { data: sd } = await sb.auth.getSession();
  const session = sd?.session || null;
  if (!session) {
    row('Signed in?', 'NO SESSION — you are not actually logged in on this page', 'bad');
    render();
    return;
  }
  row('Signed in?', 'yes', 'ok');
  row('Your user id', session.user.id);
  row('Your email', session.user.email || '(none on token)');
  const exp = session.expires_at ? new Date(session.expires_at * 1000) : null;
  row('Token expires', exp ? exp.toLocaleString() + (exp < new Date() ? '  ← EXPIRED' : '  (valid)') : 'unknown',
      exp && exp < new Date() ? 'bad' : 'ok');

  // 3) getUser (validates token against server)
  const { data: ud, error: uerr } = await sb.auth.getUser();
  row('Server says token is valid?', uerr ? ('NO — ' + uerr.message) : 'yes', uerr ? 'bad' : 'ok');

  // 4) read my profile
  const { data: prof, error: perr } = await sb.from('profiles').select('id,email,is_admin,program').eq('id', session.user.id).maybeSingle();
  if (perr) row('Read my profile row', 'ERROR — ' + perr.message, 'bad');
  else if (!prof) row('Read my profile row', 'EMPTY — no row returned (token not accepted by the database)', 'bad');
  else {
    row('Read my profile row', 'found', 'ok');
    row('profiles.is_admin', String(prof.is_admin), prof.is_admin ? 'ok' : 'bad');
    row('profiles.email', prof.email || '(blank)');
  }

  // 5) authoritative admin check via RPC
  const { data: rpcAdmin, error: rerr } = await sb.rpc('is_pda_admin');
  row('Database is_pda_admin() says', rerr ? ('ERROR — ' + rerr.message) : String(rpcAdmin), rpcAdmin === true ? 'ok' : 'bad');

  // verdict
  const isAdmin = (prof && prof.is_admin === true) || rpcAdmin === true;
  row('➡ VERDICT', isAdmin ? 'You ARE recognized as an admin. The dashboard should show the office panel.'
                            : 'You are NOT being recognized as an admin in this browser.', isAdmin ? 'ok' : 'bad');
  render();

  function render(){ out.innerHTML = rows.join(''); }

  document.getElementById('fix').onclick = async () => {
    try { await sb.auth.refreshSession(); } catch(e){}
    location.reload();
  };
  document.getElementById('hardfix').onclick = async () => {
    try { await sb.auth.signOut(); } catch(e){}
    try {
      Object.keys(localStorage).filter(k=>/-auth-token$/.test(k)).forEach(k=>localStorage.removeItem(k));
      Object.keys(sessionStorage).filter(k=>/-auth-token$/.test(k)).forEach(k=>sessionStorage.removeItem(k));
    } catch(e){}
    location.href = '/login';
  };
})();
</script>
</body>
</html>

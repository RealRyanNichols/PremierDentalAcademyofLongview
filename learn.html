    </nav>
  </div>
  <div id="view"></div>
</main>

<script>
(function () {
  'use strict';
  var SB_URL = 'https://lmbsuwslsycukynzpzik.supabase.co';
  var SB_KEY = 'sb_publishable_vzuQZbkmj-UsYZVs5Zqw9w_c8PiOfbh';
  var sb = window.supabase.createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true } });
  var view = document.getElementById('view');
  var access = null, uid = null;

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]; }); }
  function qp() { return new URLSearchParams(location.search); }

  // Which courses can this person open?
  function entitledToCourse(c) {
    if (access.is_admin) return true;
    if (c.entitlement_flag === 'career_vault') return access.career_vault === true;
    if (c.entitlement_flag === 'online_program') return !!access.enrolled;
    // No/unknown flag = open to any enrolled member.
    return !!access.enrolled;
  }

  function youtubeId(url) {
    if (!url) return null;
    var m = /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([\w-]{11})/.exec(url);
    return m ? m[1] : null;
  }

  // ---- Data ----
  async function loadCourses() {
    var q = sb.from('courses').select('id,slug,title,description,entitlement_flag,active,sort').order('sort');
    var r = await q;
    return (r.data || []);
  }
  async function loadOutline(slug) {
    var cr = await sb.from('courses').select('*').eq('slug', slug).maybeSingle();
    if (!cr.data) return null;
    var mods = await sb.from('course_modules').select('id,module_number,title,subtitle,sort').eq('course_id', cr.data.id).order('sort');
    var modList = mods.data || [];
    var ids = modList.map(function (m) { return m.id; });
    var lessons = ids.length
      ? (await sb.from('course_lessons').select('id,module_id,lesson_number,title,overview,lesson_type,video_url,mux_playback_id,sort,active,estimated_minutes').in('module_id', ids).order('sort')).data || []
      : [];
    return { course: cr.data, modules: modList, lessons: lessons };
  }
  async function loadProgress() {
    if (!uid) return {};
    var r = await sb.from('module_progress').select('module_number,lesson_number,completed_at,quiz_score').eq('student_id', uid);
    var map = {};
    (r.data || []).forEach(function (row) { if (row.completed_at) map[row.module_number + ':' + row.lesson_number] = row; });
    return map;
  }

  // ---- Views ----
  async function renderCatalog() {
    var courses = await loadCourses();
    var mine = courses.filter(entitledToCourse);
    var name = (access.email || 'student').split('@')[0];
    var html = '' +
      '<header class="bg-gradient-to-br from-[#0a1226] to-[#0f2a33] text-white rounded-3xl px-6 sm:px-10 py-8 sm:py-10 mb-8">' +
        '<p class="text-xs uppercase tracking-widest text-teal-300 font-bold">Your Courses</p>' +
        '<h1 class="display text-3xl sm:text-4xl font-extrabold mt-2">Welcome back, <span class="gradient-text">' + esc(name) + '</span> 👋</h1>' +
        '<p class="text-slate-300 mt-2 max-w-xl">Pick up where you left off. Every lesson you complete shows up on your dashboard.</p>' +
      '</header>';

    if (!mine.length) {
      html += '<div class="bg-white rounded-2xl border border-slate-200 p-8 text-center">' +
        '<div class="text-4xl mb-3">📚</div>' +
        '<h2 class="display text-xl font-bold">No courses on your account yet</h2>' +
        '<p class="text-slate-500 mt-2 text-sm">Once you enroll, your program appears here automatically.</p>' +
        '<div class="mt-5 flex flex-wrap gap-3 justify-center">' +
          '<a href="/enroll" class="bg-teal-700 hover:bg-teal-800 text-white font-semibold px-5 py-2.5 rounded-full text-sm">See enrollment options</a>' +
          '<a href="/dashboard" class="border border-slate-300 hover:border-teal-500 font-semibold px-5 py-2.5 rounded-full text-sm">Go to dashboard</a>' +
        '</div></div>';
      view.innerHTML = html;
      return;
    }

    html += '<div class="grid sm:grid-cols-2 gap-5">';
    mine.forEach(function (c) {
      var draft = c.active === false ? '<span class="ml-2 text-[11px] uppercase tracking-wide bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">Draft</span>' : '';
      html += '<a href="/learn?c=' + encodeURIComponent(c.slug) + '" class="card bg-white rounded-2xl border border-slate-200 hover:border-teal-500 hover:shadow-lg p-6 block">' +
        '<div class="w-11 h-11 rounded-xl bg-teal-50 grid place-items-center text-2xl mb-3">🎓</div>' +
        '<h3 class="font-bold text-slate-900 leading-snug">' + esc(c.title) + draft + '</h3>' +
        '<p class="text-sm text-slate-500 mt-1 line-clamp-3">' + esc(c.description || '') + '</p>' +
        '<span class="inline-block mt-4 text-teal-700 text-sm font-semibold">Open course →</span>' +
      '</a>';
    });
    html += '</div>';
    view.innerHTML = html;
  }

  async function renderOutline(slug) {
    var data = await loadOutline(slug);
    if (!data) { view.innerHTML = notFound(); return; }
    if (!entitledToCourse(data.course)) { view.innerHTML = locked(data.course); return; }
    var progress = await loadProgress();

    var byModule = {};
    data.lessons.forEach(function (l) { (byModule[l.module_id] = byModule[l.module_id] || []).push(l); });

    var total = 0, done = 0, resume = null;
    data.modules.forEach(function (m) {
      (byModule[m.id] || []).forEach(function (l) {
        if (l.active === false && !access.is_admin) return;
        total++;
        var completed = !!progress[m.module_number + ':' + l.lesson_number];
        if (completed) done++; else if (!resume) resume = { m: m.module_number, l: l.lesson_number };
      });
    });
    var pct = total ? Math.round(done / total * 100) : 0;

    var html = '' +
      '<a href="/learn" class="text-sm text-slate-500 hover:text-teal-700">← All courses</a>' +
      '<div class="mt-3 bg-white rounded-2xl border border-slate-200 p-6 sm:p-8">' +
        '<h1 class="display text-2xl sm:text-3xl font-extrabold">' + esc(data.course.title) + '</h1>' +
        (data.course.description ? '<p class="text-slate-500 mt-2 max-w-2xl">' + esc(data.course.description) + '</p>' : '') +
        '<div class="mt-5 flex items-center gap-4">' +
          '<div class="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-teal-500" style="width:' + pct + '%"></div></div>' +
          '<div class="text-sm font-semibold text-slate-700 whitespace-nowrap">' + done + ' / ' + total + ' done</div>' +
        '</div>' +
        (resume
          ? '<a href="/learn?c=' + encodeURIComponent(slug) + '&m=' + resume.m + '&l=' + resume.l + '" class="inline-block mt-5 bg-teal-700 hover:bg-teal-800 text-white font-semibold px-5 py-2.5 rounded-full text-sm">' + (done ? 'Resume' : 'Start') + ' course →</a>'
          : '<div class="mt-5 flex items-center gap-3 flex-wrap"><p class="text-teal-700 font-semibold text-sm">🎉 Course complete!</p>' +
            (data.course.cert_enabled !== false ? '<a href="/certificate?c=' + encodeURIComponent(slug) + '" class="bg-amber-500 hover:bg-amber-600 text-white font-semibold px-5 py-2.5 rounded-full text-sm">🎓 Get my certificate →</a>' : '') + '</div>') +
      '</div>';

    data.modules.forEach(function (m) {
      var ls = (byModule[m.id] || []).filter(function (l) { return access.is_admin || l.active !== false; });
      if (!ls.length && !access.is_admin) return;
      html += '<section class="mt-6">' +
        '<h2 class="font-bold text-slate-900 flex items-baseline gap-2"><span class="text-teal-600">Module ' + esc(m.module_number) + '</span> ' + esc(m.title) + '</h2>' +
        (m.subtitle ? '<p class="text-sm text-slate-500">' + esc(m.subtitle) + '</p>' : '') +
        '<div class="mt-3 bg-white rounded-2xl border border-slate-200 divide-y divide-slate-100 overflow-hidden">';
      ls.forEach(function (l) {
        var completed = !!progress[m.module_number + ':' + l.lesson_number];
        var lt = l.lesson_type, hasVid = (youtubeId(l.video_url) || l.mux_playback_id) && lt !== 'quiz', sa = 'stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"'; var icon = completed ? '<svg width="20" height="20" viewBox="0 0 24 24" class="text-teal-600"><circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.15"/><path d="M8 12.5l2.5 2.5 5-5.5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>' : (lt === 'quiz' ? '<svg width="20" height="20" viewBox="0 0 24 24" class="text-violet-500"><rect x="5" y="3" width="14" height="18" rx="2" '+sa+'/><path d="M9 8h6M9 12h6M9 16h3" '+sa+'/></svg>' : (lt === 'feedback' ? '<svg width="20" height="20" viewBox="0 0 24 24" class="text-amber-500"><path d="M21 11.5a8 8 0 01-11.9 7L4 20l1.5-4.6A8 8 0 1121 11.5z" '+sa+'/></svg>' : (lt === 'live' ? '<svg width="20" height="20" viewBox="0 0 24 24" class="text-rose-500"><rect x="3" y="6" width="13" height="12" rx="2" '+sa+'/><path d="M16 10l5-3v10l-5-3" '+sa+'/></svg>' : '<svg width="20" height="20" viewBox="0 0 24 24" class="text-slate-400"><path d="M7 3h8l4 4v13a1 1 0 01-1 1H7a1 1 0 01-1-1V4a1 1 0 011-1z" '+sa+'/><path d="M15 3v4h4M9 12.5h6M9 16h4" '+sa+'/></svg>'))); var typeLabel = lt === 'quiz' ? 'Quiz' : (lt === 'feedback' ? 'Reflection' : (lt === 'live' ? 'Live session' : 'Reading')); var meta = '<span class="hidden sm:flex items-center gap-2 ml-2 shrink-0"><span class="text-[11px] text-slate-400 whitespace-nowrap">' + typeLabel + (l.estimated_minutes ? ' · ' + l.estimated_minutes + ' min' : '') + '</span>' + (hasVid ? '<span class="inline-flex items-center gap-0.5 text-[10px] font-semibold text-teal-700 bg-teal-50 border border-teal-100 rounded-full px-1.5 py-0.5"><svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Video</span>' : '') + '</span>';
        html += '<a href="/learn?c=' + encodeURIComponent(slug) + '&m=' + m.module_number + '&l=' + l.lesson_number + '" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-50">' +
          '<span class="w-6 shrink-0 flex items-center justify-center">' + icon + '</span>' +
          '<span class="flex-1 text-sm ' + (completed ? 'text-slate-500' : 'text-slate-800 font-medium') + '">' + esc(l.title) + '</span>' + meta +
          (l.active === false ? '<span class="text-[10px] uppercase bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded">draft</span>' : '') +
        '</a>';
      });
      html += '</div></section>';
    });
    view.innerHTML = html;
  }

  async function renderLesson(slug, mNum, lNum) {
    var data = await loadOutline(slug);
    if (!data) { view.innerHTML = notFound(); return; }
    if (!entitledToCourse(data.course)) { view.innerHTML = locked(data.course); return; }

    // Flatten in outline order for prev/next.
    var flat = [];
    data.modules.forEach(function (m) {
      data.lessons.filter(function (l) { return l.module_id === m.id && (access.is_admin || l.active !== false); })
        .sort(function (a, b) { return a.sort - b.sort; })
        .forEach(function (l) { flat.push({ m: m, l: l }); });
    });
    var idx = flat.findIndex(function (x) { return x.m.module_number === mNum && x.l.lesson_number === lNum; });
    if (idx < 0) { view.innerHTML = notFound(); return; }
    var cur = flat[idx], prev = flat[idx - 1], next = flat[idx + 1];

    // Full lesson row (needs content_html, tool_url, quiz_json).
    var full = (await sb.from('course_lessons').select('*').eq('id', cur.l.id).maybeSingle()).data || cur.l;
    var progress = await loadProgress();
    var completed = !!progress[mNum + ':' + lNum];

    var media = '';
    var yt = youtubeId(full.video_url);
    if (yt) {
      media = '<div class="aspect-video-box rounded-xl overflow-hidden bg-black mb-5"><iframe src="https://www.youtube-nocookie.com/embed/' + yt + '" title="Lesson video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen frameborder="0"></iframe></div>';
    } else if (full.mux_playback_id) {
      media = '<div class="rounded-xl overflow-hidden bg-black mb-5"><mux-player playback-id="' + esc(full.mux_playback_id) + '" stream-type="on-demand" style="width:100%;aspect-ratio:16/9;--controls:auto"></mux-player></div>';
      if (!document.getElementById('mux-player-js')) {
        var s = document.createElement('script'); s.id = 'mux-player-js'; s.src = 'https://cdn.jsdelivr.net/npm/@mux/mux-player'; document.head.appendChild(s);
      }
    } else if (full.video_url) {
      var vsrc = String(full.video_url).trim();
      if (/^</.test(vsrc) || /<iframe|<video|<script|<div/i.test(vsrc)) {
        // Admin pasted a full embed code (Vimeo, Wistia, Loom, etc.) — render as-is (admin-authored, trusted).
        media = '<div class="video-embed rounded-xl overflow-hidden bg-black mb-5">' + vsrc + '</div>';
      } else if (/\.(mp4|webm|ogg|mov)(\?|#|$)/i.test(vsrc)) {
        // Direct uploaded / hosted video file.
        media = '<div class="rounded-xl overflow-hidden bg-black mb-5"><video src="' + esc(vsrc) + '" controls playsinline preload="metadata" style="width:100%;aspect-ratio:16/9;background:#000"></video></div>';
      } else {
        // Any other link (Vimeo, Wistia, Loom, etc.) — embed via iframe.
        media = '<div class="aspect-video-box rounded-xl overflow-hidden bg-black mb-5"><iframe src="' + esc(vsrc) + '" title="Lesson video" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen frameborder="0"></iframe></div>';
      }
    }

    var tool = full.tool_url ? '<a href="' + esc(full.tool_url) + '" class="card inline-flex items-center gap-3 bg-teal-50 border border-teal-200 rounded-xl px-4 py-3 mt-4 text-teal-800 font-semibold text-sm">🧰 ' + esc(full.tool_label || 'Open the trainer') + ' →</a>' : '';

    // Downloads (Kajabi parity): private course-assets files, opened via signed URLs.
    var att = Array.isArray(full.attachments) ? full.attachments : [];
    var attHtml = att.length ? '<div class="mt-4 space-y-2">' + att.map(function (a, ai) {
      return '<button data-att="' + ai + '" class="att-btn card w-full sm:w-auto inline-flex items-center gap-3 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-amber-900 font-semibold text-sm text-left">📖 ' + esc(a.label || 'Download') + ' <span class="text-amber-500">↓</span></button>';
    }).join('') + '</div>' : '';

    var html = '' +
      '<a href="/learn?c=' + encodeURIComponent(slug) + '" class="text-sm text-slate-500 hover:text-teal-700">← ' + esc(data.course.title) + '</a>' +
      '<article class="mt-3 bg-white rounded-2xl border border-slate-200 p-6 sm:p-8">' +
        '<p class="text-xs uppercase tracking-widest text-teal-600 font-bold">Module ' + esc(mNum) + ' · Lesson ' + esc(lNum) + '</p>' +
        '<h1 class="display text-2xl sm:text-3xl font-extrabold mt-1">' + esc(full.title) + '</h1>' +
        (full.overview ? '<p class="text-slate-500 mt-2">' + esc(full.overview) + '</p>' : '') +
        '<div class="mt-5">' + media + '</div>' +
        (full.content_html ? '<div class="lesson-body text-slate-700">' + full.content_html + '</div>' : (!media && !full.overview ? '<p class="text-slate-400 text-sm italic">Lesson content is being added.</p>' : '')) +
        tool + attHtml +
        '<div id="pda-interactive"></div>' +
        '<div id="pda-practice"></div>' +
        '<div id="quiz"></div>' +
        '<div id="pda-extras"></div>' +
        '<div class="mt-8 flex items-center gap-3 flex-wrap">' +
          '<button id="complete-btn" class="' + (completed ? 'bg-teal-100 text-teal-800' : 'bg-teal-700 hover:bg-teal-800 text-white') + ' font-semibold px-5 py-2.5 rounded-full text-sm">' + (completed ? '✓ Completed' : 'Mark complete') + '</button>' +
          (next ? '<a href="/learn?c=' + encodeURIComponent(slug) + '&m=' + next.m.module_number + '&l=' + next.l.lesson_number + '" class="border border-slate-300 hover:border-teal-500 font-semibold px-5 py-2.5 rounded-full text-sm">Next lesson →</a>' : '') +
        '</div>' +
      '</article>' +
      '<div class="mt-4 flex justify-between text-sm">' +
        (prev ? '<a href="/learn?c=' + encodeURIComponent(slug) + '&m=' + prev.m.module_number + '&l=' + prev.l.lesson_number + '" class="text-slate-500 hover:text-teal-700">← ' + esc(prev.l.title) + '</a>' : '<span></span>') +
        (next ? '<a href="/learn?c=' + encodeURIComponent(slug) + '&m=' + next.m.module_number + '&l=' + next.l.lesson_number + '" class="text-slate-500 hover:text-teal-700 text-right">' + esc(next.l.title) + ' →</a>' : '<span></span>') +
      '</div>';
    view.innerHTML = html;

    renderQuiz(full, mNum, lNum, slug);
    renderInteractive(full);
    renderPractice(full);
    renderExtras(full, mNum, lNum, slug);
    document.getElementById('complete-btn').addEventListener('click', function () { markComplete(mNum, lNum, null, next, slug); });
    Array.prototype.forEach.call(document.querySelectorAll('.att-btn'), function (b) {
      b.addEventListener('click', async function () {
        var a = att[Number(b.getAttribute('data-att'))];
        if (a && a.url) { window.open(a.url, '_blank'); return; }
        if (!a || !a.path) return;
        b.disabled = true; var old = b.innerHTML; b.innerHTML = 'Opening…';
        try {
          var r = await sb.storage.from('course-assets').createSignedUrl(a.path, 3600);
          if (r.data && r.data.signedUrl) window.open(r.data.signedUrl, '_blank');
          else alert('Could not open this file — text (903) 913-6444 and we\'ll send it to you.');
        } catch (e) { alert('Could not open this file — text (903) 913-6444.'); }
        b.disabled = false; b.innerHTML = old;
      });
    });
  }

  // Gated one-attempt quiz. One try, auto-graded, correct answers shown.
  // Pass (>= quiz_pass_pct, default 80) completes the lesson. Fail LOCKS the quiz
  // (DB trigger notifies the instructor) until an admin reopens it. All server-side
  // via quiz_attempts insert (RLS + trigger handle gating, alerts, best score).
  async function renderQuiz(lesson, mNum, lNum, slug) {
    var quiz = lesson.quiz_json;
    if (!quiz || !Array.isArray(quiz) || !quiz.length) return;
    var box = document.getElementById('quiz');
    var passPct = lesson.quiz_pass_pct || 80;
    var st = (await sb.from('quiz_status').select('state,best_score').eq('student_id', uid).eq('lesson_id', lesson.id).maybeSingle()).data;
    var last = (await sb.from('quiz_attempts').select('answers,score_pct').eq('student_id', uid).eq('lesson_id', lesson.id).order('created_at', { ascending: false }).limit(1).maybeSingle()).data;
    var state = st ? st.state : 'open';

      { n: 'Spoon excavator', u: 'A small rounded scoop used to remove soft decay and temporary cement by hand.', svg: '<line x1="12" y1="50" x2="38" y2="22" stroke="#64748b" stroke-width="4" stroke-linecap="round"/><circle cx="43" cy="17" r="6" fill="none" stroke="#334155" stroke-width="3"/>' },
      { n: 'Elevator', u: 'Loosens and lifts a tooth from its socket before an extraction — part of the oral surgery setup.', svg: '<line x1="12" y1="50" x2="40" y2="20" stroke="#64748b" stroke-width="5" stroke-linecap="round"/><path d="M40,20 l9,-4 -2,9 z" fill="#334155"/>' },
      { n: 'Extraction forceps', u: 'Beaked pliers shaped to grasp a specific tooth and remove it — part of the oral surgery setup.', svg: '<path d="M16,52 L32,28" stroke="#64748b" stroke-width="4" stroke-linecap="round"/><path d="M24,52 L36,30" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/><path d="M32,28 L44,14 M36,30 L48,20" stroke="#334155" stroke-width="3" stroke-linecap="round"/>' }
    ];
    var grid = '<div class="grid grid-cols-2 sm:grid-cols-3 gap-2">';
    items.forEach(function (it, idx) {
      grid += '<button data-i="' + idx + '" class="ii rounded-xl border border-slate-200 bg-white p-2 text-center hover:border-teal-400"><svg viewBox="0 0 60 60" class="mx-auto" style="width:52px;height:52px">' + it.svg + '</svg><span class="mt-1 block text-xs font-semibold text-slate-700">' + esc(it.n) + '</span></button>';
    });
    grid += '</div>';
    body.innerHTML = grid + '<div id="ii-out" class="mt-3"></div>';
    var out = body.querySelector('#ii-out');
    Array.prototype.forEach.call(body.querySelectorAll('.ii'), function (b) {
      b.onclick = function () {
        Array.prototype.forEach.call(body.querySelectorAll('.ii'), function (x) { x.className = 'ii rounded-xl border border-slate-200 bg-white p-2 text-center hover:border-teal-400'; });
        b.className = 'ii rounded-xl border-2 border-teal-500 bg-teal-50 p-2 text-center';
        var it = items[+b.getAttribute('data-i')];
        out.innerHTML = '<div class="rounded-xl bg-slate-50 p-4"><p class="font-bold text-slate-900">' + esc(it.n) + '</p><p class="mt-1 text-sm text-slate-600">' + esc(it.u) + '</p></div>';
      };
    });
  }
  // ---- Radiograph positioning (Ch 41 Intraoral Imaging) ----
  function widgetRadiographyPositioning(host) {
    var body = wShell(host, 'In the paralleling technique the sensor sits parallel to the tooth and the X-ray beam meets both at a right angle. Aim off and the image comes out the wrong length — slide the beam angle to see it distort.');
    body.innerHTML =
      '<div class="grid sm:grid-cols-2 gap-4 items-center">' +
        '<div><svg id="rp-svg" viewBox="0 0 200 200" class="mx-auto block" style="max-width:210px"></svg></div>' +
        '<div>' +
          '<label class="text-sm font-semibold text-slate-700">Beam angle</label>' +
          '<input id="rp-range" type="range" min="-10" max="10" value="0" step="1" class="w-full mt-2" style="accent-color:#0d9488">' +
          '<div class="flex justify-between text-[11px] text-slate-400"><span>too flat</span><span>aligned</span><span>too steep</span></div>' +
          '<div id="rp-out" class="mt-3"></div>' +
        '</div>' +
      '</div>' +
      '<p class="mt-3 text-xs text-slate-400">Always follow ALARA — as low as reasonably achievable. Every patient wears a lead apron with a thyroid collar, and you use the lowest diagnostic exposure.</p>';
    var svg = body.querySelector('#rp-svg'), range = body.querySelector('#rp-range'), out = body.querySelector('#rp-out');
    function draw() {
      var a = +range.value;
      var ideal = Math.abs(a) <= 2;
      var trueLen = 120;
      var imgLen = Math.round(trueLen * (1 - a * 0.05));
      var color = ideal ? '#0f766e' : '#dc2626';
      var beamAngle = a * 3;
      var s = '';
      s += '<rect x="70" y="40" width="20" height="' + trueLen + '" rx="8" fill="#eef2f7" stroke="#cbd5e1"/>';
      s += '<line x1="98" y1="40" x2="98" y2="' + (40 + trueLen) + '" stroke="#0d9488" stroke-width="3" stroke-dasharray="4 3"/>';
      s += '<text x="98" y="' + (40 + trueLen + 13) + '" font-size="9" fill="#0d9488" text-anchor="middle">sensor</text>';
      s += '<g transform="rotate(' + beamAngle + ' 150 100)"><line x1="150" y1="100" x2="100" y2="100" stroke="' + color + '" stroke-width="3"/><path d="M104,96 L96,100 L104,104 Z" fill="' + color + '"/></g>';
      s += '<text x="150" y="30" font-size="9" fill="#64748b" text-anchor="middle">beam</text>';
      s += '<rect x="20" y="' + (100 - imgLen / 2) + '" width="10" height="' + imgLen + '" rx="4" fill="' + color + '"/>';
      s += '<text x="25" y="' + (100 + imgLen / 2 + 12) + '" font-size="9" fill="' + color + '" text-anchor="middle">image</text>';
      svg.innerHTML = s;
      var band = ideal ? 'Accurate length ✓' : (a > 2 ? 'Foreshortened — image too short' : 'Elongated — image too long');
      var msg = ideal ? 'Beam perpendicular to the parallel sensor and tooth — the image length matches the real tooth. This is the goal of the paralleling technique.'
        : (a > 2 ? 'Too much vertical angle squashes the image shorter than the real tooth (foreshortening). Flatten the beam back toward parallel.'
          : 'Too little vertical angle stretches the image longer than the real tooth (elongation). Steepen the beam toward the paralleling position.');
      out.innerHTML = '<div class="rounded-xl p-3" style="background:' + (ideal ? '#f0fdfa' : '#fef2f2') + '"><p class="font-bold" style="color:' + color + '">' + band + '</p><p class="mt-1 text-sm text-slate-600">' + msg + '</p></div>';
    }
    range.addEventListener('input', draw);
    draw();
  }

  // Ungraded practice check. Multiple choice, shows right/wrong instantly, but
  // NEVER gates progress — the graded Knowledge Check is separate. (Per Amanda.)
  function renderPractice(lesson) {
    var host = document.getElementById('pda-practice');
    var pr = lesson.practice_json;
    if (!host || !pr || !Array.isArray(pr) || !pr.length) return;
    var h = '<section class="mt-8 bg-white rounded-2xl border border-slate-200 p-5 sm:p-6"><div class="flex items-center justify-between"><h2 class="font-bold text-slate-900">Check your understanding</h2><span class="text-xs text-slate-400 font-semibold">Practice · not graded</span></div><p class="text-sm text-slate-500 mt-1">Try these to test yourself. They don\'t count toward your grade and won\'t hold you back — the graded quiz is below.</p><div class="mt-4 space-y-5">';
    pr.forEach(function (q, qi) {
      h += '<div><p class="font-semibold text-slate-800 text-sm">' + (qi + 1) + '. ' + esc(q.question) + '</p><div class="mt-2 space-y-1.5" data-pq="' + qi + '">';
      (q.choices || []).forEach(function (ch, ci) {
        h += '<button class="pp-opt w-full text-left flex items-center gap-2 text-sm text-slate-700 border border-slate-200 rounded-lg px-3 py-2 hover:bg-slate-50" data-q="' + qi + '" data-c="' + ci + '">' + esc(ch) + '</button>';
      });
      h += '</div><p class="pp-fb text-xs mt-1.5 hidden" data-fb="' + qi + '"></p></div>';
    });
    h += '</div></section>';
    host.innerHTML = h;
    Array.prototype.forEach.call(host.querySelectorAll('.pp-opt'), function (b) {
      b.onclick = function () {
        var qi = Number(b.getAttribute('data-q')), ci = Number(b.getAttribute('data-c'));
        var q = pr[qi];
        var ok = ci === Number(q.correct_index);
        var group = host.querySelector('[data-pq="' + qi + '"]');
        Array.prototype.forEach.call(group.querySelectorAll('.pp-opt'), function (x) {
          var xc = Number(x.getAttribute('data-c'));
          x.className = 'pp-opt w-full text-left flex items-center gap-2 text-sm border rounded-lg px-3 py-2 ' +
            (xc === Number(q.correct_index) ? 'border-teal-400 bg-teal-50 text-teal-800' : (x === b ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-slate-200 text-slate-400'));
          x.disabled = true;
        });
        var fb = host.querySelector('[data-fb="' + qi + '"]');
        fb.className = 'pp-fb text-xs mt-1.5 ' + (ok ? 'text-teal-700' : 'text-rose-600');
        fb.textContent = (ok ? '✓ Correct. ' : '✗ Not quite. ') + (q.explanation || '');
        fb.classList.remove('hidden');
      };
    });
  }

  // Extras: end-of-week feedback form (required) OR the Ask-a-question tutor.
  function renderExtras(lesson, mNum, lNum, slug) {
    var host = document.getElementById('pda-extras');
    if (!host) return;
    if (lesson.lesson_type === 'feedback') return renderFeedback(host, slug, mNum);
    if (lesson.lesson_type === 'lesson') return renderTutor(host, lesson);
  }
  async function renderFeedback(host, slug, mNum) {
    var existing = (await sb.from('week_feedback').select('overall_rating').eq('student_id', uid).eq('course_slug', slug).eq('module_number', mNum).maybeSingle()).data;
    if (existing) { host.innerHTML = '<div class="mt-6 rounded-2xl border-2 border-teal-200 bg-teal-50 p-6"><h3 class="font-bold text-teal-800 text-lg">Thank you — week complete ✓</h3><p class="text-sm text-slate-600 mt-1">Your feedback helps us make this better for every student after you.</p></div>'; return; }
    function stars(id) { var h = '<div data-stars="' + id + '">'; for (var s = 1; s <= 5; s++) h += '<button type="button" data-v="' + s + '" class="star text-2xl text-slate-300">&#9733;</button>'; return h + '</div>'; }
    host.innerHTML = '<div class="mt-6 rounded-2xl border border-slate-200 bg-white p-6"><h3 class="display text-xl font-extrabold">Before you finish this week</h3><p class="text-sm text-slate-500 mt-1 mb-4">Two minutes, and it is required to close out the week. Be honest — it shapes what we build next.</p>' +
      '<p class="text-sm font-bold text-slate-700">How was this week overall?</p>' + stars('overall') +
      '<p class="text-sm font-bold text-slate-700 mt-3">How clear were the lessons?</p>' + stars('clarity') +
      '<p class="text-sm font-bold text-slate-700 mt-3">The pace was…</p><div id="fb-pace" class="flex gap-2 mt-1">' +
      ['too_slow:Too slow', 'just_right:Just right', 'too_fast:Too fast'].map(function (p) { var a = p.split(':'); return '<button type="button" data-p="' + a[0] + '" class="pace rounded-lg border border-slate-300 px-4 py-2 text-sm font-bold text-slate-600">' + a[1] + '</button>'; }).join('') + '</div>' +
      '<p class="text-sm font-bold text-slate-700 mt-3">What clicked for you?</p><textarea id="fb-helped" rows="2" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></textarea>' +
      '<p class="text-sm font-bold text-slate-700 mt-3">What confused you or needs more explaining?</p><textarea id="fb-confused" rows="2" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="This tells your instructor exactly what to review with you."></textarea>' +
      '<label class="flex items-start gap-2 text-sm text-slate-600 mt-3"><input type="checkbox" id="fb-testi" class="mt-0.5"> <span>Premier can share my kind words as a testimonial to help future students (optional).</span></label>' +
      '<button id="fb-submit" class="mt-5 bg-slate-800 hover:bg-slate-900 text-white font-semibold px-6 py-2.5 rounded-full text-sm">Submit &amp; complete the week</button></div>';
    var picked = { overall: 0, clarity: 0, pace: '' };
    Array.prototype.forEach.call(host.querySelectorAll('[data-stars]'), function (grp) {
      var id = grp.getAttribute('data-stars');
      Array.prototype.forEach.call(grp.querySelectorAll('.star'), function (b) {
        b.onclick = function () { picked[id] = Number(b.getAttribute('data-v')); Array.prototype.forEach.call(grp.querySelectorAll('.star'), function (x, xi) { x.className = 'star text-2xl ' + (xi < picked[id] ? 'text-amber-400' : 'text-slate-300'); }); };
      });
    });
    Array.prototype.forEach.call(host.querySelectorAll('.pace'), function (b) {
      b.onclick = function () { picked.pace = b.getAttribute('data-p'); Array.prototype.forEach.call(host.querySelectorAll('.pace'), function (x) { x.className = 'pace rounded-lg border px-4 py-2 text-sm font-bold ' + (x === b ? 'border-teal-500 bg-teal-50 text-teal-700' : 'border-slate-300 text-slate-600'); }); };
    });
    host.querySelector('#fb-submit').onclick = async function () {
      if (!picked.overall || !picked.clarity || !picked.pace) { alert('Please rate the week, the clarity, and the pace.'); return; }
      var testi = host.querySelector('#fb-testi').checked;
      var helped = host.querySelector('#fb-helped').value;
      var row = { student_id: uid, course_slug: slug, module_number: mNum, overall_rating: picked.overall, clarity_rating: picked.clarity, pace: picked.pace, what_helped: helped || null, what_confused: host.querySelector('#fb-confused').value || null, suggestions: (testi && helped ? '[TESTIMONIAL OK] ' : '') };
      var r = await sb.from('week_feedback').upsert(row, { onConflict: 'student_id,course_slug,module_number' });
      if (r.error) { alert('Could not save: ' + r.error.message); return; }
      markComplete(mNum, lNum, null, null, null, true);
      host.innerHTML = '<div class="mt-6 rounded-2xl border-2 border-teal-200 bg-teal-50 p-6"><h3 class="font-bold text-teal-800 text-lg">Thank you — week complete ✓</h3></div>';
    };
  }
  function renderTutor(host, lesson) {
    host.innerHTML = '<div class="mt-8 rounded-2xl border border-slate-200 bg-white p-5"><div class="flex items-center gap-2 mb-1"><span class="text-lg">&#128172;</span><h3 class="font-bold text-slate-900">Don&#39;t understand something? Ask.</h3></div><p class="text-sm text-slate-500 mb-3">Ask about anything in this lesson and get a plain-English answer. Your instructor sees these too.</p><div class="flex gap-2"><input id="tutor-q" class="flex-1 rounded-lg border border-slate-300 px-4 py-2.5 text-sm" placeholder="e.g. What is the difference between gingivitis and periodontitis?"><button id="tutor-ask" class="bg-teal-700 hover:bg-teal-800 text-white font-semibold px-5 py-2.5 rounded-lg text-sm">Ask</button></div><div id="tutor-a" class="mt-4 hidden rounded-xl bg-slate-50 p-4 text-sm text-slate-700 whitespace-pre-wrap"></div></div>';
    var input = host.querySelector('#tutor-q'), btn = host.querySelector('#tutor-ask'), ans = host.querySelector('#tutor-a');
    var lessonText = (lesson.content_html || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').slice(0, 4000);
    async function ask() {
      var question = (input.value || '').trim(); if (!question) return;
      btn.disabled = true; btn.textContent = 'Thinking…';
      try {
        var r = await fetch('/api/tutor', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ question: question, lessonTitle: lesson.title, lessonText: lessonText }) });
        var d = await r.json();
        ans.textContent = d.answer || 'Please ask your instructor.'; ans.classList.remove('hidden');
        sb.from('tutor_questions').insert({ student_id: uid, lesson_id: lesson.id, lesson_title: lesson.title, question: question, answer: d.answer || null });
      } catch (e) { ans.textContent = 'Could not reach the tutor — try again or ask your instructor.'; ans.classList.remove('hidden'); }
      btn.disabled = false; btn.textContent = 'Ask';
    }
    btn.onclick = ask;
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') ask(); });
  }

  async function markComplete(mNum, lNum, quizScore, next, slug, silent) {
    if (!uid) return;
    var row = { student_id: uid, module_number: mNum, lesson_number: lNum, completed_at: new Date().toISOString() };
    if (quizScore != null) row.quiz_score = quizScore;
    try {
      await sb.from('module_progress').upsert(row, { onConflict: 'student_id,module_number,lesson_number' });
      if (!silent) {
        var btn = document.getElementById('complete-btn');
        if (btn) { btn.textContent = '✓ Completed'; btn.className = 'bg-teal-100 text-teal-800 font-semibold px-5 py-2.5 rounded-full text-sm'; }
      }
    } catch (e) { if (!silent) alert('Could not save progress: ' + e.message); }
  }

  function notFound() { return '<div class="bg-white rounded-2xl border border-slate-200 p-8 text-center"><div class="text-4xl mb-3">🔍</div><h2 class="display text-xl font-bold">Course not found</h2><a href="/learn" class="inline-block mt-4 text-teal-700 font-semibold">← Back to my courses</a></div>'; }
  function locked(course) {
    var buy = course.entitlement_flag === 'career_vault' ? '/career-vault' : '/enroll';
    return '<div class="bg-white rounded-2xl border border-slate-200 p-8 text-center"><div class="text-4xl mb-3">🔒</div><h2 class="display text-xl font-bold">This course isn\'t on your account yet</h2><p class="text-slate-500 mt-2 text-sm">' + esc(course.title) + ' is available once you have access.</p><a href="' + buy + '" class="inline-block mt-4 bg-teal-700 hover:bg-teal-800 text-white font-semibold px-5 py-2.5 rounded-full text-sm">Get access →</a></div>';
  }

  function route() {
    var p = qp();
    var c = p.get('c'), m = p.get('m'), l = p.get('l');
    if (c && m && l) return renderLesson(c, Number(m), Number(l));
    if (c) return renderOutline(c);
    return renderCatalog();
  }

  // Boot: need a session; enrolled/career_vault decide what shows.
  PDAPortal.getAccess().then(function (a) {
    if (!a.ok || !a.session) { location.href = '/login'; return; }
    access = a; uid = a.session.user.id;
    // Load career_vault flag (not part of the portal RPC).
    sb.from('profiles').select('career_vault').eq('id', uid).maybeSingle().then(function (r) {
      access.career_vault = !!(r.data && r.data.career_vault);
      document.body.classList.add('pda-ready');
      route();
      window.addEventListener('popstate', route);
    });
  });
})();
</script>
<script defer src="/assets/pda-track.js"></script>
</body>
